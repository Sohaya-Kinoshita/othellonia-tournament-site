<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
    <title>チーム一覧</title>
</head>

<body>
    <div id="headerSlot"></div>

    <main class="container">
        <div class="card">
            <h1>チーム一覧</h1>
            <p id="adminMessage">確認中...</p>
            <a href="./admin.html" class="btn">管理者ページに戻る</a>
        </div>

        <div class="card hidden" id="teamListCard">
            <h2>登録されているチーム</h2>

            <div style="margin-bottom: 20px; display: flex; gap: 8px; align-items: center;">
                <input type="text" id="teamNameInput" placeholder="チーム名で検索..."
                    style="flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
                <button type="button" class="btn" id="searchButton" style="white-space: nowrap;">検索</button>
                <button type="button" class="btn" id="clearButton" style="white-space: nowrap;">クリア</button>
            </div>

            <div id="teamListContainer" style="overflow-x: auto;">
                <table style="border-collapse: collapse; table-layout: fixed; width: auto;">
                    <thead>
                        <tr style="border-bottom: 2px solid #ccc;">
                            <th style="padding: 5px; text-align: center; border-right: 2px solid #999; width: 80px;">
                                チームID</th>
                            <th
                                style="padding: 5px; text-align: left; border-right: 2px dotted #ccc; white-space: nowrap; width: 240px;">
                                チーム名</th>
                            <th
                                style="padding: 5px; text-align: left; border-right: 2px dotted #ccc; white-space: nowrap; width: 160px;">
                                チームリーダー</th>
                            <th style="padding: 5px; text-align: left; white-space: nowrap; width: 160px;">サブリーダー</th>
                        </tr>
                    </thead>
                    <tbody id="teamTableBody">
                    </tbody>
                </table>
            </div>
            <p id="noTeamsMessage" style="text-align: center; color: #666; display: none;">
                チームが登録されていません
            </p>
        </div>
    </main>

    <div id="footerSlot"></div>

    <script src="./js/layout.js"></script>
    <script>
        let allTeams = [];

        function renderTeams(teamsToRender) {
            const teamTableBody = document.getElementById("teamTableBody");
            const noTeamsMessage = document.getElementById("noTeamsMessage");

            if (teamsToRender.length === 0) {
                noTeamsMessage.style.display = "block";
                teamTableBody.innerHTML = "";
            } else {
                noTeamsMessage.style.display = "none";
                teamTableBody.innerHTML = teamsToRender
                    .map(
                        (team) => `
                        <tr style="border-bottom: 1px solid #eee;">
                            <td style="padding: 5px; border-right: 2px solid #999; width: 80px; text-align: center;">${team.team_id}</td>
                            <td style="padding: 5px; border-right: 2px dotted #ccc; white-space: nowrap; width: 240px;">${team.team_name}</td>
                            <td style="padding: 5px; border-right: 2px dotted #ccc; white-space: nowrap; width: 160px;">${team.player_name || "(未設定)"}</td>
                            <td style="padding: 5px; white-space: nowrap; width: 160px;">${team.subleader_player_name || "(未設定)"}</td>
                        </tr>
                    `,
                    )
                    .join("");
            }
        }

        async function loadTeamList() {
            const adminMessage = document.getElementById("adminMessage");
            const teamListCard = document.getElementById("teamListCard");

            try {
                // 管理者認証確認
                const authResponse = await fetch("/api/me");
                const authResult = await authResponse.json();

                if (!authResult.isLoggedIn) {
                    location.href = "./admin_login.html";
                    return;
                }

                if (authResult.type !== "admin") {
                    adminMessage.textContent = "あなたにはこのページの閲覧権限がありません。";
                    return;
                }

                adminMessage.style.display = "none";

                // チーム一覧を取得
                const response = await fetch("/api/teams");
                const result = await response.json();

                if (!response.ok) {
                    adminMessage.textContent = "チーム一覧の取得に失敗しました";
                    return;
                }

                allTeams = result.teams || [];

                if (allTeams.length === 0) {
                    renderTeams([]);
                } else {
                    renderTeams(allTeams);
                }

                teamListCard.classList.remove("hidden");
                setupSearchEventListeners();
            } catch (error) {
                console.error("Error loading team list:", error);
                adminMessage.textContent = "チーム一覧の読み込みに失敗しました";
            }
        }

        function setupSearchEventListeners() {
            const searchInput = document.getElementById("teamNameInput");
            const searchButton = document.getElementById("searchButton");
            const clearButton = document.getElementById("clearButton");

            searchButton.addEventListener("click", () => {
                const keyword = searchInput.value.trim();
                const filtered = allTeams.filter((team) =>
                    team.team_name.includes(keyword)
                );
                renderTeams(filtered);
            });

            clearButton.addEventListener("click", () => {
                searchInput.value = "";
                renderTeams(allTeams);
            });

            searchInput.addEventListener("keypress", (event) => {
                if (event.key === "Enter") {
                    const keyword = searchInput.value.trim();
                    const filtered = allTeams.filter((team) =>
                        team.team_name.includes(keyword)
                    );
                    renderTeams(filtered);
                }
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadTeamList();
        });
    </script>
</body>

</html>
