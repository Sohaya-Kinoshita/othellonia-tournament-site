<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
    <title>マッチ情報を編集</title>
</head>

<body>
    <div id="headerSlot"></div>
    <main class="container">
        <div class="card">
            <h1>マッチ情報を編集</h1>
            <hr>
            <a href="./admin.html" class="btn">管理者ページに戻る</a>
        </div>

        <div class="card">
            <h2>未開始マッチ</h2>

            <form id="matchIdSearchForm" class="match-edit-search-form">
                <div class="form-group match-edit-search-row">
                    <label for="matchSearchType" class="match-edit-search-type-label">項目</label>
                    <select id="matchSearchType" class="match-edit-search-type">
                        <option value="match_id">マッチID</option>
                        <option value="team_name" selected>チーム名</option>
                    </select>
                    <input type="text" id="searchMatchId" name="searchMatchId" maxlength="20"
                        placeholder="例: M0 / チーム名（部分一致）" class="match-edit-search-input">
                    <button type="button" class="btn" id="matchSearchBtn">検索</button>
                    <button type="button" class="btn" id="matchSearchClearBtn">クリア</button>
                </div>
                <div id="matchDetailBox" class="match-edit-detail-box"></div>
                <div id="searchError" class="match-edit-error hidden"></div>
            </form>

            <div id="unstartedMatchesBox" class="match-edit-unstarted-box"></div>
        </div>
        <div class="card hidden" id="editMatchCard">
            <h2>マッチ情報編集</h2>
            <form id="editMatchForm">
                <div class="form-group">
                    <label for="editMatchId">マッチID</label>
                    <input type="text" id="editMatchId" name="editMatchId" readonly>
                </div>
                <div class="form-group">
                    <label for="editTeamAId">チームA</label>
                    <select id="editTeamAId" name="editTeamAId" required class="match-edit-select"></select>
                </div>
                <div class="form-group">
                    <label for="editTeamBId">チームB</label>
                    <select id="editTeamBId" name="editTeamBId" required class="match-edit-select"></select>
                </div>
                <div class="form-group">
                    <label for="editMatchDateTime">試合日時</label>
                    <input type="datetime-local" id="editMatchDateTime" name="editMatchDateTime" required step="300">
                </div>
                <div class="form-group">
                    <label for="editOrderDeadline">オーダー提出期限</label>
                    <input type="datetime-local" id="editOrderDeadline" name="editOrderDeadline" required>
                </div>
                <button type="submit" class="btn" id="editSaveBtn">保存</button>
                <div id="editErrorMsg" class="match-edit-error hidden"></div>
            </form>
        </div>
    </main>
    <div id="footerSlot"></div>
    <script src="./js/layout.js"></script>
    <script>
        async function checkAdmin() {
            const response = await fetch("/api/me");
            const result = await response.json();
            if (!result.isLoggedIn) {
                location.href = "./admin_login.html";
                return;
            }
            if (result.type !== "admin") {
                alert("あなたにはこのページの閲覧権限がありません。");
                window.location.href = "./index.html";
                return;
            }
        }
        window.addEventListener('DOMContentLoaded', checkAdmin);
    </script>
    <script src="./js/match_edit.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', checkAdmin);
    </script>
</body>

</html>
