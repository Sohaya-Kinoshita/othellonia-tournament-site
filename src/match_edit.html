<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
    <title>マッチ情報を編集</title>
</head>

<body>
    <div id="headerSlot"></div>
    <main class="container">
        <div class="card">
            <h1>マッチ情報を編集</h1>
            <hr>
            <form id="matchIdSearchForm" style="margin-bottom: 24px;">
                <div class="form-group">
                    <label for="searchMatchId">マッチIDを入力してください</label>
                    <input type="text" id="searchMatchId" name="searchMatchId" maxlength="3" required
                        pattern="[A-Za-z][0-9]{2}" placeholder="例: M01, m01" style="width: 120px;">
                    <button type="submit" class="btn">検索</button>
                </div>
                <div id="matchDetailBox" style="margin: 12px 0; color: #333;"></div>
                <div id="searchError" style="color: red; display: none; margin-top: 8px;"></div>
            </form>
            <a href="./admin.html" class="btn" style="margin-top: 16px;">管理者ページに戻る</a>
        </div>
        <div class="card hidden" id="editMatchCard">
            <h2>マッチ情報編集</h2>
            <form id="editMatchForm">
                <div class="form-group">
                    <label for="editMatchId">マッチID</label>
                    <input type="text" id="editMatchId" name="editMatchId" readonly>
                </div>
                <div class="form-group">
                    <label for="editTeamAId">チームA</label>
                    <select id="editTeamAId" name="editTeamAId" required style="width: 100%;"></select>
                </div>
                <div class="form-group">
                    <label for="editTeamBId">チームB</label>
                    <select id="editTeamBId" name="editTeamBId" required style="width: 100%;"></select>
                </div>
                <div class="form-group">
                    <label for="editMatchDateTime">試合日時</label>
                    <input type="datetime-local" id="editMatchDateTime" name="editMatchDateTime" required>
                </div>
                <div class="form-group">
                    <label for="editOrderDeadline">オーダー提出期限</label>
                    <input type="datetime-local" id="editOrderDeadline" name="editOrderDeadline" required>
                </div>
                <button type="submit" class="btn" id="editSaveBtn">保存</button>
                <div id="editErrorMsg" style="color: red; display: none; margin-top: 8px;"></div>
            </form>
        </div>
    </main>
    <div id="footerSlot"></div>
    <script src="./js/layout.js"></script>
    <script>
        async function checkAdmin() {
            const response = await fetch("/api/me");
            const result = await response.json();
            if (!result.isLoggedIn) {
                location.href = "./admin_login.html";
                return;
            }
            if (result.type !== "admin") {
                alert("あなたにはこのページの閲覧権限がありません。");
                window.location.href = "./index.html";
                return;
            }
        }
        window.addEventListener('DOMContentLoaded', checkAdmin);
    </script>
    <script src="./js/match_edit.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', checkAdmin);
    </script>
</body>

</html>
