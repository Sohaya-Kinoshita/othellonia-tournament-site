<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
    <title>マッチ削除</title>
</head>

<body>
    <div id="headerSlot"></div>
    <main class="container">
        <div class="card">
            <h1>マッチ削除</h1>
            <hr>
            <form id="deleteMatchSearchForm" style="margin-bottom: 24px;">
                <div class="form-group">
                    <label for="deleteMatchId">マッチIDを入力してください</label>
                    <input type="text" id="deleteMatchId" name="deleteMatchId" maxlength="3" required
                        pattern="[A-Za-z][0-9]{2}" placeholder="例: M01, m01" style="width: 120px;">
                    <button type="submit" class="btn">検索</button>
                </div>
                <div id="matchDetailBox" style="margin: 12px 0; color: #333;"></div>
            </form>
            <form id="deleteMatchForm" class="hidden">
                <div class="form-group" id="orderConfirmBox" style="margin-bottom: 8px; display: none;">
                    <input type="checkbox" id="confirmOrderDelete">
                    <label for="confirmOrderDelete">オーダーが確定していますが、削除しますか。</label>
                </div>
                <div class="form-group" id="resultConfirmBox" style="margin-bottom: 16px; display: none;">
                    <input type="checkbox" id="confirmResultDelete">
                    <label for="confirmResultDelete">マッチが終了し、勝敗が確定していますが、削除しますか。</label>
                </div>
                <div id="deleteError" style="color: red; display: none;"></div>
                <div id="deleteSuccess" style="color: green; display: none;"></div>
                <button type="submit" class="btn" id="deleteButton" style="margin-top: 24px; width: 100%;"
                    disabled>削除</button>
            </form>
            <div style="margin-top: 12px; text-align: right;">
                <a href="./admin.html" class="btn" style="width: 100%;">管理者ページに戻る</a>
            </div>
        </div>
    </main>
    <div id="footerSlot"></div>
    <script src="./js/layout.js"></script>
    <script src="./js/match_delete.js"></script>
</body>

</html>
