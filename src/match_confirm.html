<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
    <title>マッチの確定</title>
</head>

<body>
    <div id="headerSlot"></div>

    <main class="container">
        <div class="card">
            <h1>マッチの確定</h1>
            <hr>
            <p id="adminMessage">確認中...</p>
            <a href="./admin.html" class="btn">管理者ページに戻る</a>
        </div>

        <div class="card hidden" id="matchConfirmCard">
            <h2>マッチの確定</h2>
            <hr>

            <div style="margin-bottom: 20px;">
                <label for="matchSelect">確定するマッチを選択</label>
                <select id="matchSelect"
                    style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; margin-top: 5px;">
                    <option value="">-- マッチを選択してください --</option>
                </select>
            </div>

            <div id="matchDetailsContainer" style="display: none;">
                <div class="card" style="margin-top: 20px; background-color: #f9f9f9;">
                    <h3>マッチ情報</h3>
                    <p><strong>マッチID:</strong> <span id="displayMatchId"></span></p>
                    <p><strong>チームA:</strong> <span id="displayTeamA"></span></p>
                    <p><strong>チームB:</strong> <span id="displayTeamB"></span></p>
                    <p><strong>現在の勝者:</strong> <span id="displayWinner"></span></p>

                    <h3 style="margin-top: 20px;">勝者を選択</h3>
                    <div style="padding: 10px; border: 1px solid #ddd; border-radius: 4px; margin-top: 10px;">
                        <div style="margin-bottom: 10px;">
                            <label style="display: flex; align-items: center; cursor: pointer;">
                                <input type="radio" name="winner" value="" style="margin-right: 8px;">
                                <span>未決定</span>
                            </label>
                        </div>
                        <div style="margin-bottom: 10px;">
                            <label style="display: flex; align-items: center; cursor: pointer;">
                                <input type="radio" name="winner" id="winnerTeamA" style="margin-right: 8px;">
                                <span id="labelTeamA"></span>
                            </label>
                        </div>
                        <div>
                            <label style="display: flex; align-items: center; cursor: pointer;">
                                <input type="radio" name="winner" id="winnerTeamB" style="margin-right: 8px;">
                                <span id="labelTeamB"></span>
                            </label>
                        </div>
                    </div>

                    <button type="button" class="btn" id="confirmButton" style="margin-top: 20px;">確定</button>
                    <div id="confirmMessage" class="message" style="display: none; margin-top: 15px;"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="footerSlot"></div>

    <script src="./js/layout.js"></script>
    <script>
        let allMatches = [];
        let currentMatchId = null;

        async function checkAdmin() {
            const response = await fetch("/api/me");
            const result = await response.json();

            const adminMessage = document.getElementById("adminMessage");
            const matchConfirmCard = document.getElementById("matchConfirmCard");

            if (!result.isLoggedIn) {
                location.href = "./admin_login.html";
                return;
            }

            if (result.type !== "admin") {
                adminMessage.textContent = "あなたにはこのページの閲覧権限がありません。";
                return;
            }

            adminMessage.style.display = "none";
            matchConfirmCard.classList.remove("hidden");
            loadMatches();
        }

        async function loadMatches() {
            try {
                const response = await fetch("/api/matches");
                const result = await response.json();

                if (!response.ok) {
                    alert("マッチ一覧の取得に失敗しました");
                    return;
                }

                allMatches = result.matches || [];
                populateMatchSelect();
            } catch (error) {
                console.error("Error loading matches:", error);
                alert("マッチ情報の読み込みに失敗しました");
            }
        }

        function populateMatchSelect() {
            const matchSelect = document.getElementById("matchSelect");

            allMatches.forEach((match) => {
                const option = document.createElement("option");
                option.value = match.match_id;
                option.textContent = `${match.match_id}: ${match.team_a_name} vs ${match.team_b_name}`;
                matchSelect.appendChild(option);
            });

            matchSelect.addEventListener("change", () => {
                const selectedMatchId = matchSelect.value;
                if (selectedMatchId) {
                    currentMatchId = selectedMatchId;
                    displayMatchDetails();
                } else {
                    document.getElementById("matchDetailsContainer").style.display = "none";
                }
            });
        }

        function displayMatchDetails() {
            const match = allMatches.find((m) => m.match_id === currentMatchId);
            if (!match) return;

            const matchDetailsContainer = document.getElementById("matchDetailsContainer");
            const displayMatchId = document.getElementById("displayMatchId");
            const displayTeamA = document.getElementById("displayTeamA");
            const displayTeamB = document.getElementById("displayTeamB");
            const displayWinner = document.getElementById("displayWinner");
            const winnerTeamA = document.getElementById("winnerTeamA");
            const winnerTeamB = document.getElementById("winnerTeamB");
            const labelTeamA = document.getElementById("labelTeamA");
            const labelTeamB = document.getElementById("labelTeamB");
            const confirmButton = document.getElementById("confirmButton");
            const confirmMessage = document.getElementById("confirmMessage");

            displayMatchId.textContent = match.match_id;
            displayTeamA.textContent = `${match.team_a_id} - ${match.team_a_name}`;
            displayTeamB.textContent = `${match.team_b_id} - ${match.team_b_name}`;
            displayWinner.textContent = match.winner_team_id || "未決定";

            winnerTeamA.value = match.team_a_id;
            winnerTeamB.value = match.team_b_id;
            labelTeamA.textContent = `${match.team_a_id} - ${match.team_a_name}`;
            labelTeamB.textContent = `${match.team_b_id} - ${match.team_b_name}`;

            // 現在の勝者を選択状態に
            if (match.winner_team_id === match.team_a_id) {
                winnerTeamA.checked = true;
            } else if (match.winner_team_id === match.team_b_id) {
                winnerTeamB.checked = true;
            } else {
                document.querySelector('input[name="winner"][value=""]').checked = true;
            }

            confirmButton.onclick = async () => {
                const selectedWinner = document.querySelector('input[name="winner"]:checked')?.value || null;

                try {
                    const response = await fetch("/api/matches", {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            matchId: currentMatchId,
                            winnerTeamId: selectedWinner || null,
                        }),
                    });
                    const result = await response.json();

                    if (response.ok) {
                        const matchIndex = allMatches.findIndex((m) => m.match_id === currentMatchId);
                        if (matchIndex !== -1) {
                            allMatches[matchIndex].winner_team_id = selectedWinner || null;
                        }

                        displayWinner.textContent = selectedWinner || "未決定";
                        confirmMessage.textContent = "マッチを確定しました！";
                        confirmMessage.className = "message success";
                    } else {
                        confirmMessage.textContent = result.message || "確定に失敗しました";
                        confirmMessage.className = "message error";
                    }
                    confirmMessage.style.display = "block";
                } catch (error) {
                    console.error("Error confirming match:", error);
                    confirmMessage.textContent = "通信エラーが発生しました";
                    confirmMessage.className = "message error";
                    confirmMessage.style.display = "block";
                }
            };

            matchDetailsContainer.style.display = "block";
        }

        document.addEventListener("DOMContentLoaded", () => {
            checkAdmin();
        });
    </script>
</body>

</html>
