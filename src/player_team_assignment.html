<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="icon" href="./images/Logo.jpg" type="image/jpeg">
    <link rel="apple-touch-icon" sizes="180x180" href="./images/Logo.jpg">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#2563eb">
    <title>プレイヤー情報更新</title>
</head>

<body>
    <div id="headerSlot"></div>

    <main class="container">
        <div class="card">
            <h1>プレイヤー情報更新</h1>
            <hr>
            <p id="adminMessage">確認中...</p>
            <a href="./admin.html" class="btn">管理者ページに戻る</a>
        </div>

        <div class="card hidden" id="assignmentCard">
            <h2>プレイヤーの情報を更新する</h2>

            <div style="margin-bottom: 20px;">
                <label for="playerSearchKeyword">プレイヤー検索（初期: プレイヤー名）</label>
                <div style="display: flex; gap: 8px; align-items: center; margin-top: 5px;">
                    <select id="playerSearchType" title="検索条件"
                        style="width: 200px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; margin: 0;">
                        <option value="name" selected>プレイヤー名で検索</option>
                        <option value="id">プレイヤーIDで検索</option>
                    </select>
                    <input type="text" id="playerSearchKeyword" placeholder="プレイヤー名を入力" style="flex: 1; margin: 0;">
                    <button type="button" class="btn" id="searchPlayerButton"
                        style="margin: 0; white-space: nowrap;">検索</button>
                </div>
                <div style="display: flex; gap: 8px; align-items: center; margin-top: 8px; max-width: 520px;">
                    <select id="playerSearchResults"
                        style="flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; display: none;">
                    </select>
                    <button type="button" class="btn" id="applyPlayerSelectionButton"
                        style="margin: 0; white-space: nowrap; display: none;">選択</button>
                </div>
                <div id="playerApplyStatus"
                    style="display: none; margin-top: 8px; max-width: 520px; padding: 8px 10px; background: #eef2ff; color: #1e3a8a; border-radius: 6px; font-size: 13px;">
                </div>
                <div style="margin-top: 8px; font-size: 13px; color: #666;">※ 空欄で検索すると全プレイヤーを表示します</div>
            </div>

            <div style="margin-bottom: 20px;">
                <label for="playerSelect">更新するプレイヤー（プレイヤーID - プレイヤー名）</label>
                <select id="playerSelect"
                    style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; margin-top: 5px;">
                    <option value="">-- プレイヤーを選択してください --</option>
                </select>
            </div>

            <div id="teamAssignmentContainer" style="display: none;">
                <div class="card" style="margin-top: 20px; background-color: #f9f9f9;">
                    <h3>プレイヤー名を変更</h3>
                    <div style="display: flex; gap: 8px; align-items: center; margin-top: 10px;">
                        <input type="text" id="playerNameEditInput" maxlength="10" placeholder="プレイヤー名（10文字以下）"
                            style="margin-bottom: 0;">
                        <button type="button" class="btn" id="pastePlayerNameEditButton"
                            style="margin: 0; white-space: nowrap;">貼り付け</button>
                        <button type="button" class="btn" id="updatePlayerNameButton"
                            style="margin: 0; white-space: nowrap;">名前を更新</button>
                    </div>

                    <h3 style="margin-top: 20px;">ミラティブアカウント</h3>
                    <div style="display: flex; gap: 8px; align-items: center; margin-top: 10px;">
                        <input type="text" id="mirrativUrlInput" placeholder="ミラティブURL" style="margin-bottom: 0;">
                        <button type="button" class="btn" id="pasteMirrativUrlButton"
                            style="margin: 0; white-space: nowrap;">貼り付け</button>
                        <button type="button" class="btn" id="updateMirrativUrlButton"
                            style="margin: 0; white-space: nowrap;">URLを更新</button>
                    </div>

                    <h3>チーム割り当て</h3>
                    <p style="color: #666; font-size: 0.9em;">プレイヤーは最大2つのチームに登録できます</p>

                    <div id="teamListContainer" style="margin-top: 15px;">
                        <!-- チーム一覧がここに動的に挿入されます -->
                    </div>

                    <div id="assignmentMessage" class="message" style="display: none; margin-top: 15px;"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="footerSlot"></div>

    <script src="./js/layout.js"></script>
    <script>
        let allPlayers = [];
        let allTeams = [];
        let currentPlayerId = null;

        function hideSearchResult(selectEl, applyButtonEl) {
            selectEl.style.display = "none";
            applyButtonEl.style.display = "none";
            selectEl.innerHTML = "";
        }

        function hideApplyStatus(statusEl) {
            statusEl.style.display = "none";
            statusEl.textContent = "";
        }

        function showApplyStatus(statusEl, text) {
            statusEl.textContent = text;
            statusEl.style.display = "block";
        }

        function getMatchingPlayers(players, keyword) {
            const lowerKeyword = keyword.toLowerCase();
            return players
                .filter((player) => {
                    return String(player.player_name || "").toLowerCase().includes(lowerKeyword);
                })
                .sort((a, b) => {
                    const aName = String(a.player_name || "").toLowerCase();
                    const bName = String(b.player_name || "").toLowerCase();
                    const aStarts = aName.startsWith(lowerKeyword) ? 0 : 1;
                    const bStarts = bName.startsWith(lowerKeyword) ? 0 : 1;
                    if (aStarts !== bStarts) return aStarts - bStarts;
                    return aName.localeCompare(bName, "ja");
                });
        }

        function renderSearchResult(matches, selectEl, applyButtonEl, statusEl) {
            hideApplyStatus(statusEl);
            selectEl.innerHTML = "";
            matches.forEach((player) => {
                const option = document.createElement("option");
                option.value = player.player_id;
                option.textContent = `${player.player_name} (${player.player_id})`;
                selectEl.appendChild(option);
            });
            selectEl.style.display = "block";
            applyButtonEl.style.display = "inline-block";
        }

        function renderPlayerOptions(playersToRender) {
            const playerSelect = document.getElementById("playerSelect");
            const teamAssignmentContainer = document.getElementById("teamAssignmentContainer");
            const selectedValue = playerSelect.value;

            playerSelect.innerHTML = "<option value=\"\">-- プレイヤーを選択してください --</option>";

            playersToRender.forEach((player) => {
                const option = document.createElement("option");
                option.value = player.player_id;
                option.textContent = `${player.player_id} - ${player.player_name}`;
                playerSelect.appendChild(option);
            });

            if (selectedValue && playersToRender.some((player) => player.player_id === selectedValue)) {
                playerSelect.value = selectedValue;
            } else {
                playerSelect.value = "";
                currentPlayerId = null;
                teamAssignmentContainer.style.display = "none";
            }
        }

        function applyPlayerSearch() {
            const searchTypeSelect = document.getElementById("playerSearchType");
            const searchKeywordInput = document.getElementById("playerSearchKeyword");
            const keyword = searchKeywordInput.value.trim().toLowerCase();

            if (!keyword) {
                renderPlayerOptions(allPlayers);
                return;
            }

            const filteredPlayers = allPlayers.filter((player) => {
                if (searchTypeSelect.value === "id") {
                    return String(player.player_id || "").toLowerCase().includes(keyword);
                }
                return String(player.player_name || "").toLowerCase().includes(keyword);
            });

            renderPlayerOptions(filteredPlayers);
        }

        function setupPlayerSearch() {
            const searchTypeSelect = document.getElementById("playerSearchType");
            const searchKeywordInput = document.getElementById("playerSearchKeyword");
            const searchButton = document.getElementById("searchPlayerButton");
            const playerSearchResults = document.getElementById("playerSearchResults");
            const applyPlayerSelectionButton = document.getElementById("applyPlayerSelectionButton");
            const playerApplyStatus = document.getElementById("playerApplyStatus");

            if (searchButton.dataset.bound === "true") {
                return;
            }

            const updateSearchPlaceholder = () => {
                searchKeywordInput.placeholder =
                    searchTypeSelect.value === "id"
                        ? "プレイヤーIDを入力"
                        : "プレイヤー名を入力";
            };

            searchTypeSelect.addEventListener("change", () => {
                updateSearchPlaceholder();
                applyPlayerSearch();
            });

            searchButton.addEventListener("click", () => {
                applyPlayerSearch();

                if (searchTypeSelect.value === "name") {
                    const keyword = searchKeywordInput.value.trim();
                    if (!keyword) {
                        hideSearchResult(playerSearchResults, applyPlayerSelectionButton);
                        return;
                    }

                    const matches = getMatchingPlayers(allPlayers, keyword);
                    if (matches.length === 0) {
                        hideSearchResult(playerSearchResults, applyPlayerSelectionButton);
                        return;
                    }

                    renderSearchResult(
                        matches,
                        playerSearchResults,
                        applyPlayerSelectionButton,
                        playerApplyStatus,
                    );
                } else {
                    hideSearchResult(playerSearchResults, applyPlayerSelectionButton);
                }
            });

            searchKeywordInput.addEventListener("keydown", (event) => {
                if (event.key === "Enter") {
                    event.preventDefault();
                    applyPlayerSearch();

                    if (searchTypeSelect.value === "name") {
                        const keyword = searchKeywordInput.value.trim();
                        if (!keyword) {
                            hideSearchResult(playerSearchResults, applyPlayerSelectionButton);
                            return;
                        }

                        const matches = getMatchingPlayers(allPlayers, keyword);
                        if (matches.length === 0) {
                            hideSearchResult(playerSearchResults, applyPlayerSelectionButton);
                            return;
                        }

                        renderSearchResult(
                            matches,
                            playerSearchResults,
                            applyPlayerSelectionButton,
                            playerApplyStatus,
                        );
                    } else {
                        hideSearchResult(playerSearchResults, applyPlayerSelectionButton);
                    }
                }
            });

            searchKeywordInput.addEventListener("input", () => {
                if (searchTypeSelect.value !== "name") {
                    hideSearchResult(playerSearchResults, applyPlayerSelectionButton);
                    return;
                }

                const keyword = searchKeywordInput.value.trim();
                if (!keyword) {
                    hideSearchResult(playerSearchResults, applyPlayerSelectionButton);
                    return;
                }

                const matches = getMatchingPlayers(allPlayers, keyword).slice(0, 5);
                if (matches.length === 0) {
                    hideSearchResult(playerSearchResults, applyPlayerSelectionButton);
                    return;
                }

                renderSearchResult(
                    matches,
                    playerSearchResults,
                    applyPlayerSelectionButton,
                    playerApplyStatus,
                );
            });

            applyPlayerSelectionButton.addEventListener("click", () => {
                if (!playerSearchResults.value) {
                    return;
                }

                const playerSelect = document.getElementById("playerSelect");
                playerSelect.value = playerSearchResults.value;
                currentPlayerId = playerSearchResults.value;
                hideSearchResult(playerSearchResults, applyPlayerSelectionButton);
                showApplyStatus(
                    playerApplyStatus,
                    `プレイヤーを選択しました: ${playerSearchResults.value}`,
                );
                displayTeamAssignment();
            });

            updateSearchPlaceholder();
            searchButton.dataset.bound = "true";
        }

        async function checkAdmin() {
            const response = await fetch("/api/me");
            const result = await response.json();

            const adminMessage = document.getElementById("adminMessage");
            const assignmentCard = document.getElementById("assignmentCard");

            if (!result.isLoggedIn) {
                location.href = "./admin_login.html";
                return;
            }

            if (result.type !== "admin") {
                adminMessage.textContent = "あなたにはこのページの閲覧権限がありません。";
                return;
            }

            adminMessage.style.display = "none";
            assignmentCard.classList.remove("hidden");
            loadData();
        }

        async function loadData() {
            try {
                // プレイヤー一覧を取得
                const playersResponse = await fetch("/api/players");
                const playersResult = await playersResponse.json();
                allPlayers = playersResult.players || [];

                // チーム一覧を取得
                const teamsResponse = await fetch("/api/teams");
                const teamsResult = await teamsResponse.json();
                allTeams = teamsResult.teams || [];

                populatePlayerSelect();
                setupPlayerSearch();
            } catch (error) {
                console.error("Error loading data:", error);
                alert("データの読み込みに失敗しました");
            }
        }

        function populatePlayerSelect() {
            const playerSelect = document.getElementById("playerSelect");

            renderPlayerOptions(allPlayers);

            if (playerSelect.dataset.bound === "true") {
                return;
            }

            playerSelect.addEventListener("change", () => {
                const selectedPlayerId = playerSelect.value;
                if (selectedPlayerId) {
                    currentPlayerId = selectedPlayerId;
                    displayTeamAssignment();
                } else {
                    currentPlayerId = null;
                    document.getElementById("teamAssignmentContainer").style.display = "none";
                }
            });

            playerSelect.dataset.bound = "true";
        }

        async function displayTeamAssignment() {
            const teamAssignmentContainer = document.getElementById("teamAssignmentContainer");
            const teamListContainer = document.getElementById("teamListContainer");
            const playerNameEditInput = document.getElementById("playerNameEditInput");
            const pastePlayerNameEditButton = document.getElementById("pastePlayerNameEditButton");
            const updatePlayerNameButton = document.getElementById("updatePlayerNameButton");
            const mirrativUrlInput = document.getElementById("mirrativUrlInput");
            const pasteMirrativUrlButton = document.getElementById("pasteMirrativUrlButton");
            const updateMirrativUrlButton = document.getElementById("updateMirrativUrlButton");
            const messageDiv = document.getElementById("assignmentMessage");

            try {
                const selectedPlayer = allPlayers.find(
                    (player) => player.player_id === currentPlayerId
                );

                if (selectedPlayer) {
                    playerNameEditInput.value = selectedPlayer.player_name || "";
                    mirrativUrlInput.value = selectedPlayer.mirrativ_url || "";
                }

                pastePlayerNameEditButton.onclick = async () => {
                    try {
                        const clipboardText = await navigator.clipboard.readText();
                        playerNameEditInput.value = clipboardText.trim();
                        messageDiv.style.display = "none";
                    } catch (error) {
                        messageDiv.textContent = "クリップボードの貼り付けに失敗しました";
                        messageDiv.className = "message error";
                        messageDiv.style.display = "block";
                    }
                };

                updatePlayerNameButton.onclick = async () => {
                    const playerName = playerNameEditInput.value.trim();

                    if (!playerName) {
                        messageDiv.textContent = "プレイヤー名を入力してください";
                        messageDiv.className = "message error";
                        messageDiv.style.display = "block";
                        return;
                    }

                    if (playerName.length > 10) {
                        messageDiv.textContent = "プレイヤー名は10文字以下で入力してください";
                        messageDiv.className = "message error";
                        messageDiv.style.display = "block";
                        return;
                    }

                    try {
                        const updateResponse = await fetch("/api/players", {
                            method: "PUT",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                playerId: currentPlayerId,
                                playerName,
                            }),
                        });
                        const updateResult = await updateResponse.json();

                        if (updateResponse.ok) {
                            const playerIndex = allPlayers.findIndex(
                                (player) => player.player_id === currentPlayerId
                            );
                            if (playerIndex !== -1) {
                                allPlayers[playerIndex].player_name = playerName;
                            }

                            applyPlayerSearch();
                            document.getElementById("playerSelect").value = currentPlayerId;

                            messageDiv.textContent = "プレイヤー名を更新しました！";
                            messageDiv.className = "message success";
                        } else {
                            messageDiv.textContent =
                                updateResult.message || "プレイヤー名の更新に失敗しました";
                            messageDiv.className = "message error";
                        }
                        messageDiv.style.display = "block";
                    } catch (error) {
                        console.error("Error updating player name:", error);
                        messageDiv.textContent = "通信エラーが発生しました";
                        messageDiv.className = "message error";
                        messageDiv.style.display = "block";
                    }
                };

                pasteMirrativUrlButton.onclick = async () => {
                    try {
                        const clipboardText = await navigator.clipboard.readText();
                        mirrativUrlInput.value = clipboardText.trim();
                        messageDiv.style.display = "none";
                    } catch (error) {
                        messageDiv.textContent = "クリップボードの貼り付けに失敗しました";
                        messageDiv.className = "message error";
                        messageDiv.style.display = "block";
                    }
                };

                updateMirrativUrlButton.onclick = async () => {
                    const mirrativUrl = mirrativUrlInput.value.trim();

                    try {
                        const updateResponse = await fetch("/api/players", {
                            method: "PUT",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                playerId: currentPlayerId,
                                mirrativUrl,
                            }),
                        });
                        const updateResult = await updateResponse.json();

                        if (updateResponse.ok) {
                            const playerIndex = allPlayers.findIndex(
                                (player) => player.player_id === currentPlayerId
                            );
                            if (playerIndex !== -1) {
                                allPlayers[playerIndex].mirrativ_url = mirrativUrl;
                            }

                            messageDiv.textContent = "ミラティブURLを更新しました！";
                            messageDiv.className = "message success";
                        } else {
                            messageDiv.textContent =
                                updateResult.message || "ミラティブURLの更新に失敗しました";
                            messageDiv.className = "message error";
                        }
                        messageDiv.style.display = "block";
                    } catch (error) {
                        console.error("Error updating mirrativ URL:", error);
                        messageDiv.textContent = "通信エラーが発生しました";
                        messageDiv.className = "message error";
                        messageDiv.style.display = "block";
                    }
                };

                // プレイヤーが割り当てられているチームを取得
                const response = await fetch(
                    `/api/team-members?playerId=${encodeURIComponent(currentPlayerId)}`
                );
                const result = await response.json();
                const assignedTeams = result.teams.map((t) => t.team_id) || [];

                // チーム一覧を表示
                teamListContainer.innerHTML = allTeams
                    .map((team) => {
                        const isAssigned = assignedTeams.includes(team.team_id);
                        return `
                            <div style="display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #ddd;">
                                <input 
                                    type="checkbox" 
                                    class="team-checkbox" 
                                    value="${team.team_id}" 
                                    ${isAssigned ? "checked" : ""}
                                    style="margin-right: 10px;"
                                >
                                <span>${team.team_id} - ${team.team_name}</span>
                            </div>
                        `;
                    })
                    .join("");

                // チェックボックスのイベントリスナーを設定
                setupCheckboxListeners(assignedTeams);

                teamAssignmentContainer.style.display = "block";
            } catch (error) {
                console.error("Error loading team assignment:", error);
                alert("チーム情報の読み込みに失敗しました");
            }
        }

        function setupCheckboxListeners(currentAssignedTeams) {
            const checkboxes = document.querySelectorAll(".team-checkbox");
            const messageDiv = document.getElementById("assignmentMessage");

            checkboxes.forEach((checkbox) => {
                checkbox.addEventListener("change", async () => {
                    const teamId = checkbox.value;
                    const isChecked = checkbox.checked;

                    try {
                        if (isChecked) {
                            // チームに追加
                            const response = await fetch("/api/team-members", {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({
                                    playerId: currentPlayerId,
                                    teamId: teamId,
                                }),
                            });
                            const result = await response.json();

                            if (response.ok) {
                                messageDiv.textContent = `${teamId}チームに追加しました！`;
                                messageDiv.className = "message success";
                            } else {
                                messageDiv.textContent =
                                    result.message || "追加に失敗しました";
                                messageDiv.className = "message error";
                                checkbox.checked = false;
                            }
                        } else {
                            // チームから削除
                            const response = await fetch("/api/team-members", {
                                method: "DELETE",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({
                                    playerId: currentPlayerId,
                                    teamId: teamId,
                                }),
                            });
                            const result = await response.json();

                            if (response.ok) {
                                messageDiv.textContent = `${teamId}チームから削除しました！`;
                                messageDiv.className = "message success";
                            } else {
                                messageDiv.textContent =
                                    result.message || "削除に失敗しました";
                                messageDiv.className = "message error";
                                checkbox.checked = true;
                            }
                        }

                        messageDiv.style.display = "block";
                        setTimeout(() => {
                            messageDiv.style.display = "none";
                        }, 3000);
                    } catch (error) {
                        console.error("Error updating team assignment:", error);
                        messageDiv.textContent = "通信エラーが発生しました";
                        messageDiv.className = "message error";
                        messageDiv.style.display = "block";
                        checkbox.checked = !isChecked;
                    }
                });
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            checkAdmin();
        });
    </script>
</body>

</html>
