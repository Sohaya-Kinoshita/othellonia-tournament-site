<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
    <title>試合管理</title>
</head>

<body>
    <div id="headerSlot"></div>

    <main class="container">
        <div class="card">
            <h1>管理する試合の決定</h1>
            <a href="./admin.html" class="btn" style="margin-bottom: 16px;">管理者ページに戻る</a>
            <div style="margin-top: 24px;">
                <h2 style="margin: 0 0 12px 0; font-size: 20px;">試合管理</h2>
                <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 12px;">
                    <label for="searchMatchId" style="margin-right: 4px;">マッチIDで検索</label>
                    <input type="text" id="searchMatchId" placeholder="例: M01, S01"
                        style="padding: 6px; min-width: 180px;" />
                    <button type="button" class="btn" id="searchButton">検索</button>
                    <button type="button" class="btn" id="clearButton">クリア</button>
                </div>
                <div id="matchListBox" style="margin-top: 16px; color: #333;"></div>

            </div>
        </div>
    </main>

    <div id="footerSlot"></div>

    <script src="./js/layout.js"></script>
    <script>
        async function checkAdmin() {
            const response = await fetch("/api/me");
            const result = await response.json();
            if (!result.isLoggedIn) {
                location.href = "./admin_login.html";
                return;
            }
            if (result.type !== "admin") {
                alert("あなたにはこのページの閲覧権限がありません。");
                window.location.href = "./index.html";
                return;
            }
        }


        let allMatches = [];

        function formatDateTime(datetimeText) {
            if (!datetimeText) return "-";
            const normalized = String(datetimeText).replace(" ", "T");
            const date = new Date(normalized);
            if (Number.isNaN(date.getTime())) return "-";
            return date.toLocaleString("ja-JP", {
                year: "numeric", month: "numeric", day: "numeric",
                hour: "2-digit", minute: "2-digit"
            });
        }

        function getStatusLabel(match) {
            if (match.winner_team_id) return "完了";
            if (match.started_at) return "進行中";
            return "試合前";
        }

        function renderMatchList(matches) {
            const box = document.getElementById("matchListBox");
            if (!matches.length) {
                box.innerHTML = '<div style="color:#888;">該当する試合がありません。</div>';
                return;
            }
            box.innerHTML = `
                                <table style="border-collapse:collapse; min-width:600px; width:100%;">
                                    <thead>
                                        <tr style="border-bottom:2px solid #ccc;">
                                            <th style="padding:5px;">操作</th>
                                            <th style="padding:5px;">試合ID</th>
                                            <th style="padding:5px;">チームA</th>
                                            <th style="padding:5px;">チームB</th>
                                            <th style="padding:5px;">試合日時</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${matches.map(match => `
                                            <tr style="border-bottom:1px solid #eee;">
                                                <td style="padding:5px; text-align:center;">
                                                    <button type="button" class="btn edit-admin-btn" data-match-id="${match.match_id}">編集する</button>
                                                </td>
                                                <td style="padding:5px; text-align:center;">${match.match_id}</td>
                                                <td style="padding:5px;">${match.team_a_name || "-"}</td>
                                                <td style="padding:5px;">${match.team_b_name || "-"}</td>
                                                <td style="padding:5px;">${formatDateTime(match.scheduled_at)}</td>
                                            </tr>
                                            <tr id="admin-row-${match.match_id}" class="admin-edit-row" style="display:none; background:#f8fafc;">
                                                <td colspan="5">
                                                    <div id="adminAddSection-${match.match_id}"></div>
                                                </td>
                                            </tr>
                                        `).join("")}
                                    </tbody>
                                </table>
                        `;

            // 編集ボタンのイベント設定（毎回再設定）
            const users = window._cachedUsers || [];
            box.querySelectorAll(".edit-admin-btn").forEach(btn => {
                btn.onclick = async function () {
                    const matchId = btn.getAttribute("data-match-id");
                    // すべての管理者編集行を非表示
                    box.querySelectorAll(".admin-edit-row").forEach(row => row.style.display = "none");
                    // 対象のみ表示
                    const targetRow = document.getElementById(`admin-row-${matchId}`);
                    if (targetRow) {
                        targetRow.style.display = "table-row";
                        await renderAdminAddSection(matchId, users);
                    }
                };
            });
        }

        function filterMatches(keyword) {
            keyword = keyword.trim().toLowerCase();
            if (!keyword) {
                // 初期表示: 試合前・進行中のみ
                return allMatches.filter(m => !m.winner_team_id);
            }
            return allMatches.filter(m => {
                if (m.winner_team_id) return false;
                return (
                    (m.match_id || "").toLowerCase().includes(keyword) ||
                    (m.team_a_name || "").toLowerCase().includes(keyword) ||
                    (m.team_b_name || "").toLowerCase().includes(keyword)
                );
            });
        }


        function setupSearch() {
            const input = document.getElementById("searchMatchId");
            const searchBtn = document.getElementById("searchButton");
            const clearBtn = document.getElementById("clearButton");

            function doSearch() {
                const keyword = input.value;
                const filtered = filterMatches(keyword);
                renderMatchList(filtered);
            }

            searchBtn.addEventListener("click", doSearch);
            input.addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    doSearch();
                }
            });
            clearBtn.addEventListener("click", () => {
                input.value = "";
                renderMatchList(filterMatches(""));
                input.focus();
            });
        }

        async function loadMatches() {
            try {
                const res = await fetch("/api/matches");
                const data = await res.json();
                if (res.ok && data.success && Array.isArray(data.matches)) {
                    allMatches = data.matches;
                } else {
                    allMatches = [];
                }
            } catch {
                allMatches = [];
            }
        }

        // 管理者追加UI
        async function loadUsers() {
            try {
                const res = await fetch("/api/users");
                const data = await res.json();
                if (res.ok && data.success && Array.isArray(data.users)) {
                    return data.users;
                }
            } catch { }
            return [];
        }

        async function fetchMatchAdmins(matchId) {
            const res = await fetch(`/api/match_admins?matchId=${encodeURIComponent(matchId)}`);
            const data = await res.json();
            if (!res.ok || !data.success || !Array.isArray(data.admins)) {
                throw new Error(data.message || "管理者一覧の取得に失敗しました");
            }
            return data.admins.map(a => ({
                user_id: a.user_id,
                user_name: a.user_name || a.user_id,
            }));
        }

        async function saveMatchAdmins(matchId, admins) {
            const adminUserIds = admins.map(a => a.user_id);
            const res = await fetch("/api/match_admins", {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ matchId, adminUserIds }),
            });
            const data = await res.json();
            if (!res.ok || !data.success) {
                throw new Error(data.message || "管理者の更新に失敗しました");
            }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            await checkAdmin();
            await loadMatches();
            setupSearch();
            const users = await loadUsers();
            window._cachedUsers = users; // グローバルキャッシュ
            renderMatchList(filterMatches(""));
        });

        // 管理者追加UIを試合ごとに描画
        async function renderAdminAddSection(matchId, users) {
            const section = document.getElementById(`adminAddSection-${matchId}`);
            if (!section) return;
            if (!window.matchAdmins) window.matchAdmins = {};
            try {
                window.matchAdmins[matchId] = await fetchMatchAdmins(matchId);
            } catch {
                window.matchAdmins[matchId] = [];
            }
            const currentAdmins = window.matchAdmins[matchId];
            section.innerHTML = `
                <div style="padding: 8px 0;">
                  <h3 style="margin: 0 0 8px 0; font-size: 16px;">管理者を追加</h3>
                  <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px;">
                    <select id="userSelect-${matchId}" style="min-width: 180px; padding: 8px 12px; font-size: 15px;">
                      ${users.map(u => `<option value="${u.user_id}">${u.user_name} (${u.user_id})</option>`).join("")}
                    </select>
                    <button type="button" class="btn" id="addAdminBtn-${matchId}">追加</button>
                  </div>
                  <div id="adminAddMsg-${matchId}" style="color: #b91c1c; margin-bottom: 8px;"></div>
                  <div id="currentAdminsBox-${matchId}" style="margin-top: 8px;">
                    <b>現在の管理者:</b>
                    <ul id="adminList-${matchId}" style="margin: 4px 0 0 16px; padding: 0;"></ul>
                  </div>
                </div>
            `;
            // 管理者リスト描画
            renderAdminList(matchId);
            // 追加ボタンイベント
            document.getElementById(`addAdminBtn-${matchId}`).onclick = async function () {
                const select = document.getElementById(`userSelect-${matchId}`);
                const msg = document.getElementById(`adminAddMsg-${matchId}`);
                const userId = select.value;
                const user = users.find(u => u.user_id === userId);
                if (!user) return;
                if (currentAdmins.some(a => a.user_id === userId)) {
                    msg.style.color = "#b91c1c";
                    msg.textContent = "すでに追加されています";
                    return;
                }
                const nextAdmins = [...currentAdmins, user];
                try {
                    await saveMatchAdmins(matchId, nextAdmins);
                    window.matchAdmins[matchId] = await fetchMatchAdmins(matchId);
                    msg.style.color = "#166534";
                    msg.textContent = "管理者を追加しました";
                    renderAdminList(matchId);
                } catch (e) {
                    msg.style.color = "#b91c1c";
                    msg.textContent = e.message || "管理者の追加に失敗しました";
                }
            };
        }

        function renderAdminList(matchId) {
            const ul = document.getElementById(`adminList-${matchId}`);
            if (!ul) return;
            const currentAdmins = (window.matchAdmins && window.matchAdmins[matchId]) ? window.matchAdmins[matchId] : [];
            ul.innerHTML = currentAdmins.length
                ? currentAdmins.map(a => `<li>${a.user_name} (${a.user_id}) <button type="button" class="btn btn-sm remove-admin-btn" data-user-id="${a.user_id}" data-match-id="${matchId}" style="margin-left:8px; padding:2px 8px; font-size:12px;">削除</button></li>`).join("")
                : '<li style="color:#888;">未設定</li>';

            // 削除ボタンイベント
            ul.querySelectorAll('.remove-admin-btn').forEach(btn => {
                btn.onclick = async function () {
                    const userId = btn.getAttribute('data-user-id');
                    const matchId = btn.getAttribute('data-match-id');
                    if (!window.matchAdmins || !window.matchAdmins[matchId]) return;
                    const msg = document.getElementById(`adminAddMsg-${matchId}`);
                    const nextAdmins = window.matchAdmins[matchId].filter(a => a.user_id !== userId);
                    try {
                        await saveMatchAdmins(matchId, nextAdmins);
                        window.matchAdmins[matchId] = await fetchMatchAdmins(matchId);
                        if (msg) {
                            msg.style.color = "#166534";
                            msg.textContent = "管理者を削除しました";
                        }
                        renderAdminList(matchId);
                    } catch (e) {
                        if (msg) {
                            msg.style.color = "#b91c1c";
                            msg.textContent = e.message || "管理者の削除に失敗しました";
                        }
                    }
                };
            });
        }
    </script>
</body>

</html>
