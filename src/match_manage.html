<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
    <title>試合管理</title>
</head>

<body>
    <div id="headerSlot"></div>

    <main class="container">
        <div class="card">
            <h1>管理する試合の決定</h1>
            <hr>
            <p id="adminMessage">確認中...</p>
            <a href="./admin.html" class="btn">管理者ページに戻る</a>
        </div>

        <div class="card hidden" id="matchManageCard">
            <h2>試合管理</h2>
            <hr>

            <div style="margin-bottom: 20px;">
                <div class="form-group">
                    <label for="searchMatchId">試合IDで検索</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="searchMatchId" placeholder="例: M01, S01"
                            style="flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                        <button class="btn" onclick="clearSearch()"
                            style="white-space: nowrap; background-color: #999;">クリア</button>
                    </div>
                </div>
            </div>

            <div id="matchList"></div>
            <div id="matchDetail" style="display: none;"></div>
            <div id="noResult" style="display: none; color: #999; text-align: center; padding: 20px;">試合が見つかりません</div>
        </div>
    </main>

    <div id="footerSlot"></div>

    <script src="./js/layout.js"></script>
    <script>
        async function checkAdmin() {
            const response = await fetch("/api/me");
            const result = await response.json();

            const adminMessage = document.getElementById("adminMessage");
            const matchManageCard = document.getElementById("matchManageCard");

            if (!result.isLoggedIn) {
                location.href = "./admin_login.html";
                return;
            }

            if (result.type !== "admin") {
                adminMessage.textContent = "あなたにはこのページの閲覧権限がありません。";
                return;
            }

            adminMessage.style.display = "none";
            matchManageCard.classList.remove("hidden");
            await initializeMatches();
        }

        // グローバル変数
        let allMatches = [];
        let allUsers = [];


        async function initializeMatches() {
            try {
                const [matchResponse, usersResponse] = await Promise.all([
                    fetch("/api/matches"),
                    fetch("/api/users")
                ]);

                const matchData = await matchResponse.json();
                const usersData = await usersResponse.json();

                allMatches = matchData.matches || [];
                allUsers = usersData.users || [];

                // 既存の管理者をメモリに初期化
                allMatches.forEach(match => {
                    const adminIds = Array.isArray(match.admin_user_id) ? match.admin_user_id : (match.admin_user_id ? [match.admin_user_id] : []);
                    selectedAdmins[match.match_id] = adminIds;
                });

                // 初期表示: 勝敗未確定（対戦前・対戦中）のみ全件リスト
                renderMatchList();
            } catch (error) {
                console.error("Error initializing matches:", error);
                alert("マッチ情報の読み込みに失敗しました");
            }
        }

        // 検索欄入力時に即時フィルタ
        document.addEventListener("DOMContentLoaded", () => {
            checkAdmin();
            setTimeout(() => {
                const searchInput = document.getElementById("searchMatchId");
                if (searchInput) {
                    searchInput.addEventListener("input", () => {
                        renderMatchList();
                    });
                }
            }, 100);
        });

        function renderMatchList() {
            const searchInput = document.getElementById("searchMatchId").value.trim().toUpperCase();
            const matchList = document.getElementById("matchList");
            const matchDetail = document.getElementById("matchDetail");
            const noResult = document.getElementById("noResult");

            // 勝敗未確定のみ
            let filtered = allMatches.filter(m => m.match_status !== "finished");
            if (searchInput) {
                filtered = filtered.filter(m => m.match_id.toUpperCase().includes(searchInput));
            }

            if (filtered.length === 0) {
                matchList.innerHTML = "";
                matchDetail.style.display = "none";
                noResult.style.display = "block";
                return;
            }

            noResult.style.display = "none";
            matchList.innerHTML = filtered.map(match => `
                <div class="match-list-item" style="border: 1px solid #ccc; border-radius: 4px; padding: 12px 16px; margin-bottom: 10px; background: #fafcff; cursor: pointer;" onclick="showMatchDetail('${match.match_id}')">
                    <span style="font-weight: bold; font-size: 1.1em;">${match.match_id}</span>
                    <span style="margin-left: 12px; color: #555;">
                        <div><b>対戦チーム</b></div>
                        <div>${match.team_a_name} (${match.team_a_id})</div>
                        <div>${match.team_b_name} (${match.team_b_id})</div>
                    </span>
                    <span style="margin-left: 12px; color: #888; font-size: 0.95em;">${match.match_status === "in_progress" ? "対戦中" : "対戦前"}</span>
                </div>
            `).join("");
            matchDetail.style.display = "none";
        }

        // 一覧から選択時に詳細表示
        window.showMatchDetail = function (matchId) {
            const match = allMatches.find(m => m.match_id === matchId);
            if (match) {
                displayMatchDetail(match);
            }
        }

        // 旧searchMatchは不要

        function clearSearch() {
            document.getElementById("searchMatchId").value = "";
            document.getElementById("matchDetail").style.display = "none";
            document.getElementById("noResult").style.display = "none";
        }

        function displayMatchDetail(match) {
            const matchDetail = document.getElementById("matchDetail");
            const adminIds = Array.isArray(match.admin_user_id) ? match.admin_user_id : (match.admin_user_id ? [match.admin_user_id] : []);
            const statusLabel = match.match_status === "in_progress"
                ? "対戦中"
                : match.match_status === "finished"
                    ? "終了"
                    : "対戦前";
            const userChips = adminIds.map(userId => {
                const user = allUsers.find(u => u.user_id === userId);
                return `
                    <div style="display: inline-flex; align-items: center; gap: 6px; background: #2196F3; color: white; padding: 6px 10px; border-radius: 20px; margin: 4px; font-size: 0.9em;">
                        <span>${user ? `${user.user_id} (${user.user_name})` : userId}</span>
                        <button type="button" onclick="removeAdmin('${match.match_id}', '${userId}')" style="background: none; border: none; color: white; cursor: pointer; font-size: 1.2em; line-height: 1; padding: 0;">×</button>
                    </div>
                `;
            }).join('');

            matchDetail.innerHTML = `
                <div style="border: 2px solid #2196F3; padding: 16px; border-radius: 4px; background: #f0f8ff;">
                    <div style="margin-bottom: 16px;">
                        <div style="font-size: 1.5em; font-weight: bold; color: #333; margin-bottom: 8px;">
                            ${match.match_id}
                        </div>
                        <div style="font-size: 1.1em; color: #666;">
                            <div><b>対戦チーム</b></div>
                            <div>${match.team_a_name} (${match.team_a_id})</div>
                            <div>${match.team_b_name} (${match.team_b_id})</div>
                        </div>
                        <div style="font-size: 0.95em; color: #444; margin-top: 6px;">
                            状態: <strong>${statusLabel}</strong>
                        </div>
                        <div style="font-size: 0.9em; color: #999; margin-top: 8px;">
                            <div>作成日時: ${formatDateTime(match.created_at)}</div>
                            <div>対戦開始日時: ${formatDateTime(match.scheduled_at)}</div>
                            <div>提出期限: ${formatDateTime(match.order_deadline)}</div>
                        </div>
                    </div>

                    <div style="background: white; padding: 16px; border-radius: 4px;">
                        <label style="display: block; margin-bottom: 12px; font-size: 1em;">
                            <strong>司会進行者</strong>
                        </label>
                        <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                            <select id="admin_select_${match.match_id}" style="flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1em;">
                                <option value="">選択してください</option>
                                ${allUsers.map(user => `
                                    <option value="${user.user_id}">
                                        ${user.user_id} (${user.user_name})
                                    </option>
                                `).join('')}
                            </select>
                        </div>

    <div id="admin_chips_${match.match_id}"
        style="display: flex; flex-wrap: wrap; min-height: 40px; margin-bottom: 16px;">
        ${userChips || '<p style="color: #999; margin: 0;">選択されていません</p>'}
    </div>

    <button type="button" class="btn" onclick="updateMatchAdmin('${match.match_id}')"
        style="width: 100%; padding: 12px; font-size: 1em;">更新</button>
    </div>
    </div>
    `;

            matchDetail.style.display = "block";
            // セレクトボックス選択時に即追加
            setTimeout(() => {
                const sel = document.getElementById('admin_select_' + match.match_id);
                if (sel) {
                    sel.addEventListener('change', function () {
                        if (this.value) addAdmin(match.match_id);
                    });
                }
            }, 0);
        }

        // 各マッチの選択中の管理者リストを保持
        const selectedAdmins = {};

        function addAdmin(matchId) {
            const selectElement = document.getElementById(`admin_select_${matchId}`);
            const userId = selectElement.value;

            if (!userId) {
                alert("管理者を選択してください");
                return;
            }

            // 既に選択済みかチェック
            if (!selectedAdmins[matchId]) {
                selectedAdmins[matchId] = [];
            }

            if (selectedAdmins[matchId].includes(userId)) {
                alert("この管理者は既に選択されています");
                return;
            }

            // リストに追加
            selectedAdmins[matchId].push(userId);

            // UI を更新
            updateAdminChips(matchId);
            selectElement.value = "";
        }

        function removeAdmin(matchId, userId) {
            if (!selectedAdmins[matchId]) {
                selectedAdmins[matchId] = [];
            }
            selectedAdmins[matchId] = selectedAdmins[matchId].filter(id => id !== userId);

            // UI を更新
            updateAdminChips(matchId);
        }

        function updateAdminChips(matchId) {
            // ユーザー情報を再度取得（グローバルに保持してはいない）
            fetch("/api/users")
                .then(res => res.json())
                .then(data => {
                    const users = data.users || [];
                    const adminIds = selectedAdmins[matchId] || [];
                    const chipsContainer = document.getElementById(`admin_chips_${matchId}`);

                    if (!chipsContainer) return;

                    const userChips = adminIds.map(userId => {
                        const user = users.find(u => u.user_id === userId);
                        return `
    <div
        style="display: inline-flex; align-items: center; gap: 6px; background: #2196F3; color: white; padding: 6px 10px; border-radius: 20px; margin: 4px; font-size: 0.9em;">
        <span>${user ? `${user.user_id} (${user.user_name})` : userId}</span>
        <button type="button" onclick="removeAdmin('${matchId}', '${userId}')"
            style="background: none; border: none; color: white; cursor: pointer; font-size: 1.2em; line-height: 1; padding: 0;">×</button>
    </div>
    `;
                    }).join('');

                    chipsContainer.innerHTML = userChips || '<p style="color: #999; margin: 0;">選択されていません</p>';
                });
        }

        async function updateMatchAdmin(matchId) {
            const adminUserIds = selectedAdmins[matchId] || [];

            if (adminUserIds.length === 0) {
                alert("最低1人の管理者を選択してください");
                return;
            }

            try {
                const response = await fetch("/api/match_admins", {
                    method: "PATCH",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        matchId,
                        adminUserIds: adminUserIds,
                    }),
                });

                const result = await response.json();

                if (response.ok) {
                    alert("管理者を更新しました");
                    // マッチ情報を再取得
                    await initializeMatches();
                } else {
                    alert(result.message || "更新に失敗しました");
                }
            } catch (error) {
                console.error("Error updating match admin:", error);
                alert("エラーが発生しました");
            }
        }

        function formatDateTime(datetimeText) {
            if (!datetimeText) return "";
            const date = new Date(datetimeText + "Z");
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, "0");
            const day = String(date.getDate()).padStart(2, "0");
            const hours = String(date.getHours()).padStart(2, "0");
            const minutes = String(date.getMinutes()).padStart(2, "0");
            return `${year}年${month}月${day}日 ${hours}:${minutes}`;
        }

        document.addEventListener("DOMContentLoaded", () => {
            checkAdmin();
            setTimeout(() => {
                // Enterキーで検索できるようにする
                const searchInput = document.getElementById("searchMatchId");
                if (searchInput) {
                    searchInput.addEventListener("keypress", (e) => {
                        if (e.key === "Enter") {
                            searchMatch();
                        }
                    });
                }
            }, 100);
        });
    </script>
</body>

</html>
