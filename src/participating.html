<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <script>(function () { var t = Date.now(); var files = ['./style.css', './participating.css']; files.forEach(function (f) { var l = document.createElement('link'); l.rel = 'stylesheet'; l.href = './' + f + '?t=' + t; document.head.appendChild(l); }); })();</script>
    <link rel="icon" href="./images/Logo.jpg" type="image/jpeg">
    <link rel="apple-touch-icon" sizes="180x180" href="./images/Logo.jpg">
    <link rel="manifest" href="./manifest.json">
    <title>参加チーム・メンバー | 隊抗戦</title>
</head>

<body>
    <div id="headerSlot"></div>

    <main class="container">
        <div class="card">
            <h1>参加チーム・メンバー</h1>
            <p>本大会に参加しているチームとメンバーを、1ページで確認できます。</p>
        </div>

        <div class="card public-list-card">
            <h2>参加チーム一覧</h2>
            <p>本大会に参加しているチームの一覧です。</p>
            <div class="public-stats">
                <div class="public-stat-box">
                    <div class="public-stat-label">登録チーム数</div>
                    <div id="teamCount" class="public-stat-value">0</div>
                </div>
            </div>
            <div class="public-search-row">
                <input type="text" id="teamSearchInput" class="public-search-input" placeholder="チーム名やリーダー名で検索">
                <button type="button" class="btn" id="teamSearchButton">検索</button>
                <button type="button" class="btn" id="teamClearButton">クリア</button>
            </div>


            <div class="public-table-wrap public-list-card is-hidden" id="teamListCard">
                <table class="public-table public-team-table">
                    <thead>
                        <tr>
                            <th class="col-team-name">チーム名</th>
                            <th class="col-team-leader">チームリーダー</th>
                            <th class="col-team-subleader">サブリーダー</th>
                        </tr>
                    </thead>
                    <tbody id="teamTableBody"></tbody>
                </table>
            </div>
            <p id="noTeamsMessage" class="public-empty-message">該当するチームがありません</p>
        </div>

        <div class="card public-list-card">
            <h2>参加メンバー一覧</h2>
            <p>本大会に参加しているメンバーの一覧です。</p>
            <div class="public-stats">
                <div class="public-stat-box">
                    <div class="public-stat-label">登録メンバー数</div>
                    <div id="playerCount" class="public-stat-value">0</div>
                </div>
            </div>
            <div class="public-search-row">
                <input type="text" id="memberSearchInput" class="public-search-input" placeholder="プレイヤー名や所属チームで検索">
                <button type="button" class="btn" id="memberSearchButton">検索</button>
                <button type="button" class="btn" id="memberClearButton">クリア</button>
            </div>


            <div class="public-table-wrap public-list-card is-hidden" id="memberListCard">
                <table class="public-table public-member-table">
                    <thead>
                        <tr>
                            <th class="col-player-name">プレイヤー名</th>
                            <th class="col-player-teams">所属チーム</th>
                        </tr>
                    </thead>
                    <tbody id="memberTableBody"></tbody>
                </table>
            </div>
            <p id="noMembersMessage" class="public-empty-message">該当するメンバーがありません</p>
        </div>
    </main>

    <div id="footerSlot"></div>

    <script>
        (function () {
            var t = Date.now();
            var scripts = ['./js/layout.js', './js/participating-teams-data.js', './js/participating-players-data.js'];
            function load(i) {
                if (i >= scripts.length) { if (window.__participatingInit) window.__participatingInit(); return; }
                var s = document.createElement('script');
                s.src = scripts[i] + '?t=' + t;
                s.onload = function () { load(i + 1); };
                s.onerror = function () { load(i + 1); };
                document.head.appendChild(s);
            }
            load(0);
        })();
    </script>

    <script>
        window.__participatingInit = function () {
            const allTeams = Array.isArray(window.participatingTeams) ? window.participatingTeams : [];
            const allPlayers = Array.isArray(window.participatingPlayers) ? window.participatingPlayers : [];

            function escapeHtml(value) {
                return String(value ?? "")
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/\"/g, "&quot;")
                    .replace(/'/g, "&#39;");
            }

            function renderTeams(teams) {
                const teamTableBody = document.getElementById("teamTableBody");
                const noTeamsMessage = document.getElementById("noTeamsMessage");
                if (!teamTableBody) return;
                if (teams.length === 0) { teamTableBody.innerHTML = ""; if (noTeamsMessage) noTeamsMessage.style.display = "block"; return; }
                if (noTeamsMessage) noTeamsMessage.style.display = "none";
                teamTableBody.innerHTML = teams.map((team) => `\n                <tr>\n                    <td class="col-team-name">${escapeHtml(team.team_name)}</td>\n                    <td class="col-team-leader">${escapeHtml(team.leader_name || "(未設定)")}</td>\n                    <td class="col-team-subleader">${escapeHtml(team.subleader_name || "(未設定)")}</td>\n                </tr>\n            `).join("");
            }

            function renderPlayers(players) {
                const playerTableBody = document.getElementById("memberTableBody");
                const noMembersMessage = document.getElementById("noMembersMessage");
                if (!playerTableBody) return;
                if (players.length === 0) { playerTableBody.innerHTML = ""; if (noMembersMessage) noMembersMessage.style.display = "block"; return; }
                if (noMembersMessage) noMembersMessage.style.display = "none";
                playerTableBody.innerHTML = players.map((player) => {
                    const teamNames = [player.team_name_1, player.team_name_2]
                        .map((value) => String(value || "").trim())
                        .filter(Boolean)
                        .join(" / ") || "(未所属)";
                    return `\n                    <tr>\n                        <td class="col-player-name">${escapeHtml(player.player_name)}</td>\n                        <td class="col-player-teams">${escapeHtml(teamNames)}</td>\n                    </tr>\n                `;
                }).join("");
            }

            function filterTeams() {
                const el = document.getElementById("teamSearchInput");
                const keyword = el ? el.value.trim().toLowerCase() : "";
                if (!keyword) return allTeams;
                return allTeams.filter((team) => {
                    return [team.team_name, team.leader_name, team.subleader_name]
                        .some((value) => String(value || "").toLowerCase().includes(keyword));
                });
            }

            function filterPlayers() {
                const el = document.getElementById("memberSearchInput");
                const keyword = el ? el.value.trim().toLowerCase() : "";
                return allPlayers.filter((player) => {
                    if (!keyword) return true;
                    return [player.player_name, player.team_name_1, player.team_name_2]
                        .some((value) => String(value || "").toLowerCase().includes(keyword));
                });
            }

            function showStaticData() {
                const teamListCard = document.getElementById("teamListCard");
                const memberListCard = document.getElementById("memberListCard");
                const teamStatusMessage = document.getElementById("teamStatusMessage");
                const memberStatusMessage = document.getElementById("memberStatusMessage");
                const teamCount = document.getElementById("teamCount");
                const playerCount = document.getElementById("playerCount");
                if (teamStatusMessage) teamStatusMessage.style.display = "none";
                if (memberStatusMessage) memberStatusMessage.style.display = "none";
                if (teamListCard) teamListCard.classList.remove("is-hidden");
                if (memberListCard) memberListCard.classList.remove("is-hidden");
                if (teamCount) teamCount.textContent = String(allTeams.length);
                if (playerCount) playerCount.textContent = String(allPlayers.length);
                renderTeams(filterTeams());
                renderPlayers(filterPlayers());
            }

            function attachHandlers() {
                const teamSearchButton = document.getElementById("teamSearchButton");
                if (teamSearchButton) teamSearchButton.addEventListener("click", () => renderTeams(filterTeams()));
                const teamClearButton = document.getElementById("teamClearButton");
                if (teamClearButton) teamClearButton.addEventListener("click", () => { const el = document.getElementById("teamSearchInput"); if (el) el.value = ""; renderTeams(filterTeams()); });
                const teamSearchInput = document.getElementById("teamSearchInput");
                if (teamSearchInput) teamSearchInput.addEventListener("keydown", (event) => { if (event.key === "Enter") renderTeams(filterTeams()); });
                const memberSearchButton = document.getElementById("memberSearchButton");
                if (memberSearchButton) memberSearchButton.addEventListener("click", () => renderPlayers(filterPlayers()));
                const memberClearButton = document.getElementById("memberClearButton");
                if (memberClearButton) memberClearButton.addEventListener("click", () => { const el = document.getElementById("memberSearchInput"); if (el) el.value = ""; renderPlayers(filterPlayers()); });
                const memberSearchInput = document.getElementById("memberSearchInput");
                if (memberSearchInput) memberSearchInput.addEventListener("keydown", (event) => { if (event.key === "Enter") renderPlayers(filterPlayers()); });
            }

            function init() { attachHandlers(); showStaticData(); }

            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
        };
    </script>
</body>

</html>
