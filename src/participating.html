<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <script>(function () { var t = Date.now(); var files = ['./style.css', './participating.css']; files.forEach(function (f) { var l = document.createElement('link'); l.rel = 'stylesheet'; l.href = './' + f + '?t=' + t; document.head.appendChild(l); }); })();</script>
    <link rel="icon" href="./images/Logo.jpg" type="image/jpeg">
    <link rel="apple-touch-icon" sizes="180x180" href="./images/Logo.jpg">
    <link rel="manifest" href="./manifest.json">
    <title>参加チーム・メンバー | 隊抗戦</title>
</head>

<body>
    <div id="headerSlot"></div>

    <main class="container">
        <div class="card">
            <h1>参加チーム・メンバー</h1>
        </div>

        <div class="card public-list-card">
            <h2>参加チーム一覧</h2>
            <div class="public-stats">
                <div class="public-stat-box">
                    <div class="public-stat-label">登録チーム数</div>
                    <div id="teamCount" class="public-stat-value">0</div>
                </div>
            </div>
            <div class="public-search-row">
                <input type="text" id="teamSearchInput" class="public-search-input" placeholder="チーム名やリーダー名で検索">
                <button type="button" class="btn" id="teamSearchButton">検索</button>
                <button type="button" class="btn" id="teamClearButton">クリア</button>
            </div>


            <div class="public-table-wrap public-list-card is-hidden" id="teamCardsContainer">
                <div id="teamCards" class="team-cards" aria-live="polite"></div>
            </div>
            <p id="noTeamsMessage" class="public-empty-message">該当するチームがありません</p>
        </div>

        <!-- 参加メンバー一覧は非表示にしました -->
    </main>

    <!-- Team modal (hidden by default) -->
    <div id="teamModal" class="modal is-hidden" aria-hidden="true">
        <div class="modal-backdrop" id="teamModalBackdrop"></div>
        <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="teamModalTitle">
            <button class="modal-close" id="teamModalClose" aria-label="閉じる">×</button>
            <h3 id="teamModalTitle"></h3>
            <div id="teamModalBody" class="team-modal-body"></div>
        </div>
    </div>

    <div id="footerSlot"></div>

    <script>
        (function () {
            var t = Date.now();
            var scripts = ['./js/layout.js', './js/participating-teams-data.js', './js/participating-players-data.js'];
            function load(i) {
                if (i >= scripts.length) { if (window.__participatingInit) window.__participatingInit(); return; }
                var s = document.createElement('script');
                s.src = scripts[i] + '?t=' + t;
                s.onload = function () { load(i + 1); };
                s.onerror = function () { load(i + 1); };
                document.head.appendChild(s);
            }

            /* Modal logic */
            window.renderTeamModal = function (teamName) {
                const titleEl = document.getElementById('teamModalTitle');
                const bodyEl = document.getElementById('teamModalBody');
                if (!bodyEl || !titleEl) return;
                const teams = Array.isArray(window.participatingTeams) ? window.participatingTeams : [];
                const players = Array.isArray(window.participatingPlayers) ? window.participatingPlayers : [];
                const team = teams.find((t) => t.team_name === teamName) || { team_name: teamName };
                titleEl.textContent = team.team_name || teamName;
                // default: show title; if no members we'll hide title to maximize image area
                titleEl.style.display = '';
                const members = players.filter((p) => p.team_name_1 === teamName || p.team_name_2 === teamName);
                if (members.length === 0) {
                    // hide title to give more room to image
                    titleEl.style.display = 'none';
                    const modalEl = document.getElementById('teamModal');
                    if (modalEl) modalEl.classList.add('modal-full');
                    bodyEl.innerHTML = `
                                            <div class="modal-inner" style="padding:0;margin:0;width:100%;">
                                                <img src="./images/teamList/demo1.png" alt="メンバー画像" style="display:block;">
                                            </div>
                                        `;
                    return;
                }
                // ensure title is visible when rendering members
                titleEl.style.display = '';
                const modalEl = document.getElementById('teamModal');
                if (modalEl) modalEl.classList.remove('modal-full');
                bodyEl.innerHTML = members.map((m) => {
                    const img = m.image || './images/teamList/demo1.png';
                    return `\n                        <div class="team-member-item">\n                            <img src="${img}" alt="${escapeHtml(m.player_name)}" class="team-member-thumb" loading="lazy">\n                            <div class="team-member-name">${escapeHtml(m.player_name)}</div>\n                        </div>\n                    `;
                }).join('');
            }

            window.openTeamModal = function (teamName) {
                window.renderTeamModal(teamName);
                const modal = document.getElementById('teamModal');
                if (!modal) return;
                modal.classList.remove('is-hidden');
                modal.setAttribute('aria-hidden', 'false');
                document.body.classList.add('no-scroll');
            }

            window.closeTeamModal = function () {
                const modal = document.getElementById('teamModal');
                if (!modal) return;
                modal.classList.add('is-hidden');
                modal.setAttribute('aria-hidden', 'true');
                document.body.classList.remove('no-scroll');
            }

            // modal event handlers
            document.addEventListener('click', function (ev) {
                const backdrop = document.getElementById('teamModalBackdrop');
                if (backdrop && ev.target === backdrop) closeTeamModal();
            });
            document.addEventListener('keydown', function (ev) {
                if (ev.key === 'Escape') closeTeamModal();
            });
            document.addEventListener('click', function (ev) {
                const closeBtn = document.getElementById('teamModalClose');
                if (closeBtn && ev.target === closeBtn) closeTeamModal();
            });
            load(0);
        })();
    </script>

    <script>
        window.__participatingInit = function () {
            const allTeams = Array.isArray(window.participatingTeams) ? window.participatingTeams : [];
            const allPlayers = Array.isArray(window.participatingPlayers) ? window.participatingPlayers : [];

            function escapeHtml(value) {
                return String(value ?? "")
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/\"/g, "&quot;")
                    .replace(/'/g, "&#39;");
            }

            function renderTeams(teams) {
                const container = document.getElementById("teamCardsContainer");
                const cardsEl = document.getElementById("teamCards");
                const noTeamsMessage = document.getElementById("noTeamsMessage");
                if (!cardsEl) return;
                if (!Array.isArray(teams) || teams.length === 0) {
                    cardsEl.innerHTML = "";
                    if (container) container.classList.add("is-hidden");
                    if (noTeamsMessage) noTeamsMessage.style.display = "block";
                    return;
                }
                if (noTeamsMessage) noTeamsMessage.style.display = "none";
                if (container) container.classList.remove("is-hidden");

                cardsEl.innerHTML = teams.map((team) => {
                    const imgSrc = team.image || './images/teamList/demo1_thumbnail.png';
                    return `\n                    <article class="team-card" data-team-name="${escapeHtml(team.team_name)}">\n                        <img class="team-card-img" src="${imgSrc}" alt="${escapeHtml(team.team_name || 'チーム')}" loading="lazy">\n                        <div class="team-card-meta">\n                            <div class="team-card-leaders">リーダー: ${escapeHtml(team.leader_name || '(未設定)')} / サブ: ${escapeHtml(team.subleader_name || '(未設定)')}</div>\n                        </div>\n                    </article>\n                `;
                }).join("");

                // attach click handlers to open modal
                cardsEl.querySelectorAll('.team-card').forEach(function (el) {
                    el.addEventListener('click', function () {
                        const teamName = el.getAttribute('data-team-name') || '';
                        openTeamModal(teamName);
                    });
                });
            }


            function filterTeams() {
                const el = document.getElementById("teamSearchInput");
                const keyword = el ? el.value.trim().toLowerCase() : "";
                if (!keyword) return allTeams;
                return allTeams.filter((team) => {
                    // match against team fields
                    const basicMatch = [team.team_name, team.leader_name, team.subleader_name]
                        .some((value) => String(value || "").toLowerCase().includes(keyword));
                    if (basicMatch) return true;

                    // also match against member names belonging to this team
                    return allPlayers.some((p) => {
                        const belongs = (p.team_name_1 === team.team_name) || (p.team_name_2 === team.team_name);
                        if (!belongs) return false;
                        return String(p.player_name || "").toLowerCase().includes(keyword);
                    });
                });
            }


            function showStaticData() {
                const teamCardsContainer = document.getElementById("teamCardsContainer");
                const teamStatusMessage = document.getElementById("teamStatusMessage");
                const teamCount = document.getElementById("teamCount");
                if (teamStatusMessage) teamStatusMessage.style.display = "none";
                if (teamCardsContainer) teamCardsContainer.classList.remove("is-hidden");
                if (teamCount) teamCount.textContent = String(allTeams.length);
                renderTeams(filterTeams());
            }

            function attachHandlers() {
                const teamSearchButton = document.getElementById("teamSearchButton");
                if (teamSearchButton) teamSearchButton.addEventListener("click", () => renderTeams(filterTeams()));
                const teamClearButton = document.getElementById("teamClearButton");
                if (teamClearButton) teamClearButton.addEventListener("click", () => { const el = document.getElementById("teamSearchInput"); if (el) el.value = ""; renderTeams(filterTeams()); });
                const teamSearchInput = document.getElementById("teamSearchInput");
                if (teamSearchInput) teamSearchInput.addEventListener("keydown", (event) => { if (event.key === "Enter") renderTeams(filterTeams()); });
                // メンバー一覧は削除済みのため、関連ハンドラはなし
            }

            function init() { attachHandlers(); showStaticData(); }

            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
        };
    </script>
</body>

</html>
