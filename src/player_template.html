<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="icon" href="./images/Logo.jpg" type="image/jpeg">
    <link rel="apple-touch-icon" sizes="180x180" href="./images/Logo.jpg">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#2563eb">
    <title>定型文作成ツール</title>
</head>

<body>
    <div id="headerSlot"></div>

    <main class="container">
        <div class="card announcement-tool-card">
            <div class="announcement-tool-hero">
                <div>
                    <h1 class="announcement-tool-title">定型文作成ツール</h1>
                    <p class="announcement-tool-description">プルダウンで選択して定型文を作成・コピーします。</p>
                </div>
            </div>
        </div>

        <div class="card announcement-tool-card" id="announcementSettingsCard">
            <h2>選手用設定</h2>
            <div class="announcement-tool-settings">

                <!--
                <label class="announcement-tool-setting announcement-tool-setting-inline">
                    <span class="announcement-tool-setting-label">役職</span>
                    <select id="roleSelect" class="announcement-tool-select"></select>
                </label>
                -->

                <!--
                <label class="announcement-tool-setting announcement-tool-setting-inline">
                    <span class="announcement-tool-setting-label">戦目</span>
                    <select id="battleSelect" class="announcement-tool-select"></select>
                </label>
                -->

                <label class="announcement-tool-setting announcement-tool-setting-inline">
                    <span class="announcement-tool-setting-label">デッキ</span>
                    <select id="deckSelect" class="announcement-tool-select"></select>
                </label>

                <label class="announcement-tool-setting announcement-tool-setting-inline">
                    <span class="announcement-tool-setting-label">結果</span>
                    <select id="resultSelect" class="announcement-tool-select"></select>
                </label>

                <div style="margin-top:8px">
                    <button id="copyCurrent" class="btn">コピー</button>
                </div>

                <div class="announcement-tool-status-row" style="margin-top:12px">
                    <div id="preview" class="announcement-tool-preview-line">-- プレビュー --</div>
                </div>
            </div>
        </div>

    </main>

    <div id="footerSlot"></div>
    <div id="copyToast" class="announcement-copy-toast" aria-live="polite"></div>
    <script src="./js/layout.js"></script>

    <script>
        // const roles = ['先鋒', '次鋒', '中堅', '副将', '大将'];
        // const battles = [1, 2, 3];

        const decks = ['神', '魔', '竜', '混合'];
        const results = [
            { key: 'win', label: '勝ちました。' },
            { key: 'lose', label: '負けました。' }
        ];

        /*
        function toFullWidth(n) {
            return String(n).replace(/[0-9]/g, c => String.fromCharCode(0xFF10 + (c.charCodeAt(0) - 48)));
        }
        */

        /*
        function buildSentence(role, battle, deck, resultLabel) {
            return `${role}、${toFullWidth(battle)}戦目${deck}デッキを使用し、${resultLabel}`;
        }
        */

        function buildSentence(deck, resultLabel) {
            return `${deck}デッキを使用し、${resultLabel}`;
        }

        function populate(selectEl, items, getLabel) {
            selectEl.innerHTML = items.map(it => {
                const label = getLabel ? getLabel(it) : it;
                return `<option value="${encodeURIComponent(String(it))}">${label}</option>`;
            }).join('');
        }

        async function copyText(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                await navigator.clipboard.writeText(text);
            } else {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
            }
        }

        let copyStatusTimerId = null;

        function showCopyStatus(message) {
            let copyToast = document.getElementById('copyToast');

            if (!copyToast) {
                copyToast = document.createElement('div');
                copyToast.id = 'copyToast';
                copyToast.className = 'announcement-copy-toast';
                copyToast.setAttribute('aria-live', 'polite');
                document.body.appendChild(copyToast);
            }

            copyToast.textContent = message;
            copyToast.classList.add('is-visible');

            if (copyStatusTimerId) window.clearTimeout(copyStatusTimerId);

            copyStatusTimerId = window.setTimeout(() => {
                copyToast.textContent = '';
                copyToast.classList.remove('is-visible');
            }, 2000);
        }

        function updatePreview() {
            // const role = decodeURIComponent(document.getElementById('roleSelect').value);
            // const battle = Number(decodeURIComponent(document.getElementById('battleSelect').value));

            const deck = decodeURIComponent(document.getElementById('deckSelect').value);
            const resultLabel = results.find(r => r.key === document.getElementById('resultSelect').value).label;

            const sentence = buildSentence(deck, resultLabel);

            document.getElementById('preview').textContent = sentence;
            return sentence;
        }

        document.addEventListener('DOMContentLoaded', () => {
            // populate(document.getElementById('roleSelect'), roles, r => r);
            // populate(document.getElementById('battleSelect'), battles, b => `${b}戦目`);

            populate(document.getElementById('deckSelect'), decks, d => d);
            populate(
                document.getElementById('resultSelect'),
                results.map(r => r.key),
                k => results.find(r => r.key === k).label
            );

            // document.getElementById('roleSelect').addEventListener('change', updatePreview);
            // document.getElementById('battleSelect').addEventListener('change', updatePreview);

            document.getElementById('deckSelect').addEventListener('change', updatePreview);
            document.getElementById('resultSelect').addEventListener('change', updatePreview);

            document.getElementById('copyCurrent').addEventListener('click', async () => {
                const s = updatePreview();

                try {
                    await copyText(s);
                    showCopyStatus('コピーしました');
                } catch (e) {
                    alert('コピーに失敗しました');
                }
            });

            updatePreview();
        });
    </script>
</body>

</html>
