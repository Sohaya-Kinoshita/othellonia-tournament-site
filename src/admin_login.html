<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="icon" href="./images/oc_mark.png" type="image/png">
    <title>管理者ログイン - 隊抗戦</title>
    <!-- Google reCAPTCHA v3 -->
    <script src="https://www.google.com/recaptcha/api.js?render=6LcfBYUsAAAAAKFBg0zxYsQJTsYJcAmTwTte_wCj"></script>
</head>

<body>
    <div id="headerSlot"></div>

    <main class="login-container">
        <div class="login-box">
            <h1>管理者ログイン</h1>

            <form id="adminLoginForm" class="login-form">
                <div class="form-group">
                    <input type="text" id="adminId" name="adminId" placeholder="管理者ID" required>
                </div>

                <div class="form-group">
                    <input type="password" id="adminPassword" name="adminPassword" placeholder="パスワード" required>
                </div>

                <button type="submit" class="login-btn">ログインする</button>
            </form>

            <div id="errorMessage" class="error-message hidden"></div>

            <div class="login-footer">
                <a href="./login.html" class="signup-link">プレイヤーログインページはこちら</a>
            </div>
        </div>
    </main>

    <div id="footerSlot"></div>

    <script src="./js/layout.js"></script>
    <script>
        const adminLoginForm = document.getElementById('adminLoginForm');
        const errorMessage = document.getElementById('errorMessage');
        const adminIdInput = document.getElementById('adminId');
        const adminPasswordInput = document.getElementById('adminPassword');
        const RECAPTCHA_SITE_KEY = '6LcfBYUsAAAAAKFBg0zxYsQJTsYJcAmTwTte_wCj';

        adminLoginForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const adminId = adminIdInput.value.trim();
            const adminPassword = adminPasswordInput.value.trim();

            // バリデーション
            if (!adminId) {
                errorMessage.textContent = '管理者IDを入力してください';
                errorMessage.style.display = 'block';
                return;
            }

            if (!adminPassword) {
                errorMessage.textContent = 'パスワードを入力してください';
                errorMessage.style.display = 'block';
                return;
            }

            errorMessage.style.display = 'none';

            try {
                // Google reCAPTCHA v3 トークンを取得
                let captchaToken = '';
                try {
                    captchaToken = await new Promise((resolve, reject) => {
                        grecaptcha.ready(async () => {
                            try {
                                const token = await grecaptcha.execute(RECAPTCHA_SITE_KEY, { action: 'admin_login' });
                                resolve(token);
                            } catch (err) {
                                reject(err);
                            }
                        });
                    });
                } catch (err) {
                    console.warn('reCAPTCHA token generation failed:', err);
                }

                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        userId: adminId,
                        password: adminPassword,
                        captchaToken: captchaToken  // キャプチャトークンを追加
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    location.href = './admin.html';
                } else {
                    errorMessage.textContent = result.message || 'ログインに失敗しました';
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                errorMessage.textContent = 'エラーが発生しました';
                errorMessage.style.display = 'block';
                console.error('Admin login error:', error);
            }
        });
    </script>
</body>

</html>
