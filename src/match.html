<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="icon" href="./images/oc_mark.png" type="image/png">
    <title>対戦カード | 隊抗戦</title>
</head>

<body>
    <div id="headerSlot"></div>

    <main class="container">
        <div class="card">
            <h1>対戦カード</h1>
            <hr>
            <p>本日の対戦カードと、今後対戦予定のカードを表示します。</p>
        </div>

        <section class="card match-section">
            <div class="match-section-header-row">
                <h2 class="match-section-title">本日の対戦カード</h2>
                <button type="button" id="todaySectionToggleButton" class="btn match-toggle-btn">閉じる</button>
            </div>
            <div id="todaySectionContent">
                <div id="todayMatchCards">読込中...</div>
            </div>
        </section>

        <section class="card match-section">
            <h2 class="match-section-title">今後対戦予定のカード</h2>
            <div id="upcomingMatchCards">読込中...</div>
        </section>
    </main>

    <div id="footerSlot"></div>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="./js/layout.js"></script>
    <script src="./js/exportCard.js"></script>
    <script>
        function escapeHtml(value) {
            return String(value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function parseDateTime(datetimeText) {
            if (!datetimeText) {
                return null;
            }
            const normalized = String(datetimeText).replace(" ", "T");
            const date = new Date(normalized);
            return Number.isNaN(date.getTime()) ? null : date;
        }

        function formatDateTime(datetimeText) {
            const date = parseDateTime(datetimeText);
            if (!date) {
                return "日時未設定";
            }
            return date.toLocaleString("ja-JP", {
                year: "numeric",
                month: "numeric",
                day: "numeric",
                hour: "2-digit",
                minute: "2-digit",
            });
        }

        const DAY_RESET_HOUR = 4;

        function toJstOperationalDateKey(date) {
            const shifted = new Date(date.getTime() - DAY_RESET_HOUR * 60 * 60 * 1000);
            return shifted.toLocaleDateString("ja-JP", {
                timeZone: "Asia/Tokyo",
                year: "numeric",
                month: "2-digit",
                day: "2-digit",
            });
        }

        function buildPlayerItem(playerName, streamStatus, mirrativUrl, mirrativId, customMirrativUrl, isLiveGame = false, liveWins = 0) {
            const normalizedStatus = ["available", "unavailable", "undecided"].includes(streamStatus)
                ? streamStatus
                : null;
            const hasCustomLiveUrl = !!customMirrativUrl;
            const fallbackUrl = mirrativUrl || (mirrativId ? `https://www.mirrativ.com/user/${encodeURIComponent(mirrativId)}` : "");
            const hasMirrativ = !!fallbackUrl;
            const safeName = escapeHtml(playerName || "未定");
            const statusClass = normalizedStatus === "unavailable"
                ? "player-status unavailable"
                : normalizedStatus === "undecided"
                    ? "player-status"
                    : hasMirrativ
                        ? "player-status"
                        : "player-status unavailable";
            const statusText = normalizedStatus === "unavailable"
                ? "予定無し"
                : normalizedStatus === "undecided"
                    ? "配信未定"
                    : hasMirrativ
                        ? "配信予定あり"
                        : "予定無し";
            const linkHtml = hasMirrativ && (normalizedStatus !== "unavailable")
                ? `<a href="${escapeHtml(fallbackUrl)}" target="_blank" rel="noopener" class="player-link">${hasCustomLiveUrl ? "▷配信中！配信を見る" : "▷ミラティブアカウント"}</a>`
                : "";
            const liveBadgeHtml = isLiveGame
                ? `<div class="player-live-badges"><div class="player-live-badge">試合中！</div><div class="player-win-badge">${Number(liveWins || 0)}勝</div></div>`
                : "";

            return `
                <div class="player-item">
                    ${liveBadgeHtml}
                    <div class="player-name">${safeName}</div>
                    <div class="player-separator"></div>
                    <div class="${statusClass}">${statusText}</div>
                    <div class="player-link-row">${linkHtml || '<span class="player-link-placeholder" aria-hidden="true"></span>'}</div>
                </div>
            `;
        }

        function getMatchStatusLabel(matchStatus) {
            if (matchStatus === "in_progress") {
                return "対戦中";
            }
            if (matchStatus === "finished") {
                return "対戦終了";
            }
            return "対戦前";
        }

        function getMatchStatusClass(matchStatus) {
            if (matchStatus === "in_progress") {
                return "status-in-progress";
            }
            if (matchStatus === "finished") {
                return "status-finished";
            }
            return "status-before";
        }

        function buildMatchMetaHtml(match, showStatus) {
            const statusLabel = getMatchStatusLabel(match.match_status);
            const statusHtml = showStatus
                ? `<span class="match-status-pill ${getMatchStatusClass(match.match_status)}">${escapeHtml(statusLabel)}</span>`
                : "";

            return `
                <div class="match-meta-grid">
                    <div class="match-meta-section">
                        <div class="match-meta-title">対戦参加チーム</div>
                        <div class="match-meta-team-list">
                            <span class="match-meta-team-chip team-a-chip">${escapeHtml(match.team_a_name)}</span>
                            <span class="match-meta-team-chip team-b-chip">${escapeHtml(match.team_b_name)}</span>
                        </div>
                    </div>
                    <div class="match-meta-section">
                        <div class="match-meta-title">対戦日</div>
                        <div class="match-meta-datetime-row">
                            <span class="match-meta-datetime">${escapeHtml(formatDateTime(match.scheduled_at))}～</span>
                            ${statusHtml}
                        </div>
                    </div>
                </div>
            `;
        }

        function getTeamResultLabel(match, games, teamId) {
            const teamAWins = games.filter((game) => game.winner_team_id === match.team_a_id).length;
            const teamBWins = games.filter((game) => game.winner_team_id === match.team_b_id).length;

            if (teamAWins === teamBWins) {
                return "";
            }

            if (teamId === match.team_a_id) {
                return teamAWins > teamBWins ? "勝ち" : "負け";
            }
            if (teamId === match.team_b_id) {
                return teamBWins > teamAWins ? "勝ち" : "負け";
            }
            return "";
        }

        function buildTodayMatchCardHtml(match, cardData) {
            const cardId = `matchCard_${escapeHtml(match.match_id)}`;
            const exportBtnId = `exportBtn_${escapeHtml(match.match_id)}`;
            const detailId = `matchDetail_${escapeHtml(match.match_id)}`;
            const toggleBtnId = `toggleDetailBtn_${escapeHtml(match.match_id)}`;
            const games = cardData?.games || [];

            if (games.length === 0) {
                return "";
            }

            const teamAWinCount = games.filter((game) => game.winner_team_id === match.team_a_id).length;
            const teamBWinCount = games.filter((game) => game.winner_team_id === match.team_b_id).length;

            const teamAResult = getTeamResultLabel(match, games, match.team_a_id);
            const teamBResult = getTeamResultLabel(match, games, match.team_b_id);
            const teamAResultHtml = teamAResult
                ? `<div class="team-result-badge ${teamAResult === "勝ち" ? "is-win" : "is-lose"}">${teamAResult}</div>`
                : "";
            const teamBResultHtml = teamBResult
                ? `<div class="team-result-badge ${teamBResult === "勝ち" ? "is-win" : "is-lose"}">${teamBResult}</div>`
                : "";
            const teamAWinCountHtml = `<div class="team-win-summary">${teamAWinCount}勝</div>`;
            const teamBWinCountHtml = `<div class="team-win-summary">${teamBWinCount}勝</div>`;
            const currentLiveGame = match.match_status === "in_progress"
                ? games.find((game) => !game.winner_player_id)
                : null;
            const liveGameNumber = currentLiveGame ? currentLiveGame.game_number : null;
            const liveTeamAWins = currentLiveGame ? Number(currentLiveGame.player_a_score || 0) : 0;
            const liveTeamBWins = currentLiveGame ? Number(currentLiveGame.player_b_score || 0) : 0;

            const teamAPlayers = games.map((game) => ({
                player_id: game.player_a_id,
                player_name: game.player_a_name,
                stream_status: game.player_a_stream_status,
                mirrativ_url: game.player_a_mirrativ_url,
                mirrativ_id: game.player_a_mirrativ_id,
                custom_mirrativ_url: game.player_a_plan_mirrativ_url,
                is_live_game: liveGameNumber !== null && game.game_number === liveGameNumber,
                live_wins: liveTeamAWins,
            }));
            const teamBPlayers = games.map((game) => ({
                player_id: game.player_b_id,
                player_name: game.player_b_name,
                stream_status: game.player_b_stream_status,
                mirrativ_url: game.player_b_mirrativ_url,
                mirrativ_id: game.player_b_mirrativ_id,
                custom_mirrativ_url: game.player_b_plan_mirrativ_url,
                is_live_game: liveGameNumber !== null && game.game_number === liveGameNumber,
                live_wins: liveTeamBWins,
            }));

            const teamAHtml = teamAPlayers.length > 0
                ? teamAPlayers.map((player) => buildPlayerItem(player.player_name, player.stream_status, player.mirrativ_url, player.mirrativ_id, player.custom_mirrativ_url, player.is_live_game, player.live_wins)).join("")
                : buildPlayerItem("対戦カード未確定", "undecided", "", null, "", false, 0);
            const teamBHtml = teamBPlayers.length > 0
                ? teamBPlayers.map((player) => buildPlayerItem(player.player_name, player.stream_status, player.mirrativ_url, player.mirrativ_id, player.custom_mirrativ_url, player.is_live_game, player.live_wins)).join("")
                : buildPlayerItem("対戦カード未確定", "undecided", "", null, "", false, 0);

            return `
                <div class="match-card" id="${cardId}" style="margin-top: 12px;">
                    <div class="match-datetime has-detail-toggle">
                        ${buildMatchMetaHtml(match, true)}
                        <button type="button" id="${toggleBtnId}" class="btn match-detail-toggle-btn">開く</button>
                    </div>
                    <div id="${detailId}" class="match-card-detail is-collapsed">
                        <div class="teams-container">
                            <div class="team team-a">
                                ${teamAWinCountHtml}
                                <div class="team-name">${escapeHtml(match.team_a_name)}</div>
                                ${teamAResultHtml}
                                ${teamAHtml}
                            </div>
                            <div class="team team-b">
                                ${teamBWinCountHtml}
                                <div class="team-name">${escapeHtml(match.team_b_name)}</div>
                                ${teamBResultHtml}
                                ${teamBHtml}
                            </div>
                        </div>
                        <button id="${exportBtnId}" class="export-btn">📷 画像として保存</button>
                    </div>
                </div>
            `;
        }

        function buildUpcomingMatchCardHtml(match) {
            return `
                <div class="match-card" style="margin-top: 12px;">
                    <div class="match-datetime">
                        ${buildMatchMetaHtml(match, false)}
                    </div>
                </div>
            `;
        }

        async function fetchMatchCard(matchId) {
            const response = await fetch(`/api/match-card?matchId=${encodeURIComponent(matchId)}`);
            const result = await response.json();
            if (!response.ok) {
                throw new Error(result.message || "対戦カード取得に失敗しました");
            }
            return result;
        }

        async function renderMatchCards(matches, targetElement, mode) {
            if (!matches.length) {
                targetElement.innerHTML = "<p style=\"color:#999;\">該当する対戦カードはありません</p>";
                return;
            }

            targetElement.innerHTML = "";
            let renderedCount = 0;

            for (const match of matches) {
                try {
                    if (mode === "upcoming") {
                        const cardHtml = buildUpcomingMatchCardHtml(match);
                        renderedCount += 1;
                        targetElement.insertAdjacentHTML("beforeend", cardHtml);
                        continue;
                    }

                    const cardData = await fetchMatchCard(match.match_id);
                    const cardHtml = buildTodayMatchCardHtml(match, cardData);
                    if (!cardHtml) {
                        continue;
                    }

                    renderedCount += 1;
                    targetElement.insertAdjacentHTML("beforeend", cardHtml);

                    const exportButton = document.getElementById(`exportBtn_${match.match_id}`);
                    const detailToggleButton = document.getElementById(`toggleDetailBtn_${match.match_id}`);
                    const detailElement = document.getElementById(`matchDetail_${match.match_id}`);

                    if (detailToggleButton && detailElement) {
                        detailToggleButton.addEventListener("click", () => {
                            const isCollapsed = detailElement.classList.contains("is-collapsed");
                            if (isCollapsed) {
                                detailElement.classList.remove("is-collapsed");
                                detailToggleButton.textContent = "閉じる";
                            } else {
                                detailElement.classList.add("is-collapsed");
                                detailToggleButton.textContent = "開く";
                            }
                        });
                    }

                    if (exportButton) {
                        exportButton.addEventListener("click", function () {
                            exportCardAsImage(`matchCard_${match.match_id}`, `対戦カード_${match.match_id}`, this);
                        });
                    }
                } catch (error) {
                    const errorCard = document.createElement("div");
                    errorCard.className = "match-card";
                    errorCard.style.marginTop = "12px";
                    errorCard.innerHTML = `
                        <div class="match-datetime">
                            <div>${escapeHtml(formatDateTime(match.scheduled_at))}～</div>
                        </div>
                        <p style="margin:0; color:#c62828;">${escapeHtml(match.match_id)} の対戦カード取得に失敗しました</p>
                    `;
                    targetElement.appendChild(errorCard);
                }
            }

            if (renderedCount === 0) {
                targetElement.innerHTML = "<p style=\"color:#999;\">該当する対戦カードはありません</p>";
            }
        }

        async function loadMatchPage() {
            const todayContainer = document.getElementById("todayMatchCards");
            const upcomingContainer = document.getElementById("upcomingMatchCards");

            try {
                const response = await fetch("/api/matches");
                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.message || "マッチ一覧の取得に失敗しました");
                }

                const now = new Date();
                const todayKey = toJstOperationalDateKey(now);

                const matches = (result.matches || [])
                    .filter((match) => match.scheduled_at)
                    .map((match) => ({ ...match, _scheduledDate: parseDateTime(match.scheduled_at) }))
                    .filter((match) => match._scheduledDate)
                    .sort((a, b) => {
                        const aPriority = a.match_status === "in_progress" ? 0 : 1;
                        const bPriority = b.match_status === "in_progress" ? 0 : 1;
                        if (aPriority !== bPriority) {
                            return aPriority - bPriority;
                        }
                        return a._scheduledDate - b._scheduledDate;
                    });

                const todayMatches = matches.filter((match) => toJstOperationalDateKey(match._scheduledDate) === todayKey);
                const upcomingMatches = matches
                    .filter((match) => toJstOperationalDateKey(match._scheduledDate) > todayKey)
                    .filter((match) => match.match_status !== "finished");

                await renderMatchCards(todayMatches, todayContainer, "today");
                await renderMatchCards(upcomingMatches, upcomingContainer, "upcoming");
            } catch (error) {
                console.error("Match page load error:", error);
                todayContainer.innerHTML = "<p style=\"color:#c62828;\">対戦カードの読み込みに失敗しました</p>";
                upcomingContainer.innerHTML = "<p style=\"color:#c62828;\">対戦カードの読み込みに失敗しました</p>";
            }
        }

        function setupTodaySectionToggle() {
            const toggleButton = document.getElementById("todaySectionToggleButton");
            const sectionContent = document.getElementById("todaySectionContent");
            if (!toggleButton || !sectionContent) {
                return;
            }

            toggleButton.addEventListener("click", () => {
                const isHidden = sectionContent.classList.contains("is-collapsed");
                if (isHidden) {
                    sectionContent.classList.remove("is-collapsed");
                    toggleButton.textContent = "閉じる";
                } else {
                    sectionContent.classList.add("is-collapsed");
                    toggleButton.textContent = "開く";
                }
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            setupTodaySectionToggle();
            loadMatchPage();
        });
    </script>
</body>

</html>
