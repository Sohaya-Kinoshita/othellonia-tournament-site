<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
    <title>試合一覧</title>
</head>

<body>
    <div id="headerSlot"></div>

    <main class="container">
        <div class="card">
            <h1>試合一覧</h1>
            <p id="adminMessage">確認中...</p>
            <a href="./admin.html" class="btn">管理者ページに戻る</a>
        </div>

        <div class="card hidden" id="matchListCard">
            <h2>登録されている試合</h2>


            <div class="match-list-search-row">
                <select id="searchFieldSelect" class="match-list-search-select">
                    <option value="match_id">試合ID</option>
                    <option value="team">チーム名</option>
                    <option value="status">進行状況</option>
                    <option value="admin">管理者</option>
                </select>
                <input type="text" id="matchSearchInput" placeholder="キーワードを入力..." />
                <select id="statusSelect" class="match-list-search-select" style="display:none;">
                    <option value="">すべて</option>
                    <option value="before">試合前</option>
                    <option value="in_progress">進行中</option>
                    <option value="finished">完了</option>
                </select>
                <button type="button" class="btn" id="searchButton">検索</button>
                <button type="button" class="btn" id="clearButton">クリア</button>
            </div>

            <p id="matchCountText" class="match-list-count">0件</p>

            <div id="matchListContainer" class="match-list-table-wrap">
                <table class="match-list-table">
                    <thead>
                        <tr>
                            <th class="match-list-col-id">試合ID</th>
                            <th class="match-list-col-card">対戦カード</th>
                            <th class="match-list-col-date">試合日時</th>
                            <th class="match-list-col-status">進行状況</th>
                            <th class="match-list-col-admin">管理者</th>
                            <th class="match-list-col-actions">操作</th>
                        </tr>
                    </thead>
                    <tbody id="matchTableBody"></tbody>
                </table>
            </div>
            <p id="noMatchesMessage" class="match-list-empty-message">該当する試合がありません</p>
        </div>
    </main>

    <div id="footerSlot"></div>

    <script src="./js/layout.js"></script>
    <script>
        let allMatches = [];
        let allUsers = [];
        let userIdToName = {};

        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function formatDateTime(datetimeText) {
            if (!datetimeText) {
                return "-";
            }
            const normalized = String(datetimeText).replace(" ", "T");
            const date = new Date(normalized);
            if (Number.isNaN(date.getTime())) {
                return "-";
            }
            return date.toLocaleString("ja-JP", {
                year: "numeric",
                month: "numeric",
                day: "numeric",
                hour: "2-digit",
                minute: "2-digit",
            });
        }

        function getStatusMeta(matchStatus) {
            if (matchStatus === "finished") {
                return { label: "完了", className: "status-finished" };
            }
            if (matchStatus === "in_progress") {
                return { label: "進行中", className: "status-in-progress" };
            }
            return { label: "試合前", className: "status-before" };
        }

        function toSearchText(match) {
            const statusMeta = getStatusMeta(match.match_status);
            return [
                match.match_id,
                match.team_a_name,
                match.team_b_name,
                statusMeta.label,
                match.match_status,
            ]
                .join(" ")
                .toLowerCase();
        }

        function renderMatches(matchesToRender) {
            const matchTableBody = document.getElementById("matchTableBody");
            const noMatchesMessage = document.getElementById("noMatchesMessage");
            const matchCountText = document.getElementById("matchCountText");

            matchCountText.textContent = `${matchesToRender.length}件`;

            if (matchesToRender.length === 0) {
                matchTableBody.innerHTML = "";
                noMatchesMessage.style.display = "block";
                return;
            }

            noMatchesMessage.style.display = "none";
            matchTableBody.innerHTML = matchesToRender
                .map((match) => {
                    const statusMeta = getStatusMeta(match.match_status);
                    const matchId = escapeHtml(match.match_id || "-");
                    const teamAName = escapeHtml(match.team_a_name || "(未設定)");
                    const teamBName = escapeHtml(match.team_b_name || "(未設定)");
                    const datetimeText = escapeHtml(formatDateTime(match.scheduled_at));
                    // 管理者ID配列化
                    let adminIds = [];
                    if (Array.isArray(match.admin_user_id)) {
                        adminIds = match.admin_user_id;
                    } else if (typeof match.admin_user_id === "string" && match.admin_user_id.includes(",")) {
                        adminIds = match.admin_user_id.split(",").map(s => s.trim()).filter(Boolean);
                    } else if (match.admin_user_id) {
                        adminIds = [match.admin_user_id];
                    }
                    // 名前変換
                    let adminNames = adminIds.map(id => escapeHtml(userIdToName[id] || id || "(未設定)")).join("<br>");
                    if (!adminNames) adminNames = "(未設定)";

                    return `
                        <tr>
                            <td class="match-list-cell-id">${matchId}</td>
                            <td class="match-list-cell-card">${teamAName}<br>${teamBName}</td>
                            <td class="match-list-cell-date">${datetimeText}</td>
                            <td class="match-list-cell-status">
                                <span class="match-status-pill ${statusMeta.className}">${statusMeta.label}</span>
                            </td>
                            <td class="match-list-cell-admin">${adminNames}</td>
                            <td class="match-list-cell-actions">
                                <div class="match-list-actions">
                                    <a href="./match_confirm.html?matchId=${encodeURIComponent(match.match_id)}" class="btn match-list-action-link">結果入力</a>
                                    <a href="./match_edit.html?matchId=${encodeURIComponent(match.match_id)}" class="btn match-list-action-link">編集</a>
                                    <a href="./match_delete.html?matchId=${encodeURIComponent(match.match_id)}" class="btn match-list-action-link">削除</a>
                                </div>
                            </td>
                        </tr>
                    `;
                })
                .join("");
        }

        function applySearch() {
            const searchField = document.getElementById("searchFieldSelect").value;
            const searchInput = document.getElementById("matchSearchInput");
            const statusSelect = document.getElementById("statusSelect");
            let keyword = searchInput.value.trim().toLowerCase();
            let filtered = allMatches;

            if (searchField === "status") {
                const statusValue = statusSelect.value;
                if (statusValue) {
                    filtered = filtered.filter(match => (match.match_status || "") === statusValue);
                }
            } else if (searchField === "match_id") {
                if (keyword) {
                    filtered = filtered.filter(match => (match.match_id || "").toLowerCase().includes(keyword));
                }
            } else if (searchField === "team") {
                if (keyword) {
                    filtered = filtered.filter(match =>
                        (match.team_a_name || "").toLowerCase().includes(keyword) ||
                        (match.team_b_name || "").toLowerCase().includes(keyword)
                    );
                }
            } else if (searchField === "admin") {
                if (keyword) {
                    filtered = filtered.filter(match => {
                        let adminIds = [];
                        if (Array.isArray(match.admin_user_id)) {
                            adminIds = match.admin_user_id;
                        } else if (typeof match.admin_user_id === "string" && match.admin_user_id.includes(",")) {
                            adminIds = match.admin_user_id.split(",").map(s => s.trim()).filter(Boolean);
                        } else if (match.admin_user_id) {
                            adminIds = [match.admin_user_id];
                        }
                        // 名前で部分一致
                        return adminIds.some(id => (userIdToName[id] || id || "").toLowerCase().includes(keyword));
                    });
                }
            }
            renderMatches(filtered);
        }

        function setupSearchEvents() {
            const searchInput = document.getElementById("matchSearchInput");
            const searchButton = document.getElementById("searchButton");
            const clearButton = document.getElementById("clearButton");
            const searchFieldSelect = document.getElementById("searchFieldSelect");
            const statusSelect = document.getElementById("statusSelect");

            function updateSearchUI() {
                if (searchFieldSelect.value === "status") {
                    searchInput.style.display = "none";
                    statusSelect.style.display = "inline-block";
                } else {
                    searchInput.style.display = "inline-block";
                    statusSelect.style.display = "none";
                }
            }

            searchFieldSelect.addEventListener("change", () => {
                updateSearchUI();
                // 検索欄切り替え時はクリア
                searchInput.value = "";
                statusSelect.value = "";
                renderMatches(allMatches);
            });

            searchButton.addEventListener("click", applySearch);
            searchInput.addEventListener("keydown", (event) => {
                if (event.key === "Enter") {
                    event.preventDefault();
                    applySearch();
                }
            });
            statusSelect.addEventListener("change", applySearch);
            clearButton.addEventListener("click", () => {
                searchInput.value = "";
                statusSelect.value = "";
                renderMatches(allMatches);
                searchInput.focus();
            });
            updateSearchUI();
        }

        async function checkAdminAndLoadMatches() {
            const adminMessage = document.getElementById("adminMessage");
            const matchListCard = document.getElementById("matchListCard");

            try {
                const authResponse = await fetch("/api/me");
                const authResult = await authResponse.json();

                if (!authResult.isLoggedIn) {
                    location.href = "./admin_login.html";
                    return;
                }

                if (authResult.type !== "admin") {
                    adminMessage.textContent = "あなたにはこのページの閲覧権限がありません。";
                    return;
                }

                // ユーザー一覧も取得
                const [matchesRes, usersRes] = await Promise.all([
                    fetch("/api/matches"),
                    fetch("/api/users")
                ]);
                const matchesResult = await matchesRes.json();
                const usersResult = await usersRes.json();

                if (!matchesRes.ok || !matchesResult.success) {
                    adminMessage.textContent = "試合一覧の取得に失敗しました。";
                    return;
                }
                if (!usersRes.ok || !usersResult.success) {
                    adminMessage.textContent = "ユーザー一覧の取得に失敗しました。";
                    return;
                }

                allMatches = Array.isArray(matchesResult.matches) ? matchesResult.matches : [];
                allUsers = Array.isArray(usersResult.users) ? usersResult.users : [];
                userIdToName = {};
                for (const u of allUsers) {
                    userIdToName[u.user_id] = u.user_name;
                }
                adminMessage.style.display = "none";
                matchListCard.classList.remove("hidden");
                renderMatches(allMatches);
            } catch (error) {
                adminMessage.textContent = "エラーが発生しました。";
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            setupSearchEvents();
            checkAdminAndLoadMatches();
        });
    </script>
</body>

</html>
