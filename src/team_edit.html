<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
    <title>チーム編集</title>
</head>

<body>
    <div id="headerSlot"></div>

    <main class="container">
        <div class="card">
            <h1>チーム編集</h1>
            <hr>
            <p id="adminMessage">確認中...</p>
            <a href="./admin.html" class="btn">管理者ページに戻る</a>
        </div>

        <div class="card hidden" id="teamEditCard">
            <h2>チーム情報を編集</h2>

            <div style="margin-bottom: 20px;">
                <label for="teamSelect">編集するチーム（チームID - チーム名）</label>
                <select id="teamSelect"
                    style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; margin-top: 5px;">
                    <option value="">-- チームを選択してください --</option>
                </select>
            </div>

            <form id="teamEditForm" style="display: none;">
                <div class="form-group">
                    <label>チームID（読み取り専用）</label>
                    <input type="text" id="teamIdDisplay" disabled
                        style="background-color: #f0f0f0; cursor: not-allowed;">
                </div>

                <div class="form-group">
                    <label>チーム名（15文字以下）</label>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <input type="text" id="teamNameEdit" maxlength="15" required placeholder="例: BLACK"
                            style="margin-bottom: 0;">
                        <button type="button" class="btn" id="pasteTeamNameEditButton"
                            style="margin: 0; white-space: nowrap;">貼り付け</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>リーダーのプレイヤーID（12文字）</label>
                    <div style="margin-top: 4px; font-size: 13px; color: #666;">名前で検索</div>
                    <div style="display: flex; gap: 8px; align-items: center; margin-top: 8px;">
                        <input type="text" id="leaderPlayerNameSearchEdit" maxlength="10" placeholder="プレイヤー名で検索"
                            style="margin-bottom: 0;">
                        <button type="button" class="btn" id="searchLeaderPlayerEditButton"
                            style="margin: 0; white-space: nowrap;">名前で検索</button>
                    </div>
                    <div id="leaderSuggestionMessageEdit"
                        style="margin-top: 6px; font-size: 13px; color: #666; display: none;"></div>
                    <div style="display: flex; gap: 8px; align-items: center; margin-top: 8px; max-width: 520px;">
                        <select id="leaderPlayerSearchResultsEdit"
                            style="flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; display: none;">
                        </select>
                        <button type="button" class="btn" id="applyLeaderPlayerSelectionEditButton"
                            style="margin: 0; white-space: nowrap; display: none;">IDを反映</button>
                    </div>
                    <div style="margin-top: 8px; font-size: 13px; color: #666;">プレイヤーIDを直接入力</div>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <input type="text" id="leaderPlayerIdEdit" maxlength="12" placeholder="例: 010100000001"
                            style="margin-bottom: 0;">
                        <button type="button" class="btn" id="pasteLeaderPlayerIdEditButton"
                            style="margin: 0; white-space: nowrap;">貼り付け</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>サブリーダーのプレイヤーID（12文字・任意）</label>
                    <div style="margin-top: 4px; font-size: 13px; color: #666;">名前で検索</div>
                    <div style="display: flex; gap: 8px; align-items: center; margin-top: 8px;">
                        <input type="text" id="subleaderPlayerNameSearchEdit" maxlength="10" placeholder="プレイヤー名で検索"
                            style="margin-bottom: 0;">
                        <button type="button" class="btn" id="searchSubleaderPlayerEditButton"
                            style="margin: 0; white-space: nowrap;">名前で検索</button>
                    </div>
                    <div id="subleaderSuggestionMessageEdit"
                        style="margin-top: 6px; font-size: 13px; color: #666; display: none;"></div>
                    <div style="display: flex; gap: 8px; align-items: center; margin-top: 8px; max-width: 520px;">
                        <select id="subleaderPlayerSearchResultsEdit"
                            style="flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; display: none;">
                        </select>
                        <button type="button" class="btn" id="applySubleaderPlayerSelectionEditButton"
                            style="margin: 0; white-space: nowrap; display: none;">IDを反映</button>
                    </div>
                    <div style="margin-top: 8px; font-size: 13px; color: #666;">プレイヤーIDを直接入力</div>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <input type="text" id="subleaderPlayerIdEdit" maxlength="12" placeholder="例: 010100000002"
                            style="margin-bottom: 0;">
                        <button type="button" class="btn" id="pasteSubleaderPlayerIdEditButton"
                            style="margin: 0; white-space: nowrap;">貼り付け</button>
                    </div>
                </div>

                <button type="submit" class="btn">チーム情報を更新</button>
                <div id="teamMessage" class="message" style="display: none;"></div>
            </form>
        </div>
    </main>

    <div id="footerSlot"></div>

    <script src="./js/layout.js"></script>
    <script>
        async function checkAdmin() {
            const response = await fetch("/api/me");
            const result = await response.json();

            const adminMessage = document.getElementById("adminMessage");
            const teamEditCard = document.getElementById("teamEditCard");

            if (!result.isLoggedIn) {
                location.href = "./admin_login.html";
                return;
            }

            if (result.type !== "admin") {
                adminMessage.textContent = "あなたにはこのページの閲覧権限がありません。";
                return;
            }

            adminMessage.style.display = "none";
            teamEditCard.classList.remove("hidden");
            loadTeams();
        }

        async function loadTeams() {
            try {
                const response = await fetch("/api/teams");
                const result = await response.json();

                if (!response.ok) {
                    alert("チーム一覧取得に失敗しました");
                    return;
                }

                const teamSelect = document.getElementById("teamSelect");
                const teams = result.teams || [];

                teams.forEach((team) => {
                    const option = document.createElement("option");
                    option.value = team.team_id;
                    option.textContent = `${team.team_id} - ${team.team_name}`;
                    teamSelect.appendChild(option);
                });

                teamSelect.addEventListener("change", () => {
                    selectTeam(teams);
                });
            } catch (error) {
                console.error("Error loading teams:", error);
                alert("チーム一覧の読み込みに失敗しました");
            }
        }

        function selectTeam(teams) {
            const teamSelect = document.getElementById("teamSelect");
            const teamEditForm = document.getElementById("teamEditForm");
            const selectedTeamId = teamSelect.value;

            if (!selectedTeamId) {
                teamEditForm.style.display = "none";
                return;
            }

            const selectedTeam = teams.find((t) => t.team_id === selectedTeamId);

            if (selectedTeam) {
                document.getElementById("teamIdDisplay").value = selectedTeam.team_id;
                document.getElementById("teamNameEdit").value = selectedTeam.team_name;
                document.getElementById("leaderPlayerIdEdit").value = selectedTeam.player_id || "";
                document.getElementById("subleaderPlayerIdEdit").value = selectedTeam.subleader_player_id || "";
                teamEditForm.style.display = "block";
                setupEditForm();
            }
        }

        function setupEditForm() {
            const teamEditForm = document.getElementById("teamEditForm");
            const messageDiv = document.getElementById("teamMessage");
            const teamNameInput = document.getElementById("teamNameEdit");
            const leaderPlayerIdInput = document.getElementById("leaderPlayerIdEdit");
            const subleaderPlayerIdInput = document.getElementById("subleaderPlayerIdEdit");
            const leaderPlayerNameSearchInput = document.getElementById("leaderPlayerNameSearchEdit");
            const subleaderPlayerNameSearchInput = document.getElementById("subleaderPlayerNameSearchEdit");
            const leaderPlayerSearchResults = document.getElementById("leaderPlayerSearchResultsEdit");
            const subleaderPlayerSearchResults = document.getElementById("subleaderPlayerSearchResultsEdit");
            const leaderSuggestionMessage = document.getElementById("leaderSuggestionMessageEdit");
            const subleaderSuggestionMessage = document.getElementById("subleaderSuggestionMessageEdit");
            const pasteTeamNameButton = document.getElementById("pasteTeamNameEditButton");
            const pasteLeaderPlayerIdButton = document.getElementById("pasteLeaderPlayerIdEditButton");
            const pasteSubleaderPlayerIdButton = document.getElementById("pasteSubleaderPlayerIdEditButton");
            const searchLeaderPlayerButton = document.getElementById("searchLeaderPlayerEditButton");
            const searchSubleaderPlayerButton = document.getElementById("searchSubleaderPlayerEditButton");
            const applyLeaderPlayerSelectionButton = document.getElementById("applyLeaderPlayerSelectionEditButton");
            const applySubleaderPlayerSelectionButton = document.getElementById("applySubleaderPlayerSelectionEditButton");

            let cachedPlayers = [];

            async function loadPlayers() {
                if (cachedPlayers.length > 0) {
                    return cachedPlayers;
                }

                const response = await fetch("/api/players");
                const result = await response.json();
                if (!response.ok) {
                    throw new Error(result.message || "プレイヤー一覧の取得に失敗しました");
                }

                cachedPlayers = result.players || [];
                return cachedPlayers;
            }

            function hideSearchResult(selectEl, applyButtonEl, suggestionEl) {
                selectEl.style.display = "none";
                applyButtonEl.style.display = "none";
                selectEl.innerHTML = "";
                suggestionEl.textContent = "";
                suggestionEl.style.display = "none";
            }

            function renderSearchResult(matches, selectEl, applyButtonEl) {
                selectEl.innerHTML = "";
                matches.forEach((player) => {
                    const option = document.createElement("option");
                    option.value = player.player_id;
                    option.textContent = `${player.player_name} (${player.player_id})`;
                    selectEl.appendChild(option);
                });
                selectEl.style.display = "block";
                applyButtonEl.style.display = "inline-block";
            }

            function getMatchingPlayers(players, keyword) {
                const lowerKeyword = keyword.toLowerCase();
                return players
                    .filter((player) =>
                        String(player.player_name || "").toLowerCase().includes(lowerKeyword),
                    )
                    .sort((a, b) => {
                        const aName = String(a.player_name || "").toLowerCase();
                        const bName = String(b.player_name || "").toLowerCase();
                        const aStarts = aName.startsWith(lowerKeyword) ? 0 : 1;
                        const bStarts = bName.startsWith(lowerKeyword) ? 0 : 1;
                        if (aStarts !== bStarts) return aStarts - bStarts;
                        return aName.localeCompare(bName, "ja");
                    });
            }

            async function suggestPlayersByName(nameInputEl, selectEl, applyButtonEl, suggestionEl, roleLabel) {
                const keyword = nameInputEl.value.trim();
                if (!keyword) {
                    hideSearchResult(selectEl, applyButtonEl, suggestionEl);
                    return;
                }

                try {
                    const players = await loadPlayers();
                    const matches = getMatchingPlayers(players, keyword).slice(0, 5);

                    if (matches.length === 0) {
                        hideSearchResult(selectEl, applyButtonEl, suggestionEl);
                        return;
                    }

                    renderSearchResult(matches, selectEl, applyButtonEl);
                    suggestionEl.textContent = `${roleLabel}候補: もしかして ${matches.map((m) => m.player_name).join(" / ")}`;
                    suggestionEl.style.display = "block";
                } catch (error) {
                    hideSearchResult(selectEl, applyButtonEl, suggestionEl);
                }
            }

            async function searchPlayerByName(nameInputEl, selectEl, applyButtonEl, suggestionEl, roleLabel) {
                try {
                    const keyword = nameInputEl.value.trim();
                    if (!keyword) {
                        messageDiv.textContent = `${roleLabel}の検索名を入力してください`;
                        messageDiv.className = "message error";
                        messageDiv.style.display = "block";
                        hideSearchResult(selectEl, applyButtonEl, suggestionEl);
                        return;
                    }

                    const players = await loadPlayers();
                    const matches = getMatchingPlayers(players, keyword);

                    if (matches.length === 0) {
                        messageDiv.textContent = `${roleLabel}の該当プレイヤーが見つかりません`;
                        messageDiv.className = "message error";
                        messageDiv.style.display = "block";
                        hideSearchResult(selectEl, applyButtonEl, suggestionEl);
                        return;
                    }

                    renderSearchResult(matches, selectEl, applyButtonEl);
                    suggestionEl.textContent = `${roleLabel}候補: ${matches.length}件`;
                    suggestionEl.style.display = "block";
                } catch (error) {
                    messageDiv.textContent = error.message || "プレイヤー検索に失敗しました";
                    messageDiv.className = "message error";
                    messageDiv.style.display = "block";
                    hideSearchResult(selectEl, applyButtonEl, suggestionEl);
                }
            }

            function applySelectedPlayerId(selectEl, applyButtonEl, suggestionEl, targetIdInputEl, roleLabel) {
                if (!selectEl.value) {
                    messageDiv.textContent = `${roleLabel}候補を選択してください`;
                    messageDiv.className = "message error";
                    messageDiv.style.display = "block";
                    return;
                }

                targetIdInputEl.value = selectEl.value;
                messageDiv.textContent = `${roleLabel}のIDを反映しました: ${selectEl.value}`;
                messageDiv.className = "message success";
                messageDiv.style.display = "block";
                hideSearchResult(selectEl, applyButtonEl, suggestionEl);
            }

            searchLeaderPlayerButton.addEventListener("click", async () => {
                await searchPlayerByName(
                    leaderPlayerNameSearchInput,
                    leaderPlayerSearchResults,
                    applyLeaderPlayerSelectionButton,
                    leaderSuggestionMessage,
                    "リーダー",
                );
            });

            leaderPlayerNameSearchInput.addEventListener("input", async () => {
                await suggestPlayersByName(
                    leaderPlayerNameSearchInput,
                    leaderPlayerSearchResults,
                    applyLeaderPlayerSelectionButton,
                    leaderSuggestionMessage,
                    "リーダー",
                );
            });

            searchSubleaderPlayerButton.addEventListener("click", async () => {
                await searchPlayerByName(
                    subleaderPlayerNameSearchInput,
                    subleaderPlayerSearchResults,
                    applySubleaderPlayerSelectionButton,
                    subleaderSuggestionMessage,
                    "サブリーダー",
                );
            });

            subleaderPlayerNameSearchInput.addEventListener("input", async () => {
                await suggestPlayersByName(
                    subleaderPlayerNameSearchInput,
                    subleaderPlayerSearchResults,
                    applySubleaderPlayerSelectionButton,
                    subleaderSuggestionMessage,
                    "サブリーダー",
                );
            });

            applyLeaderPlayerSelectionButton.addEventListener("click", () => {
                applySelectedPlayerId(
                    leaderPlayerSearchResults,
                    applyLeaderPlayerSelectionButton,
                    leaderSuggestionMessage,
                    leaderPlayerIdInput,
                    "リーダー",
                );
            });

            applySubleaderPlayerSelectionButton.addEventListener("click", () => {
                applySelectedPlayerId(
                    subleaderPlayerSearchResults,
                    applySubleaderPlayerSelectionButton,
                    subleaderSuggestionMessage,
                    subleaderPlayerIdInput,
                    "サブリーダー",
                );
            });

            // チーム名の貼り付け処理
            pasteTeamNameButton.addEventListener("click", async () => {
                try {
                    const clipboardText = await navigator.clipboard.readText();
                    teamNameInput.value = clipboardText.trim();
                    messageDiv.style.display = "none";
                } catch (error) {
                    messageDiv.textContent = "クリップボードの貼り付けに失敗しました";
                    messageDiv.className = "message error";
                    messageDiv.style.display = "block";
                }
            });

            // リーダーのプレイヤーIDの貼り付け処理
            pasteLeaderPlayerIdButton.addEventListener("click", async () => {
                try {
                    const clipboardText = await navigator.clipboard.readText();
                    leaderPlayerIdInput.value = clipboardText.trim();
                    messageDiv.style.display = "none";
                } catch (error) {
                    messageDiv.textContent = "クリップボードの貼り付けに失敗しました";
                    messageDiv.className = "message error";
                    messageDiv.style.display = "block";
                }
            });

            // サブリーダーのプレイヤーIDの貼り付け処理
            pasteSubleaderPlayerIdButton.addEventListener("click", async () => {
                try {
                    const clipboardText = await navigator.clipboard.readText();
                    subleaderPlayerIdInput.value = clipboardText.trim();
                    messageDiv.style.display = "none";
                } catch (error) {
                    messageDiv.textContent = "クリップボードの貼り付けに失敗しました";
                    messageDiv.className = "message error";
                    messageDiv.style.display = "block";
                }
            });

            // フォーム送信
            teamEditForm.addEventListener("submit", async (e) => {
                e.preventDefault();

                const teamId = document.getElementById("teamIdDisplay").value;
                const teamName = teamNameInput.value.trim();
                const leaderPlayerId = leaderPlayerIdInput.value.trim();
                const subleaderPlayerId = subleaderPlayerIdInput.value.trim();

                // リーダーのプレイヤーIDが入力されている場合は12文字チェック
                if (leaderPlayerId && leaderPlayerId.length !== 12) {
                    messageDiv.textContent = "リーダーのプレイヤーIDは12文字ちょうどで入力してください";
                    messageDiv.className = "message error";
                    messageDiv.style.display = "block";
                    return;
                }

                // サブリーダーのプレイヤーIDが入力されている場合は12文字チェック
                if (subleaderPlayerId && subleaderPlayerId.length !== 12) {
                    messageDiv.textContent = "サブリーダーのプレイヤーIDは12文字ちょうどで入力してください";
                    messageDiv.className = "message error";
                    messageDiv.style.display = "block";
                    return;
                }

                try {
                    const updateData = { teamId, teamName };
                    if (leaderPlayerId) updateData.leaderPlayerId = leaderPlayerId;
                    if (subleaderPlayerId) updateData.subleaderPlayerId = subleaderPlayerId;

                    const response = await fetch("/api/teams", {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(updateData),
                    });
                    const result = await response.json();

                    if (response.ok) {
                        messageDiv.textContent = "チーム情報を更新しました！";
                        messageDiv.className = "message success";
                    } else {
                        messageDiv.textContent = result.message || "エラーが発生しました";
                        messageDiv.className = "message error";
                    }
                    messageDiv.style.display = "block";
                } catch (error) {
                    messageDiv.textContent = "通信エラーが発生しました";
                    messageDiv.className = "message error";
                    messageDiv.style.display = "block";
                }
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            checkAdmin();
        });
    </script>
</body>

</html>
