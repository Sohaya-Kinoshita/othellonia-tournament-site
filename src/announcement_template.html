<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="icon" href="./images/Logo.jpg" type="image/jpeg">
    <link rel="apple-touch-icon" sizes="180x180" href="./images/Logo.jpg">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#2563eb">
    <title>定型文作成ツール</title>
</head>

<body>
    <div id="headerSlot"></div>

    <main class="container">
        <div class="card announcement-tool-card">
            <div class="announcement-tool-hero">
                <div>
                    <h1 class="announcement-tool-title">大会運営用 定型文作成ツール</h1>
                    <p class="announcement-tool-description">上の設定を変更すると、下の定型文が即時更新されます。各行の右側から個別コピー、上のボタンから全文コピーができます。
                    </p>
                </div>
                <button type="button" class="btn announcement-tool-copy-all-button" id="copyAllButton">全文コピー</button>
            </div>
            <div class="announcement-tool-copy-status" id="copyStatus" aria-live="polite"></div>
        </div>

        <div class="card announcement-tool-card">
            <h2>変更項目</h2>
            <div class="announcement-tool-settings">
                <div style="grid-column: span 2; display:flex;align-items:center;gap:8px;">
                    <span id="teamLoadStatus" style="color:var(--muted);font-size:13px;">チーム読み込み状態: 未読み込み</span>
                </div>
                <label class="announcement-tool-setting">
                    <span class="announcement-tool-setting-label">Aチーム名</span>
                    <div style="display:flex;gap:8px;align-items:center;">
                        <select id="teamASelect" class="announcement-tool-select" style="min-width:180px">
                            <option value="">-- 手動入力 --</option>
                        </select>
                        <input type="text" id="teamANameInput" value="Aチーム" />
                    </div>
                </label>
                <label class="announcement-tool-setting">
                    <span class="announcement-tool-setting-label">Bチーム名</span>
                    <div style="display:flex;gap:8px;align-items:center;">
                        <select id="teamBSelect" class="announcement-tool-select" style="min-width:180px">
                            <option value="">-- 手動入力 --</option>
                        </select>
                        <input type="text" id="teamBNameInput" value="Bチーム" />
                    </div>
                </label>
                <label class="announcement-tool-setting">
                    <span class="announcement-tool-setting-label">役職</span>
                    <select id="roleSelect" class="announcement-tool-select"></select>
                </label>
                <label class="announcement-tool-setting">
                    <span class="announcement-tool-setting-label">対戦番号 / n戦目</span>
                    <select id="battleNumberSelect" class="announcement-tool-select"></select>
                </label>
                <div class="announcement-tool-setting announcement-tool-time-setting">
                    <span class="announcement-tool-setting-label">時刻</span>
                    <div class="announcement-tool-time-selects">
                        <select id="preparationHourSelect"
                            class="announcement-tool-select announcement-tool-time-select"></select>
                        <span class="announcement-tool-time-separator">時</span>
                        <select id="preparationMinuteSelect"
                            class="announcement-tool-select announcement-tool-time-select"></select>
                        <span class="announcement-tool-time-separator">分</span>
                    </div>
                </div>
                <label class="announcement-tool-setting">
                    <span class="announcement-tool-setting-label">Aチームの勝利数</span>
                    <select id="teamAWinsSelect" class="announcement-tool-select"></select>
                </label>
                <label class="announcement-tool-setting">
                    <span class="announcement-tool-setting-label">Bチームの勝利数</span>
                    <select id="teamBWinsSelect" class="announcement-tool-select"></select>
                </label>
                <label class="announcement-tool-setting">
                    <span class="announcement-tool-setting-label">勝利チーム</span>
                    <select id="winnerTeamSelect" class="announcement-tool-select">
                        <option value="teamA">Aチーム</option>
                        <option value="teamB">Bチーム</option>
                    </select>
                </label>
                <label class="announcement-tool-setting announcement-tool-url-setting">
                    <span class="announcement-tool-setting-label">結果表示URL</span>
                    <span id="resultUrlDisplay">https://taikousen.com/result</span>
                </label>
            </div>
        </div>

        <div class="card announcement-tool-card">
            <h2>定型文一覧</h2>
            <div class="announcement-tool-table-wrap">
                <table class="announcement-tool-table">
                    <thead>
                        <tr>
                            <th class="announcement-tool-column-timing">タイミング</th>
                            <th>定型文</th>
                            <th class="announcement-tool-column-actions">コピー</th>
                        </tr>
                    </thead>
                    <tbody id="announcementTemplateTableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="footerSlot"></div>
    <div id="copyToast" class="announcement-copy-toast" aria-live="polite"></div>

    <script src="./js/layout.js"></script>
    <script>
        const RESULT_URL = "https://taikousen.com/result";

        const announcementTemplateState = {
            teamAName: "Aチーム",
            teamBName: "Bチーム",
            role: "先鋒",
            battleNumber: "1",
            preparationHour: "10",
            preparationMinute: "00",
            teamAWins: "0",
            teamBWins: "0",
            winnerTeam: "teamA",
            resultUrl: RESULT_URL,
        };

        const announcementTemplateDefinitions = [
            {
                id: "oneHourBefore",
                timingLabel: "1時間前",
                buildPlainText: () => [
                    "試合開始1時間前となりました。対戦開始時に対戦を開始できるよう、スムーズな大会進行にご協力をお願いします。",
                ],
                buildPreviewLines: () => [
                    "試合開始1時間前となりました。対戦開始時に対戦を開始できるよう、スムーズな大会進行にご協力をお願いします。",
                ],
            },
            {
                id: "tenMinutesBefore",
                timingLabel: "10分前",
                buildPlainText: () => [
                    "試合開始10分前となりました。",
                ],
                buildPreviewLines: () => [
                    "試合開始10分前となりました。",
                ],
            },
            {
                id: "startTime",
                timingLabel: "試合開始時",
                buildPlainText: () => [
                    "試合開始時刻となりました。",
                ],
                buildPreviewLines: () => [
                    "試合開始時刻となりました。",
                ],
            },
            {
                id: "preparationNotice",
                timingLabel: "1〜5戦目の準備連絡",
                buildPlainText: (state) => [
                    `両チームの${state.role}は準備をしてください。`,
                    `完了したら、こちらに「${state.role}準備完了しました。」と送ってください。`,
                    `なお、${formatAnnouncementTime(state)}までに準備が完了しない場合、不戦敗となります。`,
                ],
                buildPreviewLines: (state) => [
                    `両チームの${highlightValue(state.role)}は準備をしてください。`,
                    `完了したら、こちらに「${highlightValue(`${state.role}準備完了しました。`)}」と送ってください。`,
                    `なお、${highlightValue(formatAnnouncementTime(state))}までに準備が完了しない場合、不戦敗となります。`,
                ],
            },
            {
                id: "startBattle",
                timingLabel: "1〜5戦目の開始連絡",
                buildPlainText: (state) => [
                    `では、${state.role}は${state.battleNumber}戦目の対戦を開始してください。`,
                ],
                buildPreviewLines: (state) => [
                    `では、${highlightValue(state.role)}は${highlightValue(`${state.battleNumber}戦目`)}の対戦を開始してください。`,
                ],
            },
            {
                id: "confirmResults",
                timingLabel: "対戦結果確認",
                buildPlainText: () => [
                    "対戦結果に相違がないため、対戦結果を確定します。",
                ],
                buildPreviewLines: () => [
                    "対戦結果に相違がないため、対戦結果を確定します。",
                ],
            },
            {
                id: "finalizeResults",
                timingLabel: "finの結果確定連絡",
                buildPlainText: (state) => [
                    `${state.teamAName}${state.teamAWins}勝、${state.teamBName}${state.teamBWins}勝で、${getWinningTeamName(state)}の勝利となりました。`,
                    "WEBサイトで対戦結果を表示しています。",
                    "ご確認の上、相違が無ければ対戦結果を確定します。",
                    state.resultUrl,
                ],
                buildPreviewLines: (state) => [
                    `${highlightValue(state.teamAName)}${highlightValue(state.teamAWins)}勝、${highlightValue(state.teamBName)}${highlightValue(state.teamBWins)}勝で、${highlightValue(getWinningTeamName(state))}の勝利となりました。`,
                    "WEBサイトで対戦結果を表示しています。",
                    "ご確認の上、相違が無ければ対戦結果を確定します。",
                    highlightValue(state.resultUrl),
                ],
            },
            {
                id: "closing",
                timingLabel: "最終挨拶",
                buildPlainText: () => [
                    "それでは対戦結果を確定しました。",
                    "両チーム対戦お疲れさまでした。",
                ],
                buildPreviewLines: () => [
                    "それでは対戦結果を確定しました。",
                    "両チーム対戦お疲れさまでした。",
                ],
            },
        ];

        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function highlightValue(value) {
            return `<span class="announcement-tool-variable">${escapeHtml(value)}</span>`;
        }

        function formatAnnouncementTime(state) {
            return `${state.preparationHour}時${state.preparationMinute}分`;
        }

        function getWinningTeamName(state) {
            return state.winnerTeam === "teamB" ? state.teamBName : state.teamAName;
        }

        function updateWinnerTeamOptionLabels() {
            const teamAName = document.getElementById("teamANameInput").value.trim() || "Aチーム";
            const teamBName = document.getElementById("teamBNameInput").value.trim() || "Bチーム";
            const winnerTeamSelect = document.getElementById("winnerTeamSelect");

            winnerTeamSelect.options[0].textContent = teamAName;
            winnerTeamSelect.options[1].textContent = teamBName;
        }

        function getCurrentAnnouncementState() {
            return {
                teamAName: document.getElementById("teamANameInput").value.trim() || "Aチーム",
                teamBName: document.getElementById("teamBNameInput").value.trim() || "Bチーム",
                role: document.getElementById("roleSelect").value,
                battleNumber: document.getElementById("battleNumberSelect").value,
                preparationHour: document.getElementById("preparationHourSelect").value,
                preparationMinute: document.getElementById("preparationMinuteSelect").value,
                teamAWins: document.getElementById("teamAWinsSelect").value,
                teamBWins: document.getElementById("teamBWinsSelect").value,
                winnerTeam: document.getElementById("winnerTeamSelect").value,
                resultUrl: RESULT_URL,
            };
        }

        function buildPlainTextFromTemplate(definition, state) {
            return definition.buildPlainText(state).join("\n");
        }

        function buildPreviewHtmlFromTemplate(definition, state) {
            return definition.buildPreviewLines(state)
                .map((line) => `<div class="announcement-tool-preview-line">${line}</div>`)
                .join("");
        }

        function renderAnnouncementTemplateTable() {
            const tableBody = document.getElementById("announcementTemplateTableBody");
            const currentState = getCurrentAnnouncementState();

            tableBody.innerHTML = announcementTemplateDefinitions.map((definition) => {
                const previewHtml = buildPreviewHtmlFromTemplate(definition, currentState);
                return `
                    <tr>
                        <td class="announcement-tool-cell-timing">${escapeHtml(definition.timingLabel)}</td>
                        <td class="announcement-tool-cell-template">${previewHtml}</td>
                        <td class="announcement-tool-cell-actions">
                            <button type="button" class="btn announcement-tool-copy-button" data-template-id="${definition.id}">コピー</button>
                        </td>
                    </tr>
                `;
            }).join("");
        }

        async function copyTextToClipboard(text) {
            if (navigator.clipboard?.writeText) {
                await navigator.clipboard.writeText(text);
                return;
            }

            const temporaryTextarea = document.createElement("textarea");
            temporaryTextarea.value = text;
            temporaryTextarea.setAttribute("readonly", "true");
            temporaryTextarea.style.position = "fixed";
            temporaryTextarea.style.left = "-9999px";
            document.body.appendChild(temporaryTextarea);
            temporaryTextarea.select();
            document.execCommand("copy");
            document.body.removeChild(temporaryTextarea);
        }

        let copyStatusTimerId = null;

        function showCopyStatus(message) {
            const copyToast = document.getElementById("copyToast");
            if (!copyToast) return;
            copyToast.textContent = message;
            copyToast.classList.add("is-visible");

            if (copyStatusTimerId) {
                window.clearTimeout(copyStatusTimerId);
            }

            copyStatusTimerId = window.setTimeout(() => {
                copyToast.textContent = "";
                copyToast.classList.remove("is-visible");
            }, 2000);
        }

        async function copyTemplateById(templateId) {
            const currentState = getCurrentAnnouncementState();
            const templateDefinition = announcementTemplateDefinitions.find((definition) => definition.id === templateId);

            if (!templateDefinition) {
                return;
            }

            await copyTextToClipboard(buildPlainTextFromTemplate(templateDefinition, currentState));
            showCopyStatus("コピーしました");
        }

        async function copyAllTemplates() {
            const currentState = getCurrentAnnouncementState();
            const allTemplateText = announcementTemplateDefinitions
                .map((definition) => buildPlainTextFromTemplate(definition, currentState))
                .join("\n\n");

            await copyTextToClipboard(allTemplateText);
            showCopyStatus("全文をコピーしました");
        }

        function populateSelectOptions(selectElement, values, formatLabel) {
            selectElement.innerHTML = values.map((value) => {
                const label = formatLabel ? formatLabel(value) : value;
                return `<option value="${escapeHtml(value)}">${escapeHtml(label)}</option>`;
            }).join("");
        }

        async function loadTeamsFromApi() {
            const statusEl = document.getElementById('teamLoadStatus');
            if (statusEl) statusEl.textContent = 'チーム読み込み状態: 読み込み中...';
            try {
                const res = await fetch('/api/teams');
                if (!res.ok) {
                    console.warn('teams API returned', res.status);
                    if (statusEl) statusEl.textContent = `チーム読み込み状態: 取得失敗 (${res.status})`;
                    return [];
                }
                const json = await res.json();
                // Normalize possible shapes
                let teams = [];
                if (Array.isArray(json)) teams = json;
                else if (Array.isArray(json.teams)) teams = json.teams;
                else if (json.teams && Array.isArray(json.teams.results)) teams = json.teams.results;
                else if (Array.isArray(json.results)) teams = json.results;
                else if (json.results && Array.isArray(json.results.results)) teams = json.results.results;

                // Fallback: if object with numeric keys
                if (!Array.isArray(teams) && typeof json === 'object') {
                    teams = Object.values(json).filter(v => v && (v.team_id || v.teamId || v.team_name || v.teamName));
                }

                if (!Array.isArray(teams)) teams = [];

                const mapped = teams.map(t => ({ id: String(t.team_id || t.teamId || t.id || ''), name: String(t.team_name || t.teamName || t.name || '') }));
                if (statusEl) statusEl.textContent = `チーム読み込み状態: ${mapped.length} 件取得`;
                return mapped;
            } catch (e) {
                console.error('loadTeamsFromApi error', e);
                if (statusEl) statusEl.textContent = 'チーム読み込み状態: エラー';
                return [];
            }
        }

        function populateTeamSelects(teams) {
            const a = document.getElementById('teamASelect');
            const b = document.getElementById('teamBSelect');
            const makeOptions = (items) => ['<option value="">-- 手動入力 --</option>'].concat(items.map(t => `<option value="${escapeHtml(t.id)}" data-name="${escapeHtml(t.name)}">${escapeHtml(t.name)}</option>`)).join('');
            a.innerHTML = makeOptions(teams);
            b.innerHTML = makeOptions(teams);
        }

        function initializeAnnouncementTemplateTool() {
            const roleSelect = document.getElementById("roleSelect");
            const battleNumberSelect = document.getElementById("battleNumberSelect");
            const preparationHourSelect = document.getElementById("preparationHourSelect");
            const preparationMinuteSelect = document.getElementById("preparationMinuteSelect");
            const teamAWinsSelect = document.getElementById("teamAWinsSelect");
            const teamBWinsSelect = document.getElementById("teamBWinsSelect");
            const winnerTeamSelect = document.getElementById("winnerTeamSelect");

            populateSelectOptions(roleSelect, ["先鋒", "次鋒", "中堅", "副将", "大将"]);
            populateSelectOptions(battleNumberSelect, ["1", "2", "3", "4", "5"], (value) => `${value}戦目`);
            populateSelectOptions(preparationHourSelect, Array.from({ length: 24 }, (_, index) => String(index).padStart(2, "0")));
            populateSelectOptions(preparationMinuteSelect, Array.from({ length: 60 }, (_, index) => String(index).padStart(2, "0")));

            populateSelectOptions(teamAWinsSelect, ["0", "1", "2", "3", "4", "5"]);
            populateSelectOptions(teamBWinsSelect, ["0", "1", "2", "3", "4", "5"]);

            document.getElementById("teamANameInput").value = announcementTemplateState.teamAName;
            document.getElementById("teamBNameInput").value = announcementTemplateState.teamBName;
            roleSelect.value = announcementTemplateState.role;
            battleNumberSelect.value = announcementTemplateState.battleNumber;
            preparationHourSelect.value = announcementTemplateState.preparationHour;
            preparationMinuteSelect.value = announcementTemplateState.preparationMinute;

            teamAWinsSelect.value = announcementTemplateState.teamAWins;
            teamBWinsSelect.value = announcementTemplateState.teamBWins;
            winnerTeamSelect.value = announcementTemplateState.winnerTeam;
            document.getElementById("resultUrlInput").value = announcementTemplateState.resultUrl;
            updateWinnerTeamOptionLabels();

            // Load teams from API and populate selects
            loadTeamsFromApi().then((teams) => {
                populateTeamSelects(teams);

                const teamASelect = document.getElementById('teamASelect');
                const teamBSelect = document.getElementById('teamBSelect');

                teamASelect.addEventListener('change', () => {
                    const opt = teamASelect.selectedOptions[0];
                    const name = opt?.dataset?.name || '';
                    if (name) {
                        document.getElementById('teamANameInput').value = name;
                        updateWinnerTeamOptionLabels();
                        renderAnnouncementTemplateTable();
                    }
                });

                teamBSelect.addEventListener('change', () => {
                    const opt = teamBSelect.selectedOptions[0];
                    const name = opt?.dataset?.name || '';
                    if (name) {
                        document.getElementById('teamBNameInput').value = name;
                        updateWinnerTeamOptionLabels();
                        renderAnnouncementTemplateTable();
                    }
                });
            }).catch(() => {
                // ignore
            });

            const inputs = [
                "teamASelect",
                "teamBSelect",
                "teamANameInput",
                "teamBNameInput",
                "roleSelect",
                "battleNumberSelect",
                "preparationHourSelect",
                "preparationMinuteSelect",
                "teamAWinsSelect",
                "teamBWinsSelect",
                "winnerTeamSelect",
            ];

            for (const inputId of inputs) {
                document.getElementById(inputId).addEventListener("input", renderAnnouncementTemplateTable);
                document.getElementById(inputId).addEventListener("change", renderAnnouncementTemplateTable);
            }

            document.getElementById("teamANameInput").addEventListener("input", updateWinnerTeamOptionLabels);
            document.getElementById("teamBNameInput").addEventListener("input", updateWinnerTeamOptionLabels);



            document.getElementById("announcementTemplateTableBody").addEventListener("click", (event) => {
                const copyButton = event.target.closest("button[data-template-id]");
                if (!copyButton) {
                    return;
                }
                copyTemplateById(copyButton.dataset.templateId).catch(() => {
                    showCopyStatus("コピーに失敗しました");
                });
            });

            document.getElementById("copyAllButton").addEventListener("click", () => {
                copyAllTemplates().catch(() => {
                    showCopyStatus("コピーに失敗しました");
                });
            });

            renderAnnouncementTemplateTable();
        }

        document.addEventListener("DOMContentLoaded", initializeAnnouncementTemplateTool);
    </script>
</body>

</html>
