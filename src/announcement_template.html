<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="icon" href="./images/Logo.jpg" type="image/jpeg">
    <link rel="apple-touch-icon" sizes="180x180" href="./images/Logo.jpg">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#2563eb">
    <title>定型文作成ツール</title>
</head>

<body>
    <div id="headerSlot"></div>

    <main class="container">
        <div class="card announcement-tool-card">
            <div class="announcement-tool-hero">
                <div>
                    <h1 class="announcement-tool-title">大会運営用 定型文作成ツール</h1>
                    <p class="announcement-tool-description">上の設定を変更すると、下の定型文が即時更新されます。各行の右側から個別コピー、上のボタンから全文コピーができます。
                    </p>
                </div>
                <button type="button" class="btn announcement-tool-copy-all-button" id="copyAllButton">全文コピー</button>
            </div>
            <div class="announcement-tool-copy-status" id="copyStatus" aria-live="polite"></div>
        </div>

        <div class="card announcement-tool-card">
            <h2>定型文一覧</h2>
            <div class="announcement-tool-table-wrap">
                <table class="announcement-tool-table">
                    <thead>
                        <tr>
                            <th class="announcement-tool-column-timing">タイミング</th>
                            <th>定型文</th>
                        </tr>
                    </thead>
                    <tbody id="announcementTemplateTableBodyTop"></tbody>
                </table>
            </div>
        </div>

        <div class="card announcement-tool-card" id="announcementSettingsCard">
            <h2>変更項目</h2>
            <div class="announcement-tool-settings">
                <div class="announcement-tool-status-row">
                    <span id="teamLoadStatus" class="announcement-tool-status-text">チーム読み込み状態: 未読み込み</span>
                </div>
                <label class="announcement-tool-setting">
                    <span class="announcement-tool-setting-label">Aチーム名</span>
                    <div class="announcement-tool-team-row">
                        <select id="teamASelect" class="announcement-tool-select announcement-tool-team-select">
                            <option value="">-- 手動入力 --</option>
                        </select>
                        <input type="text" id="teamANameInput" value="Aチーム" />
                    </div>
                </label>
                <label class="announcement-tool-setting">
                    <span class="announcement-tool-setting-label">Bチーム名</span>
                    <div class="announcement-tool-team-row">
                        <select id="teamBSelect" class="announcement-tool-select announcement-tool-team-select">
                            <option value="">-- 手動入力 --</option>
                        </select>
                        <input type="text" id="teamBNameInput" value="Bチーム" />
                    </div>
                </label>
                <label class="announcement-tool-setting announcement-tool-setting-inline">
                    <span class="announcement-tool-setting-label">役職</span>
                    <select id="roleSelect" class="announcement-tool-select"></select>
                </label>
                <label class="announcement-tool-setting announcement-tool-setting-inline">
                    <span class="announcement-tool-setting-label">対戦番号 / n戦目</span>
                    <select id="battleNumberSelect" class="announcement-tool-select"></select>
                </label>
                <div class="announcement-tool-setting announcement-tool-time-setting">
                    <span class="announcement-tool-setting-label">時刻</span>
                    <div class="announcement-tool-time-selects">
                        <select id="preparationHourSelect"
                            class="announcement-tool-select announcement-tool-time-select" aria-label="準備時刻の時"></select>
                        <span class="announcement-tool-time-separator">時</span>
                        <select id="preparationMinuteSelect"
                            class="announcement-tool-select announcement-tool-time-select" aria-label="準備時刻の分"></select>
                        <span class="announcement-tool-time-separator">分</span>
                    </div>
                    <div class="announcement-tool-time-controls">
                        <button type="button" id="subOneMinuteButton"
                            class="btn announcement-tool-add-minute">-1分</button>
                        <button type="button" id="addOneMinuteButton"
                            class="btn announcement-tool-add-minute">+1分</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card announcement-tool-card">
            <h2>定型文一覧（対戦）</h2>
            <div class="announcement-tool-table-wrap">
                <table class="announcement-tool-table">
                    <thead>
                        <tr>
                            <th class="announcement-tool-column-timing">タイミング</th>
                            <th>定型文</th>
                        </tr>
                    </thead>
                    <tbody id="announcementTemplateTableBodyBeforeResult"></tbody>
                </table>
            </div>
        </div>

        <div class="card announcement-tool-card" id="announcementResultCard">
            <h2>結果項目</h2>
            <div class="announcement-tool-settings">
                <div class="announcement-tool-status-row">
                    <span class="announcement-tool-status-text">1〜5戦目の結果に使う項目です</span>
                </div>
                <label class="announcement-tool-setting">
                    <span class="announcement-tool-setting-label">Aチームの勝利数</span>
                    <select id="teamAWinsSelect" class="announcement-tool-select"></select>
                </label>
                <label class="announcement-tool-setting">
                    <span class="announcement-tool-setting-label">Bチームの勝利数</span>
                    <select id="teamBWinsSelect" class="announcement-tool-select"></select>
                </label>
                <label class="announcement-tool-setting">
                    <span class="announcement-tool-setting-label">勝利チーム</span>
                    <select id="winnerTeamSelect" class="announcement-tool-select">
                        <option value="teamA">Aチーム</option>
                        <option value="teamB">Bチーム</option>
                    </select>
                </label>
                <label class="announcement-tool-setting announcement-tool-url-setting">
                    <span class="announcement-tool-setting-label">結果表示URL</span>
                    <span id="resultUrlDisplay">https://taikousen.com/result</span>
                </label>
            </div>
        </div>

        <div class="card announcement-tool-card">
            <h2>定型文一覧（続き）</h2>
            <div class="announcement-tool-table-wrap">
                <table class="announcement-tool-table">
                    <thead>
                        <tr>
                            <th class="announcement-tool-column-timing">タイミング</th>
                            <th>定型文</th>
                        </tr>
                    </thead>
                    <tbody id="announcementTemplateTableBodyAfterResult"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="footerSlot"></div>
    <div id="copyToast" class="announcement-copy-toast" aria-live="polite"></div>

    <script src="./js/layout.js"></script>
    <script>
        const RESULT_URL = "https://taikousen.com/result";

        const announcementTemplateState = {
            teamAName: "Aチーム",
            teamBName: "Bチーム",
            role: "先鋒",
            battleNumber: "1",
            preparationHour: "10",
            preparationMinute: "00",
            teamAWins: "0",
            teamBWins: "0",
            winnerTeam: "teamA",
            resultUrl: RESULT_URL,
        };

        const announcementTemplateDefinitions = [
            { id: "oneHourBefore", timingLabel: "1時間前", buildPlainText: () => ["試合開始1時間前となりました。対戦開始時に対戦を開始できるよう、スムーズな大会進行にご協力をお願いします。"], buildPreviewLines: () => ["試合開始1時間前となりました。対戦開始時に対戦を開始できるよう、スムーズな大会進行にご協力をお願いします。"] },
            { id: "tenMinutesBefore", timingLabel: "10分前", buildPlainText: () => ["試合開始10分前となりました。"], buildPreviewLines: () => ["試合開始10分前となりました。"] },
            { id: "startTime", timingLabel: "試合開始時", buildPlainText: () => ["試合開始時刻となりました。"], buildPreviewLines: () => ["試合開始時刻となりました。"] },
            {
                id: "preparationNotice",
                timingLabel: "1〜5戦目の準備連絡",
                buildPlainText: (state) => [
                    `両チームの${state.role}は準備をしてください。`,
                    `完了したら、こちらに「${state.role}準備完了しました。」と送ってください。`,
                    `なお、${formatAnnouncementTime(state)}までに準備が完了しない場合、不戦敗となります。`,
                ],
                buildPreviewLines: (state) => [
                    `両チームの${highlightValue(state.role)}は準備をしてください。`,
                    `完了したら、こちらに「${highlightValue(`${state.role}準備完了しました。`)}」と送ってください。`,
                    `なお、${highlightValue(formatAnnouncementTime(state))}までに準備が完了しない場合、不戦敗となります。`,
                ],
            },
            {
                id: "startBattle",
                timingLabel: "1〜5戦目の開始連絡",
                buildPlainText: (state) => [`では、${state.role}は${state.battleNumber}戦目の対戦を開始してください。`],
                buildPreviewLines: (state) => [`では、${highlightValue(state.role)}は${highlightValue(`${state.battleNumber}戦目`)}の対戦を開始してください。`],
            },
            { id: "confirmResults", timingLabel: "対戦結果確認", buildPlainText: () => ["対戦結果に相違がないため、対戦結果を確定します。"], buildPreviewLines: () => ["対戦結果に相違がないため、対戦結果を確定します。"] },
            {
                id: "finalizeResults",
                timingLabel: "finの結果確定連絡",
                buildPlainText: (state) => [
                    `${state.teamAName}${state.teamAWins}勝、${state.teamBName}${state.teamBWins}勝で、${getWinningTeamName(state)}の勝利となりました。`,
                    "WEBサイトで対戦結果を表示しています。",
                    "ご確認の上、相違が無ければ対戦結果を確定します。",
                    state.resultUrl,
                ],
                buildPreviewLines: (state) => [
                    `${highlightValue(state.teamAName)}${highlightValue(state.teamAWins)}勝、${highlightValue(state.teamBName)}${highlightValue(state.teamBWins)}勝で、${highlightValue(getWinningTeamName(state))}の勝利となりました。`,
                    "WEBサイトで対戦結果を表示しています。",
                    "ご確認の上、相違が無ければ対戦結果を確定します。",
                    highlightValue(state.resultUrl),
                ],
            },
            { id: "closing", timingLabel: "最終挨拶", buildPlainText: () => ["それでは対戦結果を確定しました。", "両チーム対戦お疲れさまでした。"], buildPreviewLines: () => ["それでは対戦結果を確定しました。", "両チーム対戦お疲れさまでした。"] },
        ];

        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function highlightValue(value) {
            return `<span class="announcement-tool-variable">${escapeHtml(value)}</span>`;
        }

        function formatAnnouncementTime(state) {
            return `${state.preparationHour}時${state.preparationMinute}分`;
        }

        function getWinningTeamName(state) {
            return state.winnerTeam === "teamB" ? state.teamBName : state.teamAName;
        }

        function updateWinnerTeamOptionLabels() {
            const teamAInput = document.getElementById("teamANameInput");
            const teamBInput = document.getElementById("teamBNameInput");
            const winnerTeamSelect = document.getElementById("winnerTeamSelect");
            if (!teamAInput || !teamBInput || !winnerTeamSelect || winnerTeamSelect.options.length < 2) return;
            winnerTeamSelect.options[0].textContent = teamAInput.value.trim() || "Aチーム";
            winnerTeamSelect.options[1].textContent = teamBInput.value.trim() || "Bチーム";
        }

        function getInputValue(id, fallback = "") {
            const element = document.getElementById(id);
            return element ? element.value : fallback;
        }

        function getCurrentAnnouncementState() {
            return {
                teamAName: getInputValue("teamANameInput", announcementTemplateState.teamAName).trim() || "Aチーム",
                teamBName: getInputValue("teamBNameInput", announcementTemplateState.teamBName).trim() || "Bチーム",
                role: getInputValue("roleSelect", announcementTemplateState.role),
                battleNumber: getInputValue("battleNumberSelect", announcementTemplateState.battleNumber),
                preparationHour: getInputValue("preparationHourSelect", announcementTemplateState.preparationHour),
                preparationMinute: getInputValue("preparationMinuteSelect", announcementTemplateState.preparationMinute),
                teamAWins: getInputValue("teamAWinsSelect", announcementTemplateState.teamAWins),
                teamBWins: getInputValue("teamBWinsSelect", announcementTemplateState.teamBWins),
                winnerTeam: getInputValue("winnerTeamSelect", announcementTemplateState.winnerTeam),
                resultUrl: RESULT_URL,
            };
        }

        function buildPlainTextFromTemplate(definition, state) {
            return definition.buildPlainText(state).join("\n");
        }

        function buildPreviewHtmlFromTemplate(definition, state) {
            return definition.buildPreviewLines(state).map((line) => `<div class="announcement-tool-preview-line">${line}</div>`).join("");
        }

        function populateSelectOptions(selectElement, values, formatLabel) {
            if (!selectElement) return;
            selectElement.innerHTML = values.map((value) => {
                const label = formatLabel ? formatLabel(value) : value;
                return `<option value="${escapeHtml(value)}">${escapeHtml(label)}</option>`;
            }).join("");
        }

        async function loadTeamsFromApi() {
            const statusEl = document.getElementById("teamLoadStatus");
            if (statusEl) statusEl.textContent = "チーム読み込み状態: 読み込み中...";
            const paths = ["/api/teams", "./api/teams", "api/teams"];
            let lastError = null;

            for (const path of paths) {
                try {
                    const response = await fetch(path, { cache: "no-cache", credentials: "same-origin" });
                    if (!response.ok) {
                        lastError = `HTTP ${response.status} from ${path}`;
                        continue;
                    }

                    const json = await response.json();
                    let teams = [];
                    if (Array.isArray(json)) teams = json;
                    else if (Array.isArray(json.teams)) teams = json.teams;
                    else if (Array.isArray(json.results)) teams = json.results;
                    else if (json && typeof json === "object") {
                        teams = Object.values(json).filter((item) => item && (item.team_id || item.teamId || item.team_name || item.teamName));
                    }

                    const mapped = (Array.isArray(teams) ? teams : []).map((team) => ({
                        id: String(team.team_id || team.teamId || team.id || ""),
                        name: String(team.team_name || team.teamName || team.name || ""),
                    })).filter((team) => team.id || team.name);

                    if (statusEl) statusEl.textContent = `チーム読み込み状態: ${mapped.length} 件取得`;
                    return mapped;
                } catch (error) {
                    lastError = error && error.message ? error.message : String(error);
                }
            }

            if (statusEl) statusEl.textContent = lastError ? `チーム読み込み状態: 取得失敗 (${lastError})` : "チーム読み込み状態: 取得失敗";
            return [];
        }

        function populateTeamSelects(teams) {
            const aSelect = document.getElementById("teamASelect");
            const bSelect = document.getElementById("teamBSelect");
            const makeOptions = (items) => ["<option value=\"\">-- 手動入力 --</option>"].concat(items.map((team) => `<option value="${escapeHtml(team.id)}" data-name="${escapeHtml(team.name)}">${escapeHtml(team.name)}</option>`)).join("");
            if (aSelect) aSelect.innerHTML = makeOptions(teams);
            if (bSelect) bSelect.innerHTML = makeOptions(teams);
        }

        function syncOptionalControls(state) {
            const teamAWinsSelect = document.getElementById("teamAWinsSelect");
            const teamBWinsSelect = document.getElementById("teamBWinsSelect");
            const winnerTeamSelect = document.getElementById("winnerTeamSelect");
            const resultUrlDisplay = document.getElementById("resultUrlDisplay");

            if (teamAWinsSelect && teamAWinsSelect.options.length === 0) populateSelectOptions(teamAWinsSelect, ["0", "1", "2", "3", "4", "5"]);
            if (teamBWinsSelect && teamBWinsSelect.options.length === 0) populateSelectOptions(teamBWinsSelect, ["0", "1", "2", "3", "4", "5"]);

            if (teamAWinsSelect) teamAWinsSelect.value = state.teamAWins || announcementTemplateState.teamAWins;
            if (teamBWinsSelect) teamBWinsSelect.value = state.teamBWins || announcementTemplateState.teamBWins;
            if (winnerTeamSelect) winnerTeamSelect.value = state.winnerTeam || announcementTemplateState.winnerTeam;
            if (resultUrlDisplay) resultUrlDisplay.textContent = state.resultUrl || RESULT_URL;

            updateWinnerTeamOptionLabels();
        }

        function renderAnnouncementTemplateTable() {
            const topBody = document.getElementById("announcementTemplateTableBodyTop");
            const beforeResultBody = document.getElementById("announcementTemplateTableBodyBeforeResult");
            const afterResultBody = document.getElementById("announcementTemplateTableBodyAfterResult");
            const state = getCurrentAnnouncementState();
            const topIds = ["oneHourBefore", "tenMinutesBefore", "startTime"];
            const topParts = [];
            const beforeResultParts = [];
            const afterResultParts = [];

            for (const id of topIds) {
                const definition = announcementTemplateDefinitions.find((item) => item.id === id);
                if (!definition) continue;
                topParts.push(`
                    <tr>
                        <td class="announcement-tool-cell-timing">
                            <div class="announcement-tool-timing-label">${escapeHtml(definition.timingLabel)}</div>
                            <div><button type="button" class="btn announcement-tool-copy-button" data-template-id="${definition.id}">コピー</button></div>
                        </td>
                        <td class="announcement-tool-cell-template">${buildPreviewHtmlFromTemplate(definition, state)}</td>
                    </tr>
                `);
            }

            for (const definition of announcementTemplateDefinitions.slice(3, 5)) {
                beforeResultParts.push(`
                    <tr>
                        <td class="announcement-tool-cell-timing">
                            <div class="announcement-tool-timing-label">${escapeHtml(definition.timingLabel)}</div>
                            <div><button type="button" class="btn announcement-tool-copy-button" data-template-id="${definition.id}">コピー</button></div>
                        </td>
                        <td class="announcement-tool-cell-template">${buildPreviewHtmlFromTemplate(definition, state)}</td>
                    </tr>
                `);
            }

            for (const definition of announcementTemplateDefinitions.slice(5)) {
                afterResultParts.push(`
                    <tr>
                        <td class="announcement-tool-cell-timing">
                            <div class="announcement-tool-timing-label">${escapeHtml(definition.timingLabel)}</div>
                            <div><button type="button" class="btn announcement-tool-copy-button" data-template-id="${definition.id}">コピー</button></div>
                        </td>
                        <td class="announcement-tool-cell-template">${buildPreviewHtmlFromTemplate(definition, state)}</td>
                    </tr>
                `);
            }

            if (topBody) topBody.innerHTML = topParts.join("");
            if (beforeResultBody) beforeResultBody.innerHTML = beforeResultParts.join("");
            if (afterResultBody) afterResultBody.innerHTML = afterResultParts.join("");

            syncOptionalControls(state);
        }

        async function copyTextToClipboard(text) {
            if (navigator.clipboard?.writeText) {
                await navigator.clipboard.writeText(text);
                return;
            }

            const temporaryTextarea = document.createElement("textarea");
            temporaryTextarea.value = text;
            temporaryTextarea.setAttribute("readonly", "true");
            temporaryTextarea.style.position = "fixed";
            temporaryTextarea.style.left = "-9999px";
            document.body.appendChild(temporaryTextarea);
            temporaryTextarea.select();
            document.execCommand("copy");
            document.body.removeChild(temporaryTextarea);
        }

        let copyStatusTimerId = null;

        function showCopyStatus(message) {
            const copyToast = document.getElementById("copyToast");
            if (!copyToast) return;
            copyToast.textContent = message;
            copyToast.classList.add("is-visible");

            if (copyStatusTimerId) window.clearTimeout(copyStatusTimerId);
            copyStatusTimerId = window.setTimeout(() => {
                copyToast.textContent = "";
                copyToast.classList.remove("is-visible");
            }, 2000);
        }

        async function copyTemplateById(templateId) {
            const currentState = getCurrentAnnouncementState();
            const templateDefinition = announcementTemplateDefinitions.find((definition) => definition.id === templateId);
            if (!templateDefinition) return;

            await copyTextToClipboard(buildPlainTextFromTemplate(templateDefinition, currentState));
            showCopyStatus("コピーしました");
        }

        async function copyAllTemplates() {
            const currentState = getCurrentAnnouncementState();
            const allTemplateText = announcementTemplateDefinitions.map((definition) => buildPlainTextFromTemplate(definition, currentState)).join("\n\n");
            await copyTextToClipboard(allTemplateText);
            showCopyStatus("全文をコピーしました");
        }

        function initializeAnnouncementTemplateTool() {
            const roleSelect = document.getElementById("roleSelect");
            const battleNumberSelect = document.getElementById("battleNumberSelect");
            const preparationHourSelect = document.getElementById("preparationHourSelect");
            const preparationMinuteSelect = document.getElementById("preparationMinuteSelect");
            const teamANameInput = document.getElementById("teamANameInput");
            const teamBNameInput = document.getElementById("teamBNameInput");

            populateSelectOptions(roleSelect, ["先鋒", "次鋒", "中堅", "副将", "大将"]);
            populateSelectOptions(battleNumberSelect, ["1", "2", "3", "4", "5"], (value) => `${value}戦目`);
            populateSelectOptions(preparationHourSelect, Array.from({ length: 24 }, (_, index) => String(index).padStart(2, "0")));
            populateSelectOptions(preparationMinuteSelect, Array.from({ length: 60 }, (_, index) => String(index).padStart(2, "0")));

            if (teamANameInput) teamANameInput.value = announcementTemplateState.teamAName;
            if (teamBNameInput) teamBNameInput.value = announcementTemplateState.teamBName;
            if (roleSelect) roleSelect.value = announcementTemplateState.role;
            if (battleNumberSelect) battleNumberSelect.value = announcementTemplateState.battleNumber;

            // Set time selects to current time
            const now = new Date();
            const hh = String(now.getHours()).padStart(2, "0");
            const mm = String(now.getMinutes()).padStart(2, "0");
            if (preparationHourSelect) preparationHourSelect.value = hh;
            if (preparationMinuteSelect) preparationMinuteSelect.value = mm;
            // keep state in sync
            announcementTemplateState.preparationHour = hh;
            announcementTemplateState.preparationMinute = mm;

            // +1 minute button handler
            const addOneMinuteButton = document.getElementById("addOneMinuteButton");
            if (addOneMinuteButton) {
                addOneMinuteButton.addEventListener("click", () => {
                    if (!preparationHourSelect || !preparationMinuteSelect) return;
                    let hhNum = parseInt(preparationHourSelect.value, 10) || 0;
                    let mmNum = parseInt(preparationMinuteSelect.value, 10) || 0;
                    mmNum += 1;
                    if (mmNum >= 60) {
                        mmNum = 0;
                        hhNum = (hhNum + 1) % 24;
                    }
                    const hhStr = String(hhNum).padStart(2, "0");
                    const mmStr = String(mmNum).padStart(2, "0");
                    preparationHourSelect.value = hhStr;
                    preparationMinuteSelect.value = mmStr;
                    announcementTemplateState.preparationHour = hhStr;
                    announcementTemplateState.preparationMinute = mmStr;
                    renderAnnouncementTemplateTable();
                });
            }
            const subOneMinuteButton = document.getElementById("subOneMinuteButton");
            if (subOneMinuteButton) {
                subOneMinuteButton.addEventListener("click", () => {
                    if (!preparationHourSelect || !preparationMinuteSelect) return;
                    let hhNum = parseInt(preparationHourSelect.value, 10) || 0;
                    let mmNum = parseInt(preparationMinuteSelect.value, 10) || 0;
                    mmNum -= 1;
                    if (mmNum < 0) {
                        mmNum = 59;
                        hhNum = (hhNum + 23) % 24;
                    }
                    const hhStr = String(hhNum).padStart(2, "0");
                    const mmStr = String(mmNum).padStart(2, "0");
                    preparationHourSelect.value = hhStr;
                    preparationMinuteSelect.value = mmStr;
                    announcementTemplateState.preparationHour = hhStr;
                    announcementTemplateState.preparationMinute = mmStr;
                    renderAnnouncementTemplateTable();
                });
            }

            updateWinnerTeamOptionLabels();

            loadTeamsFromApi().then((teams) => {
                populateTeamSelects(teams);

                const teamASelect = document.getElementById("teamASelect");
                const teamBSelect = document.getElementById("teamBSelect");

                if (teamASelect) {
                    teamASelect.addEventListener("change", () => {
                        const option = teamASelect.selectedOptions[0];
                        const name = option?.dataset?.name || "";
                        if (name && teamANameInput) {
                            teamANameInput.value = name;
                            updateWinnerTeamOptionLabels();
                            renderAnnouncementTemplateTable();
                        }
                    });
                }

                if (teamBSelect) {
                    teamBSelect.addEventListener("change", () => {
                        const option = teamBSelect.selectedOptions[0];
                        const name = option?.dataset?.name || "";
                        if (name && teamBNameInput) {
                            teamBNameInput.value = name;
                            updateWinnerTeamOptionLabels();
                            renderAnnouncementTemplateTable();
                        }
                    });
                }
            }).catch(() => {
                // ignore
            });

            const inputs = ["teamASelect", "teamBSelect", "teamANameInput", "teamBNameInput", "roleSelect", "battleNumberSelect", "preparationHourSelect", "preparationMinuteSelect", "teamAWinsSelect", "teamBWinsSelect", "winnerTeamSelect"];
            for (const inputId of inputs) {
                const element = document.getElementById(inputId);
                if (!element) continue;
                element.addEventListener("input", renderAnnouncementTemplateTable);
                element.addEventListener("change", renderAnnouncementTemplateTable);
            }

            if (teamANameInput) teamANameInput.addEventListener("input", updateWinnerTeamOptionLabels);
            if (teamBNameInput) teamBNameInput.addEventListener("input", updateWinnerTeamOptionLabels);

            const topBodyEl = document.getElementById("announcementTemplateTableBodyTop");
            const beforeResultBodyEl = document.getElementById("announcementTemplateTableBodyBeforeResult");
            const afterResultBodyEl = document.getElementById("announcementTemplateTableBodyAfterResult");
            const tableClickHandler = (event) => {
                const copyButton = event.target.closest("button[data-template-id]");
                if (!copyButton) return;
                copyTemplateById(copyButton.dataset.templateId).catch(() => showCopyStatus("コピーに失敗しました"));
            };

            if (topBodyEl) topBodyEl.addEventListener("click", tableClickHandler);
            if (beforeResultBodyEl) beforeResultBodyEl.addEventListener("click", tableClickHandler);
            if (afterResultBodyEl) afterResultBodyEl.addEventListener("click", tableClickHandler);

            const copyAllButton = document.getElementById("copyAllButton");
            if (copyAllButton) {
                copyAllButton.addEventListener("click", () => {
                    copyAllTemplates().catch(() => showCopyStatus("コピーに失敗しました"));
                });
            }

            renderAnnouncementTemplateTable();
        }

        document.addEventListener("DOMContentLoaded", initializeAnnouncementTemplateTool);
    </script>
</body>

</html>
