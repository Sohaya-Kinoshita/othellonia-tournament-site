<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="icon" href="./images/Logo.jpg" type="image/jpeg">
    <title>プレイヤーを削除</title>
</head>

<body>
    <div id="headerSlot"></div>

    <main class="container">
        <div class="card">
            <h1>プレイヤーを削除</h1>
            <hr>
            <p id="adminMessage">確認中...</p>
            <a href="./admin.html" class="btn">管理者ページに戻る</a>
        </div>

        <div class="card hidden" id="playerDeleteCard">
            <h2>削除するプレイヤーを選択</h2>
            <p style="margin: 0 0 12px; color: #666; font-size: 14px;">
                チームに参加しているプレイヤーは削除できません。未参加のプレイヤーのみ表示しています。
            </p>
            <div id="playerListContainer" style="overflow-x: auto;"></div>
            <p id="noPlayersMessage" style="text-align: center; color: #666; display: none;">
                削除可能なプレイヤー（未参加）がいません
            </p>
            <div id="deleteMessage" class="message" style="display: none;"></div>
        </div>
    </main>

    <div id="confirmDeleteModal" class="confirm-delete-modal hidden" aria-hidden="true">
        <div class="confirm-delete-overlay" id="confirmDeleteOverlay"></div>
        <div class="confirm-delete-panel" role="dialog" aria-modal="true" aria-labelledby="confirmDeleteTitle">
            <h3 id="confirmDeleteTitle" class="confirm-delete-title">削除確認</h3>
            <p id="confirmDeleteText" class="confirm-delete-text"></p>
            <div class="confirm-delete-actions">
                <button type="button" class="btn confirm-btn-no" id="confirmDeleteNo">いいえ</button>
                <button type="button" class="btn" id="confirmDeleteYes">はい</button>
            </div>
        </div>
    </div>

    <div id="footerSlot"></div>

    <script src="./js/layout.js"></script>
    <script>
        let resolveDeleteConfirm = null;

        async function checkAdmin() {
            const response = await fetch("/api/me");
            const result = await response.json();

            const adminMessage = document.getElementById("adminMessage");
            const playerDeleteCard = document.getElementById("playerDeleteCard");

            if (!result.isLoggedIn) {
                location.href = "./admin_login.html";
                return;
            }

            if (result.type !== "admin") {
                adminMessage.textContent = "あなたにはこのページの閲覧権限がありません。";
                return;
            }

            adminMessage.style.display = "none";
            playerDeleteCard.classList.remove("hidden");
            loadPlayers();
        }

        async function loadPlayers() {
            const playerListContainer = document.getElementById("playerListContainer");
            const noPlayersMessage = document.getElementById("noPlayersMessage");

            try {
                const response = await fetch("/api/players");
                const result = await response.json();

                if (!response.ok) {
                    showMessage("プレイヤー一覧の取得に失敗しました", "error");
                    return;
                }

                const players = result.players || [];
                const deletablePlayers = players.filter(
                    (player) => Number(player.is_team_participant || 0) === 0,
                );

                if (deletablePlayers.length === 0) {
                    playerListContainer.innerHTML = "";
                    noPlayersMessage.style.display = "block";
                    return;
                }

                noPlayersMessage.style.display = "none";
                playerListContainer.innerHTML = `
                    <table style="border-collapse: collapse; table-layout: auto; width: auto;">
                        <thead>
                            <tr style="border-bottom: 2px solid #ccc;">
                                <th style="padding: 5px; text-align: center; border-right: 2px solid #999; width: 130px;">プレイヤーID</th>
                                <th style="padding: 5px; text-align: left; border-right: 2px dotted #ccc; white-space: nowrap;">プレイヤー名</th>
                                <th style="padding: 5px; text-align: center; width: 100px;">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${deletablePlayers
                        .map(
                            (player) => `
                                <tr style="border-bottom: 1px solid #eee;">
                                    <td style="padding: 5px; text-align: center; border-right: 2px solid #999;">${player.player_id}</td>
                                    <td style="padding: 5px; border-right: 2px dotted #ccc; white-space: nowrap;">${player.player_name}</td>
                                    <td style="padding: 5px; text-align: center;">
                                        <button type="button" class="btn" data-player-id="${player.player_id}">削除</button>
                                    </td>
                                </tr>
                            `,
                        )
                        .join("")}
                        </tbody>
                    </table>
                `;

                playerListContainer.querySelectorAll("button[data-player-id]").forEach((button) => {
                    button.addEventListener("click", async () => {
                        const playerId = button.getAttribute("data-player-id");
                        const playerName =
                            button.closest("tr")?.children?.[1]?.textContent?.trim() || "";
                        const confirmed = await openDeleteConfirm(
                            `プレイヤー ${playerId}（${playerName}）を削除します。`,
                        );
                        if (!confirmed) return;

                        const deleteResponse = await fetch("/api/players", {
                            method: "DELETE",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ playerId }),
                        });
                        const deleteResult = await deleteResponse.json();

                        if (deleteResponse.ok) {
                            showMessage("プレイヤーを削除しました", "success");
                            await loadPlayers();
                        } else {
                            showMessage(deleteResult.message || "プレイヤー削除に失敗しました", "error");
                        }
                    });
                });
            } catch (error) {
                showMessage("通信エラーが発生しました", "error");
            }
        }

        function setupDeleteConfirmDialog() {
            const modal = document.getElementById("confirmDeleteModal");
            const overlay = document.getElementById("confirmDeleteOverlay");
            const yesButton = document.getElementById("confirmDeleteYes");
            const noButton = document.getElementById("confirmDeleteNo");

            const closeDialog = (confirmed) => {
                modal.classList.add("hidden");
                modal.setAttribute("aria-hidden", "true");

                if (resolveDeleteConfirm) {
                    const resolver = resolveDeleteConfirm;
                    resolveDeleteConfirm = null;
                    resolver(confirmed);
                }
            };

            yesButton.addEventListener("click", () => closeDialog(true));
            noButton.addEventListener("click", () => closeDialog(false));
            overlay.addEventListener("click", () => closeDialog(false));
        }

        function openDeleteConfirm(message) {
            const modal = document.getElementById("confirmDeleteModal");
            const text = document.getElementById("confirmDeleteText");
            const yesButton = document.getElementById("confirmDeleteYes");

            text.textContent = message;
            modal.classList.remove("hidden");
            modal.setAttribute("aria-hidden", "false");

            setTimeout(() => {
                yesButton.focus();
            }, 0);

            return new Promise((resolve) => {
                resolveDeleteConfirm = resolve;
            });
        }

        let toastTimer = null;

        function showMessage(text, type) {
            const messageDiv = document.getElementById("deleteMessage");
            messageDiv.textContent = text;
            messageDiv.className =
                type === "success"
                    ? "message success toast-bottom"
                    : "message error toast-bottom";
            messageDiv.style.display = "block";

            requestAnimationFrame(() => {
                messageDiv.classList.add("show");
            });

            if (toastTimer) {
                clearTimeout(toastTimer);
            }

            toastTimer = setTimeout(() => {
                messageDiv.classList.remove("show");
                setTimeout(() => {
                    messageDiv.style.display = "none";
                }, 260);
            }, 2800);
        }

        document.addEventListener("DOMContentLoaded", () => {
            setupDeleteConfirmDialog();
            checkAdmin();
        });
    </script>
    <script>
        window.addEventListener('DOMContentLoaded', checkAdmin);
    </script>
</body>

</html>
