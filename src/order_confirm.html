<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="icon" href="./images/Logo.jpg" type="image/jpeg">
    <title>オーダーの確定</title>
</head>

<body>
    <div id="headerSlot"></div>

    <main class="container">
        <div class="card">
            <h1>オーダーの確定</h1>
            <hr>
            <p id="adminMessage">確認中...</p>
            <a href="./admin.html" class="btn">管理者ページに戻る</a>
        </div>

        <div class="card hidden" id="orderConfirmCard">
            <h2>オーダーの確定</h2>
            <hr>

            <div class="margin-bottom-20">
                <label for="matchSelect">確認するマッチを選択</label>
                <select id="matchSelect" class="select-full-width">
                    <option value="">-- マッチを選択してください --</option>
                </select>
            </div>

            <div id="matchDetailsContainer" class="match-details-hidden">
                <div class="card card-match-info">
                    <h3>マッチ情報</h3>
                    <p><strong>マッチID:</strong> <span id="displayMatchId"></span></p>
                    <p><strong>チームA:</strong> <span id="displayTeamA"></span></p>
                    <p><strong>チームB:</strong> <span id="displayTeamB"></span></p>
                    <p><strong>対戦開始日時:</strong> <span id="displayScheduledAt"></span></p>
                    <p><strong>提出期限:</strong> <span id="displayDeadline"></span></p>

                    <h3 class="order-confirm-section-title">オーダー確認</h3>
                    <div class="order-container">
                        <div class="team-section">
                            <h4 id="teamAHeader" class="team-header"></h4>
                            <div id="teamAOrderStatus" class="order-status"></div>
                            <div id="teamAOrderDetails" class="order-details"></div>
                        </div>
                        <div>
                            <h4 id="teamBHeader" class="team-header"></h4>
                            <div id="teamBOrderStatus" class="order-status"></div>
                            <div id="teamBOrderDetails" class="order-details"></div>
                        </div>
                    </div>

                    <button type="button" class="btn initialize-button" id="initializeMatchButton">マッチを確定</button>

                    <button type="button" class="btn refresh-button" id="refreshButton">更新</button>
                    <div id="confirmMessage" class="message confirm-message"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="footerSlot"></div>

    <script src="./js/layout.js"></script>
    <script>
        let allMatches = [];
        let currentMatchId = null;
        let isCurrentMatchConfirmed = false;

        function formatDateTime(datetimeText) {
            if (!datetimeText) {
                return "-";
            }
            const date = new Date(datetimeText);
            if (Number.isNaN(date.getTime())) {
                return datetimeText;
            }
            return date.toLocaleString("ja-JP", { year: "numeric", month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" });
        }

        function getBattleModeLabel(gameNumber) {
            return gameNumber <= 3 ? "シーズン" : "グローリー";
        }

        async function checkAdmin() {
            const response = await fetch("/api/me");
            const result = await response.json();

            const adminMessage = document.getElementById("adminMessage");
            const orderConfirmCard = document.getElementById("orderConfirmCard");

            if (!result.isLoggedIn) {
                location.href = "./admin_login.html";
                return;
            }

            if (result.type !== "admin") {
                adminMessage.textContent = "あなたにはこのページの閲覧権限がありません。";
                return;
            }

            adminMessage.style.display = "none";
            orderConfirmCard.classList.remove("hidden");
            loadMatches();
        }

        async function loadMatches() {
            try {
                const response = await fetch("/api/matches");
                const result = await response.json();

                if (!response.ok) {
                    alert("マッチ一覧の取得に失敗しました");
                    return;
                }

                allMatches = result.matches || [];
                populateMatchSelect();
            } catch (error) {
                console.error("Error loading matches:", error);
                alert("マッチ情報の読み込みに失敗しました");
            }
        }

        function populateMatchSelect() {
            const matchSelect = document.getElementById("matchSelect");
            matchSelect.innerHTML = '<option value="">-- マッチを選択してください --</option>';

            // 両チームのオーダーが未確定で、かつ確定済みでないマッチのみ表示
            const pendingMatches = allMatches.filter(
                (match) => (match.confirmed_team_count || 0) < 2 && !match.started_at && !match.winner_team_id,
            );

            pendingMatches.forEach((match) => {
                const option = document.createElement("option");
                option.value = match.match_id;
                option.textContent = `${match.match_id}: ${match.team_a_name} vs ${match.team_b_name}`;
                matchSelect.appendChild(option);
            });

            matchSelect.addEventListener("change", () => {
                const selectedMatchId = matchSelect.value;
                if (selectedMatchId) {
                    currentMatchId = selectedMatchId;
                    isCurrentMatchConfirmed = false;
                    displayMatchDetails();
                } else {
                    document.getElementById("matchDetailsContainer").style.display = "none";
                }
            });
        }

        async function displayMatchDetails() {
            const match = allMatches.find((m) => m.match_id === currentMatchId);
            if (!match) return;

            const displayMatchId = document.getElementById("displayMatchId");
            const displayTeamA = document.getElementById("displayTeamA");
            const displayTeamB = document.getElementById("displayTeamB");
            const displayScheduledAt = document.getElementById("displayScheduledAt");
            const displayDeadline = document.getElementById("displayDeadline");
            const teamAHeader = document.getElementById("teamAHeader");
            const teamBHeader = document.getElementById("teamBHeader");
            const teamAOrderStatus = document.getElementById("teamAOrderStatus");
            const teamBOrderStatus = document.getElementById("teamBOrderStatus");
            const teamAOrderDetails = document.getElementById("teamAOrderDetails");
            const teamBOrderDetails = document.getElementById("teamBOrderDetails");
            const matchDetailsContainer = document.getElementById("matchDetailsContainer");
            const refreshButton = document.getElementById("refreshButton");
            const initializeMatchButton = document.getElementById("initializeMatchButton");

            const setMatchLockedState = (locked) => {
                document.getElementById("matchSelect").disabled = locked;
                refreshButton.disabled = locked;
                initializeMatchButton.disabled = locked;
                if (locked) {
                    initializeMatchButton.style.display = "none";
                    document.getElementById("confirmMessage").textContent = "このマッチは確定済みのため更新できません。";
                }
            };

            displayMatchId.textContent = match.match_id;
            displayTeamA.textContent = `${match.team_a_id} - ${match.team_a_name}`;
            displayTeamB.textContent = `${match.team_b_id} - ${match.team_b_name}`;
            displayScheduledAt.textContent = formatDateTime(match.scheduled_at);
            displayDeadline.textContent = formatDateTime(match.order_deadline);

            teamAHeader.textContent = `${match.team_a_id} - ${match.team_a_name}`;
            teamBHeader.textContent = `${match.team_b_id} - ${match.team_b_name}`;

            if (match.started_at || match.winner_team_id || isCurrentMatchConfirmed) {
                setMatchLockedState(true);
            } else {
                setMatchLockedState(false);
            }

            refreshButton.onclick = async () => {
                await loadOrderStatus(match);
            };

            await loadOrderStatus(match);
            matchDetailsContainer.style.display = "block";

            async function loadOrderStatus(match) {
                try {
                    const responseA = await fetch(`/api/order?matchId=${encodeURIComponent(match.match_id)}&teamId=${encodeURIComponent(match.team_a_id)}`);
                    const resultA = await responseA.json();

                    const responseB = await fetch(`/api/order?matchId=${encodeURIComponent(match.match_id)}&teamId=${encodeURIComponent(match.team_b_id)}`);
                    const resultB = await responseB.json();

                    // Team A
                    const playerOrderA = resultA.playerOrder || [];
                    const hasSubmittedA = playerOrderA.length > 0;

                    if (hasSubmittedA) {
                        teamAOrderStatus.style.backgroundColor = "#e8f5e9";
                        teamAOrderStatus.innerHTML = `<strong style="color: #2e7d32;">✓ オーダー提出済み</strong><br>提出：${formatDateTime(resultA.submittedAt)}`;
                        const reserveA = (resultA.reservePlayers || []).slice(0, 2);
                        const reserveAText = reserveA.length > 0 ? reserveA.join(", ") : "未設定";
                        teamAOrderDetails.innerHTML = `<strong>オーダー:</strong> ${playerOrderA.slice(0, 5).map((id, idx) => `第${idx + 1}戦（${getBattleModeLabel(idx + 1)}）: ${id}`).join(", ")}<br><strong>リザーブ:</strong> ${reserveAText}`;
                    } else {
                        teamAOrderStatus.style.backgroundColor = "#fff3e0";
                        teamAOrderStatus.innerHTML = `<strong style="color: #f57f17;">✗ オーダー未提出</strong>`;
                        teamAOrderDetails.innerHTML = "";
                    }

                    // Team B
                    const playerOrderB = resultB.playerOrder || [];
                    const hasSubmittedB = playerOrderB.length > 0;

                    if (hasSubmittedB) {
                        teamBOrderStatus.style.backgroundColor = "#e8f5e9";
                        teamBOrderStatus.innerHTML = `<strong style="color: #2e7d32;">✓ オーダー提出済み</strong><br>提出：${formatDateTime(resultB.submittedAt)}`;
                        const reserveB = (resultB.reservePlayers || []).slice(0, 2);
                        const reserveBText = reserveB.length > 0 ? reserveB.join(", ") : "未設定";
                        teamBOrderDetails.innerHTML = `<strong>オーダー:</strong> ${playerOrderB.slice(0, 5).map((id, idx) => `第${idx + 1}戦（${getBattleModeLabel(idx + 1)}）: ${id}`).join(", ")}<br><strong>リザーブ:</strong> ${reserveBText}`;
                    } else {
                        teamBOrderStatus.style.backgroundColor = "#fff3e0";
                        teamBOrderStatus.innerHTML = `<strong style="color: #f57f17;">✗ オーダー未提出</strong>`;
                        teamBOrderDetails.innerHTML = "";
                    }

                    // Show match initialization button if both teams have submitted orders
                    if (hasSubmittedA && hasSubmittedB && !isCurrentMatchConfirmed && !match.started_at && !match.winner_team_id) {
                        initializeMatchButton.style.display = "block";
                        initializeMatchButton.onclick = async () => {
                            await initializeMatch(match);
                        };
                    } else {
                        initializeMatchButton.style.display = "none";
                    }
                } catch (error) {
                    console.error("Error loading order status:", error);
                    teamAOrderStatus.innerHTML = "オーダー情報の取得に失敗しました";
                    teamBOrderStatus.innerHTML = "オーダー情報の取得に失敗しました";
                }
            }

            async function initializeMatch(match) {
                if (!confirm("マッチを確定し、ゲームを初期化してよろしいですか？")) {
                    return;
                }

                try {
                    const response = await fetch("/api/matches", {
                        method: "PATCH",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({
                            matchId: match.match_id,
                            teamAId: match.team_a_id,
                            teamBId: match.team_b_id,
                            scheduledAt: match.scheduled_at,
                            orderDeadline: match.order_deadline,
                            confirmMatch: true,
                        }),
                    });

                    const result = await response.json();

                    if (!response.ok) {
                        alert(`マッチの確定に失敗しました: ${result.message || "エラーが発生しました"}`);
                        return;
                    }

                    alert("マッチを確定し、ゲームを初期化しました");
                    isCurrentMatchConfirmed = true;
                    setMatchLockedState(true);
                    await loadOrderStatus(match);
                } catch (error) {
                    console.error("Error initializing match:", error);
                    alert("マッチ確定処理でエラーが発生しました");
                }
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            checkAdmin();
        });
    </script>
</body>

</html>
