<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
    <title>プレイヤーページ</title>
    <style>
        .player-section-box {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 14px;
            background: #fff;
        }

        .player-section-box h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1.05rem;
        }

        .player-section-content {
            color: #333;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <div id="headerSlot"></div>

    <main class="container">
        <div class="card">
            <h1>プレイヤーページ</h1>
            <hr>
            <p id="playerMessage">確認中...</p>
            <a href="./index.html" class="btn">トップページへ戻る</a>
        </div>

        <div class="card hidden" id="playerCard">
            <h2>プレイヤーメニュー</h2>
            <hr>

            <section class="player-section-box">
                <h3>これまでの個人勝率</h3>
                <div id="personalStatsBox" class="player-section-content">読込中...</div>
            </section>

            <section class="player-section-box">
                <h3>自分の所属チーム情報</h3>
                <div id="teamInfoBox" class="player-section-content">読込中...</div>
            </section>

            <section id="opponentSection" class="player-section-box">
                <h3>確定済み対戦の相手情報</h3>
                <div id="opponentInfoBox" class="player-section-content">読込中...</div>
            </section>

            <section id="streamPlanSection" class="player-section-box">
                <h3>配信予定登録（マッチ別）</h3>
                <div id="streamPlanBox" class="player-section-content">読込中...</div>
            </section>

            <h3>今後追加予定</h3>
            <ul>
                <li>対戦結果の確認</li>
                <li>お知らせ表示</li>
            </ul>
        </div>
    </main>

    <div id="footerSlot"></div>

    <script src="./js/layout.js"></script>
    <script>
        function formatDateTime(datetimeText) {
            if (!datetimeText) {
                return "-";
            }
            const date = new Date(datetimeText);
            if (Number.isNaN(date.getTime())) {
                return datetimeText;
            }
            return date.toLocaleString("ja-JP", { year: "numeric", month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" });
        }

        function getBattleModeLabel(battleMode) {
            if (battleMode === "S") {
                return "シーズンマッチ";
            }
            if (battleMode === "G") {
                return "グローリーモード";
            }
            return "-";
        }

        async function copyPlayerId(playerId) {
            try {
                await navigator.clipboard.writeText(playerId);
                alert(`プレイヤーIDをコピーしました: ${playerId}`);
            } catch (error) {
                console.error("Copy player ID error:", error);
                alert("コピーに失敗しました");
            }
        }

        async function loadMyTeams() {
            const personalStatsBox = document.getElementById("personalStatsBox");
            const teamInfoBox = document.getElementById("teamInfoBox");
            const opponentSection = document.getElementById("opponentSection");
            const opponentInfoBox = document.getElementById("opponentInfoBox");

            try {
                const response = await fetch("/api/player-teams");
                const result = await response.json();

                if (!response.ok || !result.success) {
                    personalStatsBox.textContent = "個人勝率の取得に失敗しました。";
                    teamInfoBox.textContent = result.message || "所属チーム情報を取得できませんでした。";
                    return;
                }

                const stats = result.personalStats || { totalGames: 0, wins: 0, losses: 0, winRate: null };
                const teams = result.teams || [];
                const opponents = result.opponents || [];

                if (stats.totalGames === 0) {
                    personalStatsBox.textContent = "まだ試合結果がありません。";
                } else {
                    personalStatsBox.textContent = `勝率: ${stats.winRate}%（${stats.wins}勝 ${stats.losses}敗 / ${stats.totalGames}戦）`;
                }

                if (teams.length === 0) {
                    teamInfoBox.textContent = "現在、所属チームはありません。";
                } else {
                    teamInfoBox.innerHTML = teams
                        .map((team) => `<div>${team.team_id} - ${team.team_name}</div>`)
                        .join("");
                }

                if (opponents.length === 0) {
                    opponentSection.style.display = "none";
                } else {
                    opponentSection.style.display = "block";
                    opponentInfoBox.innerHTML = opponents
                        .map((item) => `
                            <div style="margin-bottom: 8px; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                                <div><strong>${item.my_team_name || "-"}</strong> vs <strong>${item.opponent_team_name || "-"}</strong> / 第${item.game_number}戦</div>
                                <div>対戦形式: ${getBattleModeLabel(item.battle_mode)}</div>
                                <div>対戦日: ${formatDateTime(item.scheduled_at)}</div>
                                <div>
                                    相手: 
                                    <a href="#" onclick="event.preventDefault(); copyPlayerId('${item.opponent_player_id}')" style="color: #2563eb; text-decoration: underline; cursor: pointer;" title="クリックしてコピー">${item.opponent_player_id}</a>
                                    - ${item.opponent_player_name || "-"}
                                </div>
                            </div>
                        `)
                        .join("");
                }
            } catch (error) {
                console.error("Load my teams error:", error);
                personalStatsBox.textContent = "個人勝率の取得に失敗しました。";
                teamInfoBox.textContent = "所属チーム情報の取得に失敗しました。";
                opponentSection.style.display = "none";
            }
        }

        function buildStreamPlanCard(plan) {
            const normalizedStatus = ["available", "undecided", "unavailable"].includes(plan.stream_status)
                ? plan.stream_status
                : "undecided";
            const selectedAvailable = normalizedStatus === "available" ? "selected" : "";
            const selectedUnavailable = normalizedStatus === "unavailable" ? "selected" : "";
            const selectedUndecided = normalizedStatus === "undecided" ? "selected" : "";
            const safeUrl = plan.mirrativ_url || "";

            return `
                <div style="margin-bottom: 10px; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                    <div style="font-weight: 700; margin-bottom: 6px;">${plan.match_id} / ${plan.team_a_name || "-"} vs ${plan.team_b_name || "-"}</div>
                    <div style="font-size: 0.9em; margin-bottom: 6px;">対戦日: ${formatDateTime(plan.scheduled_at)}</div>
                    <div style="display: grid; gap: 8px;">
                        <label>
                            配信予定
                            <select id="streamStatus_${plan.match_id}">
                                <option value="available" ${selectedAvailable}>配信する</option>
                                <option value="undecided" ${selectedUndecided}>未定</option>
                                <option value="unavailable" ${selectedUnavailable}>配信しない</option>
                            </select>
                        </label>
                        <div style="font-size: 0.9em;">対戦相手: ${plan.opponent_player_name || "-"}</div>
                        <label>
                            ミラティブURL（配信する場合のみ）
                            <input type="text" id="streamUrl_${plan.match_id}" value="${safeUrl}" placeholder="https://www.mirrativ.com/user/..." />
                        </label>
                        <button type="button" class="btn" id="saveStreamPlan_${plan.match_id}">この内容で保存</button>
                    </div>
                </div>
            `;
        }

        async function loadStreamPlans() {
            const streamPlanSection = document.getElementById("streamPlanSection");
            const streamPlanBox = document.getElementById("streamPlanBox");

            try {
                const response = await fetch("/api/player-stream-plans");
                const result = await response.json();

                if (!response.ok || !result.success) {
                    streamPlanBox.textContent = result.message || "配信予定の取得に失敗しました。";
                    return;
                }

                const plans = result.plans || [];

                if (plans.length === 0) {
                    streamPlanSection.style.display = "none";
                    return;
                }

                streamPlanSection.style.display = "block";
                streamPlanBox.innerHTML = plans.map((plan) => buildStreamPlanCard(plan)).join("");

                plans.forEach((plan) => {
                    const matchId = plan.match_id;
                    const saveButton = document.getElementById(`saveStreamPlan_${matchId}`);
                    const statusSelect = document.getElementById(`streamStatus_${matchId}`);
                    const urlInput = document.getElementById(`streamUrl_${matchId}`);

                    const toggleUrlState = () => {
                        const enabled = statusSelect.value === "available";
                        urlInput.disabled = !enabled;
                        if (!enabled) {
                            urlInput.value = "";
                        }
                    };

                    toggleUrlState();
                    statusSelect.addEventListener("change", toggleUrlState);

                    saveButton.addEventListener("click", async () => {
                        saveButton.disabled = true;
                        try {
                            const saveResponse = await fetch("/api/player-stream-plans", {
                                method: "PUT",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({
                                    matchId,
                                    streamStatus: statusSelect.value,
                                    mirrativUrl: urlInput.value.trim(),
                                }),
                            });
                            const saveResult = await saveResponse.json();
                            if (!saveResponse.ok || !saveResult.success) {
                                alert(saveResult.message || "配信予定の保存に失敗しました。");
                                return;
                            }
                            alert("配信予定を保存しました。");
                        } catch (error) {
                            console.error("Save stream plan error:", error);
                            alert("配信予定の保存に失敗しました。");
                        } finally {
                            saveButton.disabled = false;
                        }
                    });
                });
            } catch (error) {
                console.error("Load stream plans error:", error);
                streamPlanBox.textContent = "配信予定の取得に失敗しました。";
            }
        }

        async function checkPlayer() {
            try {
                const response = await fetch("/api/me");
                const result = await response.json();

                const playerMessage = document.getElementById("playerMessage");
                const playerCard = document.getElementById("playerCard");

                if (!result.isLoggedIn) {
                    location.href = "./login.html";
                    return;
                }

                if (result.type !== "player") {
                    playerMessage.textContent = "あなたにはこのページの閲覧権限がありません。";
                    return;
                }

                playerMessage.style.display = "none";
                playerCard.classList.remove("hidden");
                await loadMyTeams();
                await loadStreamPlans();
            } catch (error) {
                console.error("Player page error:", error);
                const playerMessage = document.getElementById("playerMessage");
                playerMessage.textContent = "プレイヤー情報の取得に失敗しました。";
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            checkPlayer();
        });
    </script>
</body>

</html>
