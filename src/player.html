<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="icon" href="./images/Logo.jpg" type="image/jpeg">
    <title>プレイヤーページ</title>
    <style>
        .player-section-box {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 14px;
            background: #fff;
        }

        .player-section-box h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1.05rem;
        }

        .player-section-content {
            color: #333;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <div id="headerSlot"></div>

    <main class="container">
        <div class="card">
            <h1>プレイヤーページ</h1>
            <hr>
            <p id="playerMessage">確認中...</p>
            <a href="./index.html" class="btn">トップページへ戻る</a>
        </div>

        <div class="card hidden" id="playerCard">
            <h2>プレイヤーメニュー</h2>
            <hr>

            <section class="player-section-box">
                <h3>これまでの個人勝率</h3>
                <div id="personalStatsBox" class="player-section-content">読込中...</div>
            </section>

            <section class="player-section-box">
                <h3>自分の所属チーム情報</h3>
                <div id="teamInfoBox" class="player-section-content">読込中...</div>
            </section>

            <section id="opponentSection" class="player-section-box">
                <h3>確定済み対戦の相手情報</h3>
                <div id="opponentInfoBox" class="player-section-content">読込中...</div>
            </section>

            <h3>今後追加予定</h3>
            <ul>
                <li>対戦結果の確認</li>
                <li>お知らせ表示</li>
            </ul>
        </div>
    </main>

    <div id="footerSlot"></div>

    <script src="./js/layout.js"></script>
    <script>
        /**
         * ミラティブの共有メッセージからURLだけを抽出する。
         * - テキスト混じりの場合はURL部分だけを取り出す。
         * - deep_link_preview URL はアプリで見るボタンがあるためそのまま保持する。
         * - URLのみの入力は変換不要（null を返す）。
         * @param {string} raw
         * @returns {string|null} 変換後URL（変換不要の場合はnull）
         */
        function extractMirrativUrl(raw) {
            const trimmed = raw.trim();
            const urlMatch = trimmed.match(/https?:\/\/\S+/);
            if (!urlMatch) return null;
            const url = urlMatch[0];
            // URLのみの入力なら変換不要
            if (url === trimmed) return null;
            // テキスト混じりの場合はURL部分だけ返す（deep_link_previewもそのまま）
            return url;
        }

        function formatDateTime(datetimeText) {
            if (!datetimeText) {
                return "-";
            }
            const date = new Date(datetimeText);
            if (Number.isNaN(date.getTime())) {
                return datetimeText;
            }
            return date.toLocaleString("ja-JP", { year: "numeric", month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" });
        }

        function getBattleModeLabel(battleMode) {
            if (battleMode === "S") {
                return "シーズンマッチ";
            }
            if (battleMode === "G") {
                return "グローリーモード";
            }
            return "-";
        }

        async function copyPlayerId(playerId) {
            try {
                await navigator.clipboard.writeText(playerId);
                alert(`プレイヤーIDをコピーしました: ${playerId}`);
            } catch (error) {
                console.error("Copy player ID error:", error);
                alert("コピーに失敗しました");
            }
        }

        async function loadMyTeams() {
            const personalStatsBox = document.getElementById("personalStatsBox");
            const teamInfoBox = document.getElementById("teamInfoBox");
            const opponentSection = document.getElementById("opponentSection");
            const opponentInfoBox = document.getElementById("opponentInfoBox");

            try {
                const [teamsResponse, plansResponse] = await Promise.all([
                    fetch("/api/player-teams"),
                    fetch("/api/player-stream-plans"),
                ]);
                const result = await teamsResponse.json();
                const plansResult = plansResponse.ok ? await plansResponse.json() : { success: false };

                if (!teamsResponse.ok || !result.success) {
                    personalStatsBox.textContent = "個人勝率の取得に失敗しました。";
                    teamInfoBox.textContent = result.message || "所属チーム情報を取得できませんでした。";
                    return;
                }

                const stats = result.personalStats || { totalGames: 0, wins: 0, losses: 0, winRate: null };
                const teams = result.teams || [];
                const opponents = result.opponents || [];

                const plans = (plansResult.success && plansResult.plans) ? plansResult.plans : [];
                const planMap = {};
                plans.forEach((p) => { planMap[p.match_id] = p; });
                const myMirrativId = plansResult.mirrativId || null;
                const defaultMirrativUrl = myMirrativId ? `https://www.mirrativ.com/user/${encodeURIComponent(myMirrativId)}` : "";

                if (stats.totalGames === 0) {
                    personalStatsBox.textContent = "まだ試合結果がありません。";
                } else {
                    personalStatsBox.textContent = `勝率: ${stats.winRate}%（${stats.wins}勝 ${stats.losses}敗 / ${stats.totalGames}戦）`;
                }

                if (teams.length === 0) {
                    teamInfoBox.textContent = "現在、所属チームはありません。";
                } else {
                    teamInfoBox.innerHTML = teams
                        .map((team) => `<div>${team.team_id} - ${team.team_name}</div>`)
                        .join("");
                }

                if (opponents.length === 0) {
                    opponentSection.style.display = "none";
                } else {
                    opponentSection.style.display = "block";
                    opponentInfoBox.innerHTML = opponents
                        .map((item) => {
                            const plan = planMap[item.match_id] || { stream_status: "undecided", mirrativ_url: "" };
                            const st = ["available", "undecided", "unavailable"].includes(plan.stream_status)
                                ? plan.stream_status : "undecided";
                            const safeUrl = plan.mirrativ_url || "";
                            return `
                                <div style="margin-bottom: 8px; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                                    <div><strong>${item.my_team_name || "-"}</strong> vs <strong>${item.opponent_team_name || "-"}</strong> / 第${item.game_number}戦</div>
                                    <div>対戦形式: ${getBattleModeLabel(item.battle_mode)}</div>
                                    <div>対戦日: ${formatDateTime(item.scheduled_at)}</div>
                                    <div style="display: flex; align-items: center; gap: 8px; margin: 4px 0; flex-wrap: wrap;">
                                        <span>配信予定</span>
                                        <select class="inlineStreamStatus" data-match-id="${item.match_id}">
                                            <option value="available" ${st === "available" ? "selected" : ""}>配信する</option>
                                            <option value="undecided" ${st === "undecided" ? "selected" : ""}>未定</option>
                                            <option value="unavailable" ${st === "unavailable" ? "selected" : ""}>配信しない</option>
                                        </select>
                                        <button type="button" class="btn inlineStreamSaveBtn" data-match-id="${item.match_id}">保存</button>
                                    </div>
                                    <div class="inlineStreamUrlRow" data-match-id="${item.match_id}" style="display: ${st === "available" ? "" : "none"}; margin: 4px 0;">
                                        <input type="text" class="inlineStreamUrlInput" data-match-id="${item.match_id}" value="${safeUrl}" placeholder="配信開始後にこちらにURLを入力してください。" style="width: 100%; max-width: 400px; font-size: 0.9em;" />
                                        ${defaultMirrativUrl ? `<div class="inlineStreamDefaultHint" data-match-id="${item.match_id}" style="font-size: 0.85em; color: #555; margin-top: 2px; display: ${safeUrl ? "none" : ""};">※ URL未入力の場合は<a href="${defaultMirrativUrl}" target="_blank" rel="noopener noreferrer">プロフィールのURLへのリンク</a>が使用されます</div>` : ""}
                                    </div>
                                    <div>
                                        相手: 
                                        <a href="#" onclick="event.preventDefault(); copyPlayerId('${item.opponent_player_id}')" style="color: #2563eb; text-decoration: underline; cursor: pointer;" title="クリックしてコピー">${item.opponent_player_id}</a>
                                        - ${item.opponent_player_name || "-"}
                                    </div>
                                </div>
                            `;
                        })
                        .join("");

                    document.querySelectorAll(".inlineStreamStatus").forEach((select) => {
                        const matchId = select.dataset.matchId;
                        const urlRow = opponentInfoBox.querySelector(`.inlineStreamUrlRow[data-match-id="${matchId}"]`);
                        const urlInput = opponentInfoBox.querySelector(`.inlineStreamUrlInput[data-match-id="${matchId}"]`);
                        const hint = opponentInfoBox.querySelector(`.inlineStreamDefaultHint[data-match-id="${matchId}"]`);
                        select.addEventListener("change", () => {
                            const isAvailable = select.value === "available";
                            urlRow.style.display = isAvailable ? "" : "none";
                            if (!isAvailable) urlInput.value = "";
                            if (hint) hint.style.display = (isAvailable && !urlInput.value.trim()) ? "" : "none";
                        });
                        if (urlInput && hint) {
                            urlInput.addEventListener("input", () => {
                                const cleaned = extractMirrativUrl(urlInput.value);
                                if (cleaned !== null) urlInput.value = cleaned;
                                hint.style.display = urlInput.value.trim() ? "none" : "";
                            });
                        }
                    });

                    document.querySelectorAll(".inlineStreamSaveBtn").forEach((btn) => {
                        const matchId = btn.dataset.matchId;
                        const select = opponentInfoBox.querySelector(`.inlineStreamStatus[data-match-id="${matchId}"]`);
                        const urlInput = opponentInfoBox.querySelector(`.inlineStreamUrlInput[data-match-id="${matchId}"]`);
                        btn.addEventListener("click", async () => {
                            btn.disabled = true;
                            try {
                                const saveResponse = await fetch("/api/player-stream-plans", {
                                    method: "PUT",
                                    headers: { "Content-Type": "application/json" },
                                    body: JSON.stringify({
                                        matchId,
                                        streamStatus: select.value,
                                        mirrativUrl: urlInput ? urlInput.value.trim() : "",
                                    }),
                                });
                                const saveResult = await saveResponse.json();
                                if (!saveResponse.ok || !saveResult.success) {
                                    alert(saveResult.message || "配信予定の保存に失敗しました。");
                                    return;
                                }
                                alert("配信予定を保存しました。");
                            } catch (saveError) {
                                console.error("Save stream plan error:", saveError);
                                alert("配信予定の保存に失敗しました。");
                            } finally {
                                btn.disabled = false;
                            }
                        });
                    });
                }
            } catch (error) {
                console.error("Load my teams error:", error);
                personalStatsBox.textContent = "個人勝率の取得に失敗しました。";
                teamInfoBox.textContent = "所属チーム情報の取得に失敗しました。";
                opponentSection.style.display = "none";
            }
        }

        async function checkPlayer() {
            try {
                const response = await fetch("/api/me");
                const result = await response.json();

                const playerMessage = document.getElementById("playerMessage");
                const playerCard = document.getElementById("playerCard");

                if (!result.isLoggedIn) {
                    location.href = "./login.html";
                    return;
                }

                if (result.type !== "player") {
                    playerMessage.textContent = "あなたにはこのページの閲覧権限がありません。";
                    return;
                }

                playerMessage.style.display = "none";
                playerCard.classList.remove("hidden");
                await loadMyTeams();
            } catch (error) {
                console.error("Player page error:", error);
                const playerMessage = document.getElementById("playerMessage");
                playerMessage.textContent = "プレイヤー情報の取得に失敗しました。";
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            checkPlayer();
        });
    </script>
</body>

</html>
