<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
    <title>プレイヤーページ</title>
</head>

<body>
    <div id="headerSlot"></div>

    <main class="container">
        <div class="card">
            <h1>プレイヤーページ</h1>
            <hr>
            <p id="playerMessage">確認中...</p>
            <a href="./index.html" class="btn">トップページへ戻る</a>
        </div>

        <div class="card hidden" id="playerCard">
            <h2>プレイヤーメニュー</h2>
            <hr>

            <h3>これまでの個人勝率</h3>
            <div id="personalStatsBox">読込中...</div>

            <h3>自分の所属チーム情報</h3>
            <div id="teamInfoBox">読込中...</div>

            <div id="opponentSection">
                <h3>確定済み対戦の相手情報</h3>
                <div id="opponentInfoBox">読込中...</div>
            </div>

            <h3>今後追加予定</h3>
            <ul>
                <li>対戦結果の確認</li>
                <li>お知らせ表示</li>
            </ul>
        </div>
    </main>

    <div id="footerSlot"></div>

    <script src="./js/layout.js"></script>
    <script>
        function formatDateTime(datetimeText) {
            if (!datetimeText) {
                return "-";
            }
            const date = new Date(datetimeText);
            if (Number.isNaN(date.getTime())) {
                return datetimeText;
            }
            return date.toLocaleString("ja-JP", { year: "numeric", month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" });
        }

        async function copyPlayerId(playerId) {
            try {
                await navigator.clipboard.writeText(playerId);
                alert(`プレイヤーIDをコピーしました: ${playerId}`);
            } catch (error) {
                console.error("Copy player ID error:", error);
                alert("コピーに失敗しました");
            }
        }

        async function loadMyTeams() {
            const personalStatsBox = document.getElementById("personalStatsBox");
            const teamInfoBox = document.getElementById("teamInfoBox");
            const opponentSection = document.getElementById("opponentSection");
            const opponentInfoBox = document.getElementById("opponentInfoBox");

            try {
                const response = await fetch("/api/player-teams");
                const result = await response.json();

                if (!response.ok || !result.success) {
                    personalStatsBox.textContent = "個人勝率の取得に失敗しました。";
                    teamInfoBox.textContent = result.message || "所属チーム情報を取得できませんでした。";
                    return;
                }

                const stats = result.personalStats || { totalGames: 0, wins: 0, losses: 0, winRate: null };
                const teams = result.teams || [];
                const opponents = result.opponents || [];

                if (stats.totalGames === 0) {
                    personalStatsBox.textContent = "まだ試合結果がありません。";
                } else {
                    personalStatsBox.textContent = `勝率: ${stats.winRate}%（${stats.wins}勝 ${stats.losses}敗 / ${stats.totalGames}戦）`;
                }

                if (teams.length === 0) {
                    teamInfoBox.textContent = "現在、所属チームはありません。";
                } else {
                    teamInfoBox.innerHTML = teams
                        .map((team) => `<div>${team.team_id} - ${team.team_name}</div>`)
                        .join("");
                }

                if (opponents.length === 0) {
                    opponentSection.style.display = "none";
                } else {
                    opponentSection.style.display = "block";
                    opponentInfoBox.innerHTML = opponents
                        .map((item) => `
                            <div style="margin-bottom: 8px; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                                <div><strong>${item.my_team_name || "-"}</strong> vs <strong>${item.opponent_team_name || "-"}</strong> / 第${item.game_number}戦</div>
                                <div>対戦日: ${formatDateTime(item.scheduled_at)}</div>
                                <div>
                                    相手: 
                                    <a href="#" onclick="event.preventDefault(); copyPlayerId('${item.opponent_player_id}')" style="color: #2563eb; text-decoration: underline; cursor: pointer;" title="クリックしてコピー">${item.opponent_player_id}</a>
                                    - ${item.opponent_player_name || "-"}
                                </div>
                            </div>
                        `)
                        .join("");
                }
            } catch (error) {
                console.error("Load my teams error:", error);
                personalStatsBox.textContent = "個人勝率の取得に失敗しました。";
                teamInfoBox.textContent = "所属チーム情報の取得に失敗しました。";
                opponentSection.style.display = "none";
            }
        }

        async function checkPlayer() {
            try {
                const response = await fetch("/api/me");
                const result = await response.json();

                const playerMessage = document.getElementById("playerMessage");
                const playerCard = document.getElementById("playerCard");

                if (!result.isLoggedIn) {
                    location.href = "./login.html";
                    return;
                }

                if (result.type !== "player") {
                    playerMessage.textContent = "あなたにはこのページの閲覧権限がありません。";
                    return;
                }

                playerMessage.style.display = "none";
                playerCard.classList.remove("hidden");
                await loadMyTeams();
            } catch (error) {
                console.error("Player page error:", error);
                const playerMessage = document.getElementById("playerMessage");
                playerMessage.textContent = "プレイヤー情報の取得に失敗しました。";
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            checkPlayer();
        });
    </script>
</body>

</html>
