<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
    <title>新しいチームを作成</title>
</head>

<body>
    <div id="headerSlot"></div>

    <main class="container">
        <div class="card">
            <h1>新しいチームを作成</h1>
            <hr>
            <p id="adminMessage">確認中...</p>
            <a href="./admin.html" class="btn">管理者ページに戻る</a>
        </div>

        <div class="card hidden" id="teamCard">
            <h2>新しいチームを作成</h2>
            <form id="teamForm">
                <div class="form-group">
                    <label for="teamId">チームID（3文字）</label>
                    <input type="text" id="teamId" name="teamId" maxlength="3" required placeholder="例: A01">
                </div>
                <div class="form-group">
                    <label>チーム名（15文字以下）</label>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <input type="text" id="teamName" name="teamName" maxlength="15" required placeholder="例: BLACK"
                            style="margin-bottom: 0;">
                        <button type="button" class="btn" id="pasteTeamNameButton"
                            style="margin: 0; white-space: nowrap;">貼り付け</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>リーダー氏名（10文字以下）</label>
                    <input type="text" id="leaderName" name="leaderName" maxlength="10" required placeholder="例: 山田太郎">
                </div>
                <div class="form-group">
                    <label>リーダーのプレイヤーID（12文字）</label>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <input type="text" id="leaderPlayerId" name="leaderPlayerId" maxlength="12" required
                            placeholder="例: 010100000001" style="margin-bottom: 0;">
                        <button type="button" class="btn" id="pasteLeaderPlayerIdButton"
                            style="margin: 0; white-space: nowrap;">貼り付け</button>
                    </div>
                    <div style="display: flex; gap: 8px; align-items: center; margin-top: 8px;">
                        <input type="text" id="leaderPlayerNameSearch" maxlength="10" placeholder="プレイヤー名で検索"
                            style="margin-bottom: 0;">
                        <button type="button" class="btn" id="searchLeaderPlayerButton"
                            style="margin: 0; white-space: nowrap;">名前で検索</button>
                    </div>
                    <div style="display: flex; gap: 8px; align-items: center; margin-top: 8px;">
                        <select id="leaderPlayerSearchResults"
                            style="flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; display: none;">
                        </select>
                        <button type="button" class="btn" id="applyLeaderPlayerSelectionButton"
                            style="margin: 0; white-space: nowrap; display: none;">IDを反映</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>サブリーダーのプレイヤーID（12文字・任意）</label>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <input type="text" id="subleaderPlayerId" name="subleaderPlayerId" maxlength="12"
                            placeholder="例: 010100000002" style="margin-bottom: 0;">
                        <button type="button" class="btn" id="pasteSubleaderPlayerIdButton"
                            style="margin: 0; white-space: nowrap;">貼り付け</button>
                    </div>
                    <div style="display: flex; gap: 8px; align-items: center; margin-top: 8px;">
                        <input type="text" id="subleaderPlayerNameSearch" maxlength="10" placeholder="プレイヤー名で検索"
                            style="margin-bottom: 0;">
                        <button type="button" class="btn" id="searchSubleaderPlayerButton"
                            style="margin: 0; white-space: nowrap;">名前で検索</button>
                    </div>
                    <div style="display: flex; gap: 8px; align-items: center; margin-top: 8px;">
                        <select id="subleaderPlayerSearchResults"
                            style="flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; display: none;">
                        </select>
                        <button type="button" class="btn" id="applySubleaderPlayerSelectionButton"
                            style="margin: 0; white-space: nowrap; display: none;">IDを反映</button>
                    </div>
                </div>
                <button type="submit" class="btn">チームを作成</button>
                <div id="teamMessage" class="message" style="display: none;"></div>
            </form>
        </div>
    </main>

    <div id="footerSlot"></div>

    <script src="./js/layout.js"></script>
    <script>
        async function checkAdmin() {
            const response = await fetch("/api/me");
            const result = await response.json();

            const adminMessage = document.getElementById("adminMessage");
            const teamCard = document.getElementById("teamCard");

            if (!result.isLoggedIn) {
                location.href = "./admin_login.html";
                return;
            }

            if (result.type !== "admin") {
                adminMessage.textContent = "あなたにはこのページの閲覧権限がありません。";
                return;
            }

            adminMessage.style.display = "none";
            teamCard.classList.remove("hidden");
            setupTeamForm();
        }

        function setupTeamForm() {
            const teamForm = document.getElementById("teamForm");
            const messageDiv = document.getElementById("teamMessage");
            const teamNameInput = document.getElementById("teamName");
            const leaderPlayerIdInput = document.getElementById("leaderPlayerId");
            const subleaderPlayerIdInput = document.getElementById("subleaderPlayerId");
            const leaderPlayerNameSearchInput = document.getElementById("leaderPlayerNameSearch");
            const subleaderPlayerNameSearchInput = document.getElementById("subleaderPlayerNameSearch");
            const leaderPlayerSearchResults = document.getElementById("leaderPlayerSearchResults");
            const subleaderPlayerSearchResults = document.getElementById("subleaderPlayerSearchResults");
            const pasteTeamNameButton = document.getElementById("pasteTeamNameButton");
            const pasteLeaderPlayerIdButton = document.getElementById("pasteLeaderPlayerIdButton");
            const pasteSubleaderPlayerIdButton = document.getElementById("pasteSubleaderPlayerIdButton");
            const searchLeaderPlayerButton = document.getElementById("searchLeaderPlayerButton");
            const searchSubleaderPlayerButton = document.getElementById("searchSubleaderPlayerButton");
            const applyLeaderPlayerSelectionButton = document.getElementById("applyLeaderPlayerSelectionButton");
            const applySubleaderPlayerSelectionButton = document.getElementById("applySubleaderPlayerSelectionButton");

            let cachedPlayers = [];

            async function loadPlayers() {
                if (cachedPlayers.length > 0) {
                    return cachedPlayers;
                }

                const response = await fetch("/api/players");
                const result = await response.json();
                if (!response.ok) {
                    throw new Error(result.message || "プレイヤー一覧の取得に失敗しました");
                }

                cachedPlayers = result.players || [];
                return cachedPlayers;
            }

            function hideSearchResult(selectEl, applyButtonEl) {
                selectEl.style.display = "none";
                applyButtonEl.style.display = "none";
                selectEl.innerHTML = "";
            }

            function renderSearchResult(matches, selectEl, applyButtonEl) {
                selectEl.innerHTML = "";
                matches.forEach((player) => {
                    const option = document.createElement("option");
                    option.value = player.player_id;
                    option.textContent = `${player.player_name} (${player.player_id})`;
                    selectEl.appendChild(option);
                });
                selectEl.style.display = "block";
                applyButtonEl.style.display = "inline-block";
            }

            async function searchPlayerByName(nameInputEl, targetIdInputEl, selectEl, applyButtonEl, roleLabel) {
                try {
                    const keyword = nameInputEl.value.trim();
                    if (!keyword) {
                        messageDiv.textContent = `${roleLabel}の検索名を入力してください`;
                        messageDiv.className = "message error";
                        messageDiv.style.display = "block";
                        hideSearchResult(selectEl, applyButtonEl);
                        return;
                    }

                    const players = await loadPlayers();
                    const lowerKeyword = keyword.toLowerCase();
                    const matches = players.filter((player) =>
                        String(player.player_name || "").toLowerCase().includes(lowerKeyword),
                    );

                    if (matches.length === 0) {
                        messageDiv.textContent = `${roleLabel}の該当プレイヤーが見つかりません`;
                        messageDiv.className = "message error";
                        messageDiv.style.display = "block";
                        hideSearchResult(selectEl, applyButtonEl);
                        return;
                    }

                    if (matches.length === 1) {
                        targetIdInputEl.value = matches[0].player_id;
                        messageDiv.textContent = `${roleLabel}のIDを反映しました: ${matches[0].player_id}`;
                        messageDiv.className = "message success";
                        messageDiv.style.display = "block";
                        hideSearchResult(selectEl, applyButtonEl);
                        return;
                    }

                    renderSearchResult(matches, selectEl, applyButtonEl);
                    messageDiv.textContent = `${roleLabel}候補が${matches.length}件あります。候補を選んでIDを反映してください`;
                    messageDiv.className = "message success";
                    messageDiv.style.display = "block";
                } catch (error) {
                    messageDiv.textContent = error.message || "プレイヤー検索に失敗しました";
                    messageDiv.className = "message error";
                    messageDiv.style.display = "block";
                    hideSearchResult(selectEl, applyButtonEl);
                }
            }

            function applySelectedPlayerId(selectEl, targetIdInputEl, roleLabel) {
                if (!selectEl.value) {
                    messageDiv.textContent = `${roleLabel}候補を選択してください`;
                    messageDiv.className = "message error";
                    messageDiv.style.display = "block";
                    return;
                }

                targetIdInputEl.value = selectEl.value;
                messageDiv.textContent = `${roleLabel}のIDを反映しました: ${selectEl.value}`;
                messageDiv.className = "message success";
                messageDiv.style.display = "block";
            }

            searchLeaderPlayerButton.addEventListener("click", async () => {
                await searchPlayerByName(
                    leaderPlayerNameSearchInput,
                    leaderPlayerIdInput,
                    leaderPlayerSearchResults,
                    applyLeaderPlayerSelectionButton,
                    "リーダー",
                );
            });

            searchSubleaderPlayerButton.addEventListener("click", async () => {
                await searchPlayerByName(
                    subleaderPlayerNameSearchInput,
                    subleaderPlayerIdInput,
                    subleaderPlayerSearchResults,
                    applySubleaderPlayerSelectionButton,
                    "サブリーダー",
                );
            });

            applyLeaderPlayerSelectionButton.addEventListener("click", () => {
                applySelectedPlayerId(leaderPlayerSearchResults, leaderPlayerIdInput, "リーダー");
            });

            applySubleaderPlayerSelectionButton.addEventListener("click", () => {
                applySelectedPlayerId(subleaderPlayerSearchResults, subleaderPlayerIdInput, "サブリーダー");
            });

            // チーム名の貼り付け処理
            pasteTeamNameButton.addEventListener("click", async () => {
                try {
                    const clipboardText = await navigator.clipboard.readText();
                    teamNameInput.value = clipboardText.trim();
                    messageDiv.style.display = "none";
                } catch (error) {
                    messageDiv.textContent = "クリップボードの貼り付けに失敗しました";
                    messageDiv.className = "message error";
                    messageDiv.style.display = "block";
                }
            });

            // リーダーのプレイヤーIDの貼り付け処理
            pasteLeaderPlayerIdButton.addEventListener("click", async () => {
                try {
                    const clipboardText = await navigator.clipboard.readText();
                    leaderPlayerIdInput.value = clipboardText.trim();
                    messageDiv.style.display = "none";
                } catch (error) {
                    messageDiv.textContent = "クリップボードの貼り付けに失敗しました";
                    messageDiv.className = "message error";
                    messageDiv.style.display = "block";
                }
            });

            // サブリーダーのプレイヤーIDの貼り付け処理
            pasteSubleaderPlayerIdButton.addEventListener("click", async () => {
                try {
                    const clipboardText = await navigator.clipboard.readText();
                    subleaderPlayerIdInput.value = clipboardText.trim();
                    messageDiv.style.display = "none";
                } catch (error) {
                    messageDiv.textContent = "クリップボードの貼り付けに失敗しました";
                    messageDiv.className = "message error";
                    messageDiv.style.display = "block";
                }
            });

            teamForm.addEventListener("submit", async (e) => {
                e.preventDefault();
                const teamId = document.getElementById("teamId").value.trim();
                const teamName = document.getElementById("teamName").value.trim();
                const leaderName = document.getElementById("leaderName").value.trim();
                const leaderPlayerId = document.getElementById("leaderPlayerId").value.trim();
                const subleaderPlayerId = document.getElementById("subleaderPlayerId").value.trim();

                // リーダーのプレイヤーIDの厳密な12文字チェック
                if (leaderPlayerId.length !== 12) {
                    messageDiv.textContent = "リーダーのプレイヤーIDは12文字ちょうどで入力してください";
                    messageDiv.className = "message error";
                    messageDiv.style.display = "block";
                    return;
                }

                // サブリーダーのプレイヤーIDの厳密な12文字チェック
                if (subleaderPlayerId && subleaderPlayerId.length !== 12) {
                    messageDiv.textContent = "サブリーダーのプレイヤーIDは12文字ちょうどで入力してください";
                    messageDiv.className = "message error";
                    messageDiv.style.display = "block";
                    return;
                }

                try {
                    const response = await fetch("/api/teams", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            teamId,
                            teamName,
                            leaderName,
                            leaderPlayerId,
                            subleaderPlayerId,
                        }),
                    });
                    const result = await response.json();

                    if (response.ok) {
                        messageDiv.textContent = "チームを作成しました！";
                        messageDiv.className = "message success";
                        teamForm.reset();
                    } else {
                        messageDiv.textContent = result.message || "エラーが発生しました";
                        messageDiv.className = "message error";
                    }
                    messageDiv.style.display = "block";
                } catch (error) {
                    messageDiv.textContent = "通信エラーが発生しました";
                    messageDiv.className = "message error";
                    messageDiv.style.display = "block";
                }
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            checkAdmin();
        });
    </script>
</body>

</html>
