<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="icon" href="./images/Logo.jpg" type="image/jpeg">
    <link rel="apple-touch-icon" sizes="180x180" href="./images/Logo.jpg">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#2563eb">
    <title>新しいプレイヤーを作成</title>
</head>

<body>
    <div id="headerSlot"></div>

    <main class="container">
        <div class="card">
            <h1>新しいプレイヤーを作成</h1>
            <hr>
            <p id="adminMessage">確認中...</p>
            <a href="./admin.html" class="btn">管理者ページに戻る</a>
        </div>

        <div class="card hidden" id="playerCard">
            <h2>新しいプレイヤーを作成</h2>
            <form id="playerForm">
                <div class="form-group">
                    <label for="playerId">プレイヤーID（12文字）</label>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <input type="text" id="playerId" name="playerId" maxlength="12" minlength="12" required
                            placeholder="例: 010100000001" style="margin-bottom: 0;">
                        <button type="button" class="btn" id="pastePlayerIdButton"
                            style="margin: 0; white-space: nowrap;">貼り付け</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="playerName">プレイヤー名（10文字以下）</label>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <input type="text" id="playerName" name="playerName" maxlength="10" required placeholder="例: 太郎"
                            style="margin-bottom: 0;">
                        <button type="button" class="btn" id="pastePlayerNameButton"
                            style="margin: 0; white-space: nowrap;">貼り付け</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="mirrativUrl">ミラティブURL（任意）</label>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <input type="text" id="mirrativUrl" name="mirrativUrl" placeholder="ミラティブURL"
                            style="margin-bottom: 0;">
                        <button type="button" class="btn" id="pasteMirrativUrlButton"
                            style="margin: 0; white-space: nowrap;">貼り付け</button>
                    </div>
                </div>
                <button type="submit" class="btn">プレイヤーを作成</button>
                <div id="playerMessage" class="message" style="display: none;"></div>
            </form>
        </div>
    </main>

    <div id="footerSlot"></div>

    <script src="./js/layout.js"></script>
    <script>
        async function checkAdmin() {
            const response = await fetch("/api/me");
            const result = await response.json();

            const adminMessage = document.getElementById("adminMessage");
            const playerCard = document.getElementById("playerCard");

            if (!result.isLoggedIn) {
                location.href = "./admin_login.html";
                return;
            }

            if (result.type !== "admin") {
                adminMessage.textContent = "あなたにはこのページの閲覧権限がありません。";
                return;
            }

            adminMessage.style.display = "none";
            playerCard.classList.remove("hidden");
            setupPlayerForm();
        }

        function setupPlayerForm() {
            const playerForm = document.getElementById("playerForm");
            if (playerForm.dataset.initialized === "true") {
                return;
            }
            playerForm.dataset.initialized = "true";

            const messageDiv = document.getElementById("playerMessage");
            const playerIdInput = document.getElementById("playerId");
            const playerNameInput = document.getElementById("playerName");
            const mirrativUrlInput = document.getElementById("mirrativUrl");
            const pastePlayerIdButton = document.getElementById("pastePlayerIdButton");
            const pastePlayerNameButton = document.getElementById("pastePlayerNameButton");
            const pasteMirrativUrlButton = document.getElementById("pasteMirrativUrlButton");

            pastePlayerIdButton.addEventListener("click", async () => {
                try {
                    const clipboardText = await navigator.clipboard.readText();
                    playerIdInput.value = clipboardText.trim();
                    messageDiv.style.display = "none";
                } catch (error) {
                    messageDiv.textContent = "クリップボードの貼り付けに失敗しました";
                    messageDiv.className = "message error";
                    messageDiv.style.display = "block";
                }
            });

            pastePlayerNameButton.addEventListener("click", async () => {
                try {
                    const clipboardText = await navigator.clipboard.readText();
                    playerNameInput.value = clipboardText.trim();
                    messageDiv.style.display = "none";
                } catch (error) {
                    messageDiv.textContent = "クリップボードの貼り付けに失敗しました";
                    messageDiv.className = "message error";
                    messageDiv.style.display = "block";
                }
            });

            pasteMirrativUrlButton.addEventListener("click", async () => {
                try {
                    const clipboardText = await navigator.clipboard.readText();
                    mirrativUrlInput.value = clipboardText.trim();
                    messageDiv.style.display = "none";
                } catch (error) {
                    messageDiv.textContent = "クリップボードの貼り付けに失敗しました";
                    messageDiv.className = "message error";
                    messageDiv.style.display = "block";
                }
            });

            playerForm.addEventListener("submit", async (e) => {
                e.preventDefault();
                const playerId = document.getElementById("playerId").value.trim();
                const playerName = document.getElementById("playerName").value.trim();
                const mirrativUrl = document.getElementById("mirrativUrl").value.trim();

                if (playerId.length !== 12) {
                    messageDiv.textContent = "プレイヤーIDは12文字ちょうどで入力してください";
                    messageDiv.className = "message error";
                    messageDiv.style.display = "block";
                    return;
                }

                try {
                    const body = { playerId, playerName };
                    if (mirrativUrl) {
                        body.mirrativUrl = mirrativUrl;
                    }

                    const response = await fetch("/api/players", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(body),
                    });
                    const result = await response.json();

                    // 成功判定を success: true で行う
                    if (result.success) {
                        messageDiv.textContent = "プレイヤーを作成しました！";
                        messageDiv.className = "message success";
                        playerForm.reset();
                    } else {
                        messageDiv.textContent = result.message || "エラーが発生しました";
                        messageDiv.className = "message error";
                    }
                    messageDiv.style.display = "block";
                } catch (error) {
                    messageDiv.textContent = "通信エラーが発生しました";
                    messageDiv.className = "message error";
                    messageDiv.style.display = "block";
                }
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            checkAdmin();
        });
    </script>
</body>

</html>
