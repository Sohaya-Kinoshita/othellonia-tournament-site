<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
    <title>プレイヤー管理</title>
</head>

<body>
    <div id="headerSlot"></div>

    <main class="container">
        <div class="card">
            <h1>プレイヤー管理</h1>
            <hr>
            <p id="adminMessage">確認中...</p>
            <a href="./admin.html" class="btn">管理者ページに戻る</a>
        </div>

        <div class="card hidden" id="playerViewCard">
            <h2>プレイヤー一覧を表示</h2>
            <hr>
            <p>現在登録されているすべてのプレイヤーを確認できます。</p>
            <a href="./player_list.html" class="btn">プレイヤー一覧を表示</a>
        </div>

        <div class="card hidden" id="playerCard">
            <h2>新しい参加者を作成</h2>
            <form id="playerForm">
                <div class="form-group">
                    <label for="playerId">参加者ID（12文字）</label>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <input type="text" id="playerId" name="playerId" maxlength="12" minlength="12" required
                            placeholder="例: 010100000001" style="margin-bottom: 0;">
                        <button type="button" class="btn" id="pastePlayerIdButton"
                            style="margin: 0; white-space: nowrap;">貼り付け</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="playerName">参加者名（10文字以下）</label>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <input type="text" id="playerName" name="playerName" maxlength="10" required placeholder="例: 太郎"
                            style="margin-bottom: 0;">
                        <button type="button" class="btn" id="pastePlayerNameButton"
                            style="margin: 0; white-space: nowrap;">貼り付け</button>
                    </div>
                </div>
                <button type="submit" class="btn">参加者を作成</button>
                <div id="playerMessage" class="message" style="display: none;"></div>
            </form>
        </div>
    </main>

    <div id="footerSlot"></div>

    <script src="./js/layout.js"></script>
    <script>
        async function checkAdmin() {
            const response = await fetch("/api/me");
            const result = await response.json();

            const adminMessage = document.getElementById("adminMessage");
            const playerCard = document.getElementById("playerCard");
            const playerViewCard = document.getElementById("playerViewCard");

            if (!result.isLoggedIn) {
                location.href = "./admin_login.html";
                return;
            }

            if (result.type !== "admin") {
                adminMessage.textContent = "あなたにはこのページの閲覧権限がありません。";
                return;
            }

            adminMessage.textContent = "管理者としてログインしています。";
            playerCard.classList.remove("hidden");
            playerViewCard.classList.remove("hidden");
            setupPlayerForm();
        }

        function setupPlayerForm() {
            const playerForm = document.getElementById("playerForm");
            const messageDiv = document.getElementById("playerMessage");
            const playerIdInput = document.getElementById("playerId");
            const playerNameInput = document.getElementById("playerName");
            const pastePlayerIdButton = document.getElementById("pastePlayerIdButton");
            const pastePlayerNameButton = document.getElementById("pastePlayerNameButton");

            pastePlayerIdButton.addEventListener("click", async () => {
                try {
                    const clipboardText = await navigator.clipboard.readText();
                    playerIdInput.value = clipboardText.trim();
                    messageDiv.style.display = "none";
                } catch (error) {
                    messageDiv.textContent = "クリップボードの貼り付けに失敗しました";
                    messageDiv.className = "message error";
                    messageDiv.style.display = "block";
                }
            });

            pastePlayerNameButton.addEventListener("click", async () => {
                try {
                    const clipboardText = await navigator.clipboard.readText();
                    playerNameInput.value = clipboardText.trim();
                    messageDiv.style.display = "none";
                } catch (error) {
                    messageDiv.textContent = "クリップボードの貼り付けに失敗しました";
                    messageDiv.className = "message error";
                    messageDiv.style.display = "block";
                }
            });

            playerForm.addEventListener("submit", async (e) => {
                e.preventDefault();
                const playerId = document.getElementById("playerId").value.trim();
                const playerName = document.getElementById("playerName").value.trim();

                if (playerId.length !== 12) {
                    messageDiv.textContent = "参加者IDは12文字ちょうどで入力してください";
                    messageDiv.className = "message error";
                    messageDiv.style.display = "block";
                    return;
                }

                try {
                    const response = await fetch("/api/players", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ playerId, playerName }),
                    });
                    const result = await response.json();

                    if (response.ok) {
                        messageDiv.textContent = "参加者を作成しました！";
                        messageDiv.className = "message success";
                        playerForm.reset();
                    } else {
                        messageDiv.textContent = result.message || "エラーが発生しました";
                        messageDiv.className = "message error";
                    }
                    messageDiv.style.display = "block";
                } catch (error) {
                    messageDiv.textContent = "通信エラーが発生しました";
                    messageDiv.className = "message error";
                    messageDiv.style.display = "block";
                }
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            checkAdmin();
        });
    </script>
</body>

</html>
