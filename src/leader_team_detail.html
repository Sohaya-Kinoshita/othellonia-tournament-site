<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
    <title>チーム詳細</title>
</head>

<body>
    <div id="headerSlot"></div>

    <main class="container">
        <div class="card">
            <h1>チーム詳細</h1>
            <hr>
            <p id="statusMessage">確認中...</p>
            <a href="./leader.html" class="btn">リーダーページに戻る</a>
        </div>

        <div class="card hidden" id="teamDetailCard">
            <h2 id="teamName"></h2>
            <hr>
            <div id="teamInfo" style="margin-bottom: 16px;"></div>

            <div
                style="display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px;">
                <h3 style="margin: 0;">メンバー一覧</h3>
                <button type="button" id="toggleMembersButton" class="btn" style="margin: 0;">▽ メンバー一覧を開く</button>
            </div>
            <div id="membersSection" style="display: none; overflow-x: auto; margin-bottom: 16px;">
                <table id="memberTable">
                    <thead>
                        <tr>
                            <th>プレイヤーID</th>
                            <th>プレイヤー名</th>
                        </tr>
                    </thead>
                    <tbody id="memberTableBody">
                    </tbody>
                </table>
            </div>

            <h3>進行中のマッチ</h3>
            <div id="ongoingMatchesList"></div>

            <div
                style="display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 20px; margin-bottom: 8px;">
                <h3 style="margin: 0;">試合終了したマッチ</h3>
                <button type="button" id="toggleFinishedMatchesButton" class="btn" style="margin: 0;">▽
                    試合終了したマッチを開く</button>
            </div>
            <div id="finishedMatchesSection" style="display: none;">
                <div id="finishedMatchesList"></div>
            </div>
        </div>
    </main>

    <div id="footerSlot"></div>

    <script src="./js/layout.js"></script>
    <script>
        function formatDateTime(datetimeText) {
            if (!datetimeText) {
                return "-";
            }
            const date = new Date(datetimeText);
            if (Number.isNaN(date.getTime())) {
                return datetimeText;
            }
            return date.toLocaleString("ja-JP", { year: "numeric", month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" });
        }

        function getBattleModeLabel(gameNumber) {
            return gameNumber <= 3 ? "シーズン" : "グローリー";
        }

        function setupMembersToggle() {
            const toggleButton = document.getElementById("toggleMembersButton");
            const membersSection = document.getElementById("membersSection");
            if (!toggleButton || !membersSection) {
                return;
            }

            let isOpen = false;

            const render = () => {
                membersSection.style.display = isOpen ? "block" : "none";
                toggleButton.textContent = isOpen
                    ? "△ メンバー一覧を閉じる"
                    : "▽ メンバー一覧を開く";
            };

            toggleButton.addEventListener("click", () => {
                isOpen = !isOpen;
                render();
            });

            render();
        }

        function setupFinishedMatchesToggle() {
            const toggleButton = document.getElementById("toggleFinishedMatchesButton");
            const section = document.getElementById("finishedMatchesSection");
            if (!toggleButton || !section) {
                return;
            }

            let isOpen = false;

            const render = () => {
                section.style.display = isOpen ? "block" : "none";
                toggleButton.textContent = isOpen
                    ? "△ 試合終了したマッチを閉じる"
                    : "▽ 試合終了したマッチを開く";
            };

            toggleButton.addEventListener("click", () => {
                isOpen = !isOpen;
                render();
            });

            render();
        }

        function createOrderSelect(matchId, index, members, selectedPlayerId) {
            const select = document.createElement("select");
            select.id = `order_${matchId}_${index}`;
            select.style.padding = "8px";
            select.style.border = "1px solid #ddd";
            select.style.borderRadius = "4px";
            select.style.width = "100%";

            const defaultOption = document.createElement("option");
            defaultOption.value = "";
            const gameNumber = index + 1;
            defaultOption.textContent = `第${gameNumber}戦（${getBattleModeLabel(gameNumber)}）の選手を選択`;
            select.appendChild(defaultOption);

            members.forEach((member) => {
                const option = document.createElement("option");
                option.value = member.player_id;
                option.textContent = `${member.player_name} (${member.player_id})`;
                if (selectedPlayerId === member.player_id) {
                    option.selected = true;
                }
                select.appendChild(option);
            });

            return select;
        }

        function createReserveSelect(matchId, reserveIndex, members, selectedPlayerId) {
            const select = document.createElement("select");
            select.id = `reserve_${matchId}_${reserveIndex}`;
            select.style.padding = "8px";
            select.style.border = "1px solid #ddd";
            select.style.borderRadius = "4px";
            select.style.width = "100%";

            const defaultOption = document.createElement("option");
            defaultOption.value = "";
            defaultOption.textContent = `リザーブ${reserveIndex + 1}を選択`;
            select.appendChild(defaultOption);

            members.forEach((member) => {
                const option = document.createElement("option");
                option.value = member.player_id;
                option.textContent = `${member.player_name} (${member.player_id})`;
                if (selectedPlayerId === member.player_id) {
                    option.selected = true;
                }
                select.appendChild(option);
            });

            return select;
        }

        async function loadMatchOrder(matchId, teamId, members, match) {
            const orderStatus = document.getElementById(`orderStatus_${matchId}`);
            const orderList = document.getElementById(`orderList_${matchId}`);
            const reserveLabel = document.getElementById(`reserveLabel_${matchId}`);
            const reserveList = document.getElementById(`reserveList_${matchId}`);
            const submitButton = document.getElementById(`submitOrderBtn_${matchId}`);
            const matchCardSection = document.getElementById(`matchCardSection_${matchId}`);
            const matchCardDiv = document.getElementById(`matchCard_${matchId}`);

            orderStatus.textContent = "オーダー読込中...";

            try {
                const response = await fetch(`/api/order?matchId=${encodeURIComponent(matchId)}&teamId=${encodeURIComponent(teamId)}`);
                const result = await response.json();

                if (!response.ok) {
                    orderStatus.textContent = result.message || "オーダー取得に失敗しました";
                    orderStatus.style.color = "#c62828";
                    return;
                }

                const currentOrder = result.playerOrder || [];
                const currentReserves = result.reservePlayers || [];
                const hasSubmitted = currentOrder.length > 0;
                const isConfirmed = result.confirmedAt !== null && result.confirmedAt !== undefined;

                if (hasSubmitted) {
                    if (isConfirmed) {
                        orderStatus.textContent = `確定済み（${formatDateTime(result.confirmedAt)}）`;
                        orderStatus.style.color = "#1b5e20";
                        submitButton.style.display = "none";
                        orderList.style.display = "none";
                        if (reserveLabel) reserveLabel.style.display = "none";
                        reserveList.style.display = "none";

                        // 対戦カードを読み込み・表示
                        try {
                            const cardResponse = await fetch(`/api/match-card?matchId=${encodeURIComponent(matchId)}`);
                            const cardData = await cardResponse.json();

                            if (cardResponse.ok && cardData.games && cardData.games.length > 0) {
                                matchCardSection.style.display = "block";
                                matchCardDiv.innerHTML = generateMatchCardHTML(cardData);
                            }
                        } catch (cardError) {
                            console.error("Match card load error:", cardError);
                        }
                    } else {
                        orderStatus.textContent = `提出済み（${formatDateTime(result.submittedAt)}）`;
                        orderStatus.style.color = "#2e7d32";
                        submitButton.style.display = "block";
                        orderList.style.display = "grid";
                        reserveList.style.display = "grid";
                        matchCardSection.style.display = "none";
                    }
                } else {
                    orderStatus.textContent = "未提出";
                    orderStatus.style.color = "#f57f17";
                    submitButton.style.display = "block";
                    orderList.style.display = "grid";
                    reserveList.style.display = "grid";
                    matchCardSection.style.display = "none";
                }

                orderList.innerHTML = "";
                for (let index = 0; index < 5; index += 1) {
                    orderList.appendChild(
                        createOrderSelect(matchId, index, members, currentOrder[index] || ""),
                    );
                }

                reserveList.innerHTML = "";
                for (let index = 0; index < 2; index += 1) {
                    reserveList.appendChild(
                        createReserveSelect(matchId, index, members, currentReserves[index] || ""),
                    );
                }

                // 確定済みなら選択を無効化
                if (isConfirmed) {
                    const selects = orderList.querySelectorAll("select");
                    selects.forEach((select) => {
                        select.disabled = true;
                    });
                    const reserveSelects = reserveList.querySelectorAll("select");
                    reserveSelects.forEach((select) => {
                        select.disabled = true;
                    });
                }
            } catch (error) {
                console.error("Order load error:", error);
                orderStatus.textContent = "オーダー取得に失敗しました";
                orderStatus.style.color = "#c62828";
            }
        }

        function generateMatchCardHTML(cardData) {
            const { match, games, reservesByTeam } = cardData;
            if (!games || games.length === 0) {
                return "<p style=\"color: #999;\">対戦情報がありません</p>";
            }

            const teamAReserves = (reservesByTeam && reservesByTeam[match.team_a_id]) || [];
            const teamBReserves = (reservesByTeam && reservesByTeam[match.team_b_id]) || [];
            const teamAWins = games.filter((game) => game.winner_team_id === match.team_a_id).length;
            const teamBWins = games.filter((game) => game.winner_team_id === match.team_b_id).length;

            const renderReserves = (reserves) => {
                if (!reserves || reserves.length === 0) {
                    return '<div style="font-size: 0.9em; color: #999;">リザーブ: なし</div>';
                }

                return reserves.map((reserve) => {
                    const playerLabel = reserve.player_name || reserve.player_id;
                    return `<div style="display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 0.9em;">`
                        + `<div><strong>リザーブ${reserve.reserve_number}</strong></div>`
                        + `<div style="text-align: right;">${playerLabel}</div>`
                        + `</div>`;
                }).join("");
            };

            let html = '<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">';

            // Team A
            html += '<div style="border: 1px solid #ddd; border-radius: 4px; padding: 12px; background: #fff;">';
            html += `<div style="font-weight: bold; margin-bottom: 12px; text-align: center;">${match.team_a_name}</div>`;
            html += `<div style="margin-bottom: 8px; text-align: center; font-size: 0.9em; color: #2e7d32; font-weight: bold;">勝ち数: ${teamAWins}</div>`;
            games.forEach((game) => {
                const teamAResult = game.winner_team_id === match.team_a_id
                    ? "勝ち"
                    : game.winner_team_id === match.team_b_id
                        ? "負け"
                        : "勝敗未確定";
                html += '<div style="display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 0.9em;">';
                html += `<div style="flex-grow: 1;"><strong>第${game.game_number}戦（${getBattleModeLabel(game.game_number)}）</strong></div>`;
                html += `<div style="text-align: right;">${game.player_a_name || game.player_a_id}　${teamAResult}</div>`;
                html += '</div>';
            });
            html += '<div style="border-top: 1px solid #eee; margin-top: 8px; padding-top: 8px;">';
            html += '<div style="font-weight: bold; margin-bottom: 6px;">リザーブ</div>';
            html += renderReserves(teamAReserves);
            html += '</div>';
            html += '</div>';

            // Team B
            html += '<div style="border: 1px solid #ddd; border-radius: 4px; padding: 12px; background: #fff;">';
            html += `<div style="font-weight: bold; margin-bottom: 12px; text-align: center;">${match.team_b_name}</div>`;
            html += `<div style="margin-bottom: 8px; text-align: center; font-size: 0.9em; color: #2e7d32; font-weight: bold;">勝ち数: ${teamBWins}</div>`;
            games.forEach((game) => {
                const teamBResult = game.winner_team_id === match.team_b_id
                    ? "勝ち"
                    : game.winner_team_id === match.team_a_id
                        ? "負け"
                        : "勝敗未確定";
                html += '<div style="display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 0.9em;">';
                html += `<div style="flex-grow: 1;"><strong>第${game.game_number}戦（${getBattleModeLabel(game.game_number)}）</strong></div>`;
                html += `<div style="text-align: right;">${game.player_b_name || game.player_b_id}　${teamBResult}</div>`;
                html += '</div>';
            });
            html += '<div style="border-top: 1px solid #eee; margin-top: 8px; padding-top: 8px;">';
            html += '<div style="font-weight: bold; margin-bottom: 6px;">リザーブ</div>';
            html += renderReserves(teamBReserves);
            html += '</div>';
            html += '</div>';

            html += '</div>';
            return html;
        }

        async function submitOrder(matchId, teamId, members) {
            const selects = [];
            for (let index = 0; index < 5; index += 1) {
                selects.push(document.getElementById(`order_${matchId}_${index}`));
            }
            const reserveSelects = [];
            for (let index = 0; index < 2; index += 1) {
                reserveSelects.push(document.getElementById(`reserve_${matchId}_${index}`));
            }

            const playerOrder = selects.map((select) => select?.value || "");
            const reservePlayers = reserveSelects.map((select) => select?.value || "");
            const selectedReservePlayers = reservePlayers.filter((playerId) => playerId);

            if (playerOrder.some((playerId) => !playerId)) {
                alert("5戦分すべての選手を選択してください。");
                return;
            }

            const uniqueCount = new Set(playerOrder).size;
            if (uniqueCount !== playerOrder.length) {
                alert("同じ選手は重複して選択できません。");
                return;
            }

            if (selectedReservePlayers.length > 2) {
                alert("リザーブは最大2名まで指定できます。");
                return;
            }

            const uniqueReserveCount = new Set(selectedReservePlayers).size;
            if (uniqueReserveCount !== selectedReservePlayers.length) {
                alert("リザーブに同じ選手は指定できません。");
                return;
            }

            if (selectedReservePlayers.some((playerId) => playerOrder.includes(playerId))) {
                alert("リザーブにオーダー選手は指定できません。");
                return;
            }

            try {
                const response = await fetch("/api/order", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        matchId,
                        teamId,
                        playerOrder,
                        reservePlayers: selectedReservePlayers,
                    }),
                });

                const result = await response.json();

                if (!response.ok) {
                    alert(result.message || "オーダー提出に失敗しました。");
                    return;
                }

                alert("オーダーを提出しました。");
                await loadMatchOrder(matchId, teamId, members);
            } catch (error) {
                console.error("Order submit error:", error);
                alert("オーダー提出に失敗しました。");
            }
        }

        async function loadTeamDetail() {
            const statusMessage = document.getElementById("statusMessage");
            const teamDetailCard = document.getElementById("teamDetailCard");
            const teamNameDiv = document.getElementById("teamName");
            const teamInfoDiv = document.getElementById("teamInfo");
            const memberTableBody = document.getElementById("memberTableBody");
            const ongoingMatchesList = document.getElementById("ongoingMatchesList");
            const finishedMatchesList = document.getElementById("finishedMatchesList");

            memberTableBody.innerHTML = "";
            ongoingMatchesList.innerHTML = "";
            finishedMatchesList.innerHTML = "";

            // 認証確認
            const meResponse = await fetch("/api/me");
            const meResult = await meResponse.json();

            if (!meResult.isLoggedIn || meResult.type !== "leader") {
                location.href = "./login.html";
                return;
            }

            // URLからteamIdを取得
            const urlParams = new URLSearchParams(window.location.search);
            const teamId = urlParams.get("teamId");

            if (!teamId) {
                statusMessage.textContent = "チームIDが指定されていません。";
                return;
            }

            try {
                const response = await fetch(`/api/team-detail?teamId=${teamId}`);

                if (!response.ok) {
                    statusMessage.textContent =
                        response.status === 403
                            ? "このチームのリーダーではありません。"
                            : "チーム情報の取得に失敗しました。";
                    return;
                }

                const result = await response.json();
                const team = result.team;
                const members = result.members || [];
                const matches = result.matches || [];

                // チーム情報を表示
                statusMessage.style.display = "none";
                teamNameDiv.textContent = `${team.team_id} - ${team.team_name}`;
                teamInfoDiv.innerHTML = `
                    <div style="background: #f5f5f5; padding: 12px; border-radius: 4px; font-size: 0.9em;">
                        <div><strong>チームID:</strong> ${team.team_id}</div>
                        <div><strong>チーム名:</strong> ${team.team_name}</div>
                        <div><strong>メンバー数:</strong> ${members.length} 人</div>
                    </div>
                `;

                // メンバー一覧を表示
                if (members.length === 0) {
                    memberTableBody.innerHTML = `
                        <tr>
                            <td colspan="2" style="padding: 12px; text-align: center; color: #999;">
                                メンバーがありません
                            </td>
                        </tr>
                    `;
                } else {
                    members.forEach((member, index) => {
                        const row = document.createElement("tr");
                        row.style.borderBottom = "1px solid #ddd";
                        row.innerHTML = `
                            <td style="padding: 8px;">${member.player_id}</td>
                            <td style="padding: 8px;">${member.player_name}</td>
                        `;
                        memberTableBody.appendChild(row);
                    });
                }

                // マッチ一覧を表示（進行中 / 試合終了で分割）
                const ongoingMatches = matches.filter((match) => match.winner_team_id === null);
                const finishedMatches = matches.filter((match) => match.winner_team_id !== null);

                if (ongoingMatches.length === 0) {
                    ongoingMatchesList.innerHTML = `<p style="color: #999;">進行中のマッチはありません</p>`;
                }

                if (finishedMatches.length === 0) {
                    finishedMatchesList.innerHTML = `<p style="color: #999;">試合終了したマッチはありません</p>`;
                }

                const renderMatchCard = (match, targetList, isFinished = false) => {
                    const isTeamA = match.team_a_id === teamId;
                    const opponentName = isTeamA
                        ? match.team_b_name
                        : match.team_a_name;
                    const opponentId = isTeamA
                        ? match.team_b_id
                        : match.team_a_id;
                    const status =
                        match.winner_team_id === teamId
                            ? "勝利"
                            : match.winner_team_id === null
                                ? "進行中"
                                : "敗北";

                    const matchElement = document.createElement("div");
                    matchElement.style.marginBottom = "12px";

                    if (isFinished) {
                        const cardId = `finishedCard_${match.match_id}`;
                        matchElement.innerHTML = `
                            <div style="border: 1px solid #ddd; padding: 12px; border-radius: 4px;">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                                    <div>
                                        <strong>${match.match_id}</strong>
                                        <span style="margin-left: 8px; font-size: 0.9em;">
                                            ${team.team_name} vs ${opponentName} (${opponentId})
                                        </span>
                                    </div>
                                    <span style="
                                        padding: 4px 8px;
                                        border-radius: 4px;
                                        font-size: 0.85em;
                                        font-weight: bold;
                                        background-color: ${status === "勝利" ? "#c8e6c9" : "#ffcccc"};
                                        color: ${status === "勝利" ? "#2e7d32" : "#c62828"};
                                    ">
                                        ${status}
                                    </span>
                                </div>
                                <div style="font-size: 0.9em; color: #666; margin-bottom: 4px;">Best of ${match.best_of}</div>
                                <div style="font-size: 0.9em; color: #666; margin-bottom: 4px;">対戦日: ${formatDateTime(match.scheduled_at)}</div>
                                <div style="font-size: 0.9em; color: #666; margin-bottom: 8px;">提出期限: ${formatDateTime(match.order_deadline)}</div>
                                <button type="button" id="toggleBtn_${match.match_id}" class="btn" style="font-size: 0.85em; padding: 4px 10px;">▽ 対戦カードを見る</button>
                                <div id="${cardId}" style="display: none; border-top: 1px solid #eee; padding-top: 12px; margin-top: 12px;">
                                    <div id="matchCard_${match.match_id}" style="background: #f9f9f9; border-radius: 4px; padding: 12px;">読込中...</div>
                                </div>
                            </div>
                        `;
                        targetList.appendChild(matchElement);

                        const toggleBtn = document.getElementById(`toggleBtn_${match.match_id}`);
                        const cardSection = document.getElementById(cardId);
                        const matchCardDiv = document.getElementById(`matchCard_${match.match_id}`);
                        let isCardOpen = false;
                        let isLoaded = false;

                        toggleBtn.addEventListener("click", async () => {
                            isCardOpen = !isCardOpen;
                            cardSection.style.display = isCardOpen ? "block" : "none";
                            toggleBtn.textContent = isCardOpen ? "△ 対戦カードを閉じる" : "▽ 対戦カードを見る";

                            if (isCardOpen && !isLoaded) {
                                isLoaded = true;
                                try {
                                    const cardResponse = await fetch(`/api/match-card?matchId=${encodeURIComponent(match.match_id)}`);
                                    const cardData = await cardResponse.json();
                                    if (cardResponse.ok && cardData.games && cardData.games.length > 0) {
                                        matchCardDiv.innerHTML = generateMatchCardHTML(cardData);
                                    } else {
                                        matchCardDiv.textContent = "対戦カードがありません";
                                    }
                                } catch (e) {
                                    matchCardDiv.textContent = "対戦カードの取得に失敗しました";
                                }
                            }
                        });

                        return;
                    }

                    matchElement.innerHTML = `
                            <div style="border: 1px solid #ddd; padding: 12px; border-radius: 4px;">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                                    <div>
                                        <strong>${match.match_id}</strong>
                                        <span style="margin-left: 8px; font-size: 0.9em;">
                                            ${team.team_name} vs ${opponentName} (${opponentId})
                                        </span>
                                    </div>
                                    <span style="
                                        padding: 4px 8px;
                                        border-radius: 4px;
                                        font-size: 0.85em;
                                        font-weight: bold;
                                        background-color: ${status === "進行中" ? "#fff9c4" : "#ffcccc"};
                                        color: ${status === "進行中" ? "#f57f17" : "#c62828"};
                                    ">
                                        ${status}
                                    </span>
                                </div>
                                <div style="font-size: 0.9em; color: #666; margin-bottom: 8px;">
                                    Best of ${match.best_of}
                                </div>
                                <div style="font-size: 0.9em; color: #666; margin-bottom: 4px;">
                                    対戦日: ${formatDateTime(match.scheduled_at)}
                                </div>
                                <div style="font-size: 0.9em; color: #666; margin-bottom: 12px;">
                                    提出期限: ${formatDateTime(match.order_deadline)}
                                </div>

                                <div style="border-top: 1px solid #eee; padding-top: 12px;">
                                    <div style="font-weight: 700; margin-bottom: 8px;">オーダー提出（1〜5戦）</div>
                                    <div style="font-size: 0.85em; color: #666; margin-bottom: 8px;">1〜3戦: シーズン / 4〜5戦: グローリー</div>
                                    <div id="orderStatus_${match.match_id}" style="font-size: 0.9em; margin-bottom: 8px; color: #666;">読込中...</div>
                                    <div id="orderList_${match.match_id}" style="display: grid; gap: 8px; margin-bottom: 10px;"></div>
                                    <div id="reserveLabel_${match.match_id}" style="font-weight: 700; margin-bottom: 8px;">リザーブ（最大2名・任意）</div>
                                    <div id="reserveList_${match.match_id}" style="display: grid; gap: 8px; margin-bottom: 10px;"></div>
                                    <button class="btn" id="submitOrderBtn_${match.match_id}">このマッチのオーダーを提出</button>
                                </div>

                                <div id="matchCardSection_${match.match_id}" style="display: none; border-top: 1px solid #eee; padding-top: 12px; margin-top: 12px;">
                                    <div style="font-weight: 700; margin-bottom: 12px;">対戦カード</div>
                                    <div id="matchCard_${match.match_id}" style="background: #f9f9f9; border-radius: 4px; padding: 12px;"></div>
                                </div>
                            </div>
                        `;
                    targetList.appendChild(matchElement);

                    const submitButton = document.getElementById(`submitOrderBtn_${match.match_id}`);
                    submitButton.addEventListener("click", () => {
                        submitOrder(match.match_id, teamId, members);
                    });

                    loadMatchOrder(match.match_id, teamId, members, match);
                };

                ongoingMatches.forEach((match) => {
                    renderMatchCard(match, ongoingMatchesList, false);
                });

                finishedMatches.forEach((match) => {
                    renderMatchCard(match, finishedMatchesList, true);
                });

                teamDetailCard.classList.remove("hidden");
            } catch (error) {
                console.error("Error:", error);
                statusMessage.textContent = "チーム情報の取得に失敗しました。";
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            setupMembersToggle();
            setupFinishedMatchesToggle();
            loadTeamDetail();
        });
    </script>
</body>

</html>
