<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
    <title>管理者ページ</title>
</head>

<body>
    <div id="headerSlot"></div>

    <main class="container">
        <div class="card">
            <h1>管理者ページ</h1>
            <hr>
            <p id="adminMessage">確認中...</p>
        </div>

        <div class="card hidden" id="adminMenuCard">
            <h2>管理メニュー</h2>
            <hr>
            <ul class="admin-menu">
                <li>
                    チーム管理
                    <ul class="admin-menu">
                        <li><a href="./team_list.html">チーム一覧を表示</a></li>
                        <li><a href="./team_edit.html">チーム情報を編集</a></li>
                        <li><a href="./team_member_bulk_add.html">チームメンバーを一括追加</a></li>
                        <li><a href="./team_admin.html">新しいチームを作成</a></li>
                        <li><a href="./team_delete.html">チームを削除</a></li>
                    </ul>
                </li>
                <li>
                    プレイヤー管理
                    <ul class="admin-menu">
                        <li><a href="./player_list.html">プレイヤー一覧を表示</a></li>
                        <li><a href="./player_team_assignment.html">プレイヤー情報を編集</a></li>
                        <li><a href="./player_admin.html">新しいプレイヤーを作成</a></li>
                        <li><a href="./player_delete.html">プレイヤーを削除</a></li>
                    </ul>
                </li>
                <li>
                    マッチ管理
                    <ul class="admin-menu">
                        <li><a href="./match_admin.html">新しいマッチを作成</a></li>
                        <li><a href="./match_manage.html">管理する試合の決定</a></li>
                        <li><a href="./match_confirm.html">マッチの確定</a></li>
                        <li><a href="./order_confirm.html">オーダーの確定</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </main>

    <div id="footerSlot"></div>

    <script src="./js/layout.js"></script>

    <script>
        async function checkAdmin() {
            const response = await fetch("/api/me");
            const result = await response.json();

            const adminMessage = document.getElementById("adminMessage");
            const adminMenuCard = document.getElementById("adminMenuCard");

            if (!result.isLoggedIn) {
                location.href = "./admin_login.html";
                return;
            }

            if (result.type !== "admin") {
                adminMessage.textContent = "あなたにはこのページの閲覧権限がありません。";
                return;
            }

            adminMessage.textContent = "管理者としてログインしています．";
            adminMenuCard.classList.remove("hidden");
        }

        document.addEventListener("DOMContentLoaded", () => {
            checkAdmin();
        });
    </script>
</body>

</html>
