<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
    <title>管理者ページ</title>
</head>

<body>
    <div id="headerSlot"></div>

    <main class="container">
        <div class="card">
            <h1>管理者ページ</h1>
            <hr>
            <p id="adminMessage">確認中...</p>
        </div>

        <div class="card hidden" id="adminMenuCard">
            <h2>管理メニュー</h2>
            <hr>
            <ul class="admin-menu">
                <li><a href="./team_admin.html">チーム管理</a></li>
                <li><a href="./player_admin.html">プレイヤー管理</a></li>
            </ul>
        </div>
    </main>

    <div id="footerSlot"></div>

    <script src="./js/layout.js"></script>

    <script>
        async function checkAdmin() {
            const response = await fetch("/api/me");
            const result = await response.json();

            const adminMessage = document.getElementById("adminMessage");
            const adminMenuCard = document.getElementById("adminMenuCard");

            if (!result.isLoggedIn) {
                location.href = "./admin_login.html";
                return;
            }

            if (result.type !== "admin") {
                adminMessage.textContent = "あなたにはこのページの閲覧権限がありません。";
                return;
            }

            adminMessage.textContent = "管理者としてログインしています．";
            adminMenuCard.classList.remove("hidden");
        }

        document.addEventListener("DOMContentLoaded", () => {
            checkAdmin();
        });
    </script>
</body>

</html>
