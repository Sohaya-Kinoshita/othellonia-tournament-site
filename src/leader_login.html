<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="icon" href="./images/oc_mark.png" type="image/png">
    <title>リーダーログイン - 隊抗戦</title>
    <!-- Google reCAPTCHA v3 -->
    <script src="https://www.google.com/recaptcha/api.js?render=6LcfBYUsAAAAAKFBg0zxYsQJTsYJcAmTwTte_wCj"></script>
</head>

<body>
    <div id="headerSlot"></div>

    <main class="login-container">
        <div class="login-box">
            <h1>リーダーログイン</h1>

            <form id="leaderLoginForm" class="login-form">
                <div class="form-group">
                    <input type="text" id="leaderId" name="leaderId" placeholder="リーダーID" required>
                </div>

                <div class="form-group">
                    <input type="password" id="leaderPassword" name="leaderPassword" placeholder="パスワード" required>
                </div>

                <button type="submit" class="login-btn">ログインする</button>
            </form>

            <div id="errorMessage" class="error-message hidden"></div>

            <div class="login-footer">
                <a href="./login.html" class="signup-link">プレイヤーログインページはこちら</a>
            </div>

            <div class="login-footer">
                <a href="./admin_login.html" class="signup-link">管理者用ログイン</a>
            </div>
        </div>
    </main>

    <div id="footerSlot"></div>

    <script src="./js/layout.js"></script>
    <script>
        const leaderLoginForm = document.getElementById('leaderLoginForm');
        const errorMessage = document.getElementById('errorMessage');
        const leaderIdInput = document.getElementById('leaderId');
        const leaderPasswordInput = document.getElementById('leaderPassword');
        const RECAPTCHA_SITE_KEY = '6LcfBYUsAAAAAKFBg0zxYsQJTsYJcAmTwTte_wCj';

        leaderLoginForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const leaderId = leaderIdInput.value.trim();
            const leaderPassword = leaderPasswordInput.value.trim();

            // バリデーション
            if (!leaderId) {
                errorMessage.textContent = 'リーダーIDを入力してください';
                errorMessage.style.display = 'block';
                return;
            }

            if (!leaderPassword) {
                errorMessage.textContent = 'パスワードを入力してください';
                errorMessage.style.display = 'block';
                return;
            }

            errorMessage.style.display = 'none';

            try {
                // Google reCAPTCHA v3 トークンを取得
                let captchaToken = '';
                try {
                    captchaToken = await new Promise((resolve, reject) => {
                        grecaptcha.ready(async () => {
                            try {
                                const token = await grecaptcha.execute(RECAPTCHA_SITE_KEY, { action: 'leader_login' });
                                resolve(token);
                            } catch (err) {
                                reject(err);
                            }
                        });
                    });
                } catch (err) {
                    console.warn('reCAPTCHA token generation failed:', err);
                }

                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        leaderId: leaderId,
                        password: leaderPassword,
                        captchaToken: captchaToken  // キャプチャトークンを追加
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    location.href = './leader.html';
                } else {
                    errorMessage.textContent = result.message || 'ログインに失敗しました';
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                errorMessage.textContent = 'エラーが発生しました';
                errorMessage.style.display = 'block';
                console.error('Leader login error:', error);
            }
        });
    </script>
</body>

</html>
